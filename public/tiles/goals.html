<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Goals</title>
<style>
  :root{
    --bg:#0a0a0c;--surface:rgba(255,255,255,.045);--border:rgba(255,255,255,.11);--brand:#6EE7B7;
    --brand-soft:rgba(110,231,183,.08);--brand-line:rgba(110,231,183,.3);
    --short:#e8a15f;--short-soft:rgba(232,161,95,.08);--short-line:rgba(232,161,95,.35);
    --long:#b18cf0;--long-soft:rgba(177,140,240,.08);--long-line:rgba(177,140,240,.35);
    --muted:#8a8a90;--muted-strong:#a8a8b0;--fg:#ededf0;--neg:#ff6b6b;--neg-line:rgba(255,107,107,.4);
    --track:#17171b;--radius-md:12px;--radius-pill:999px;
    --font-display:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;
    --font-mono:ui-monospace,SFMono-Regular,Menlo,"JetBrains Mono",monospace;
    --font-serif:Georgia,"Iowan Old Style","Times New Roman",serif;
    --ease:cubic-bezier(.4,0,.2,1);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:radial-gradient(120% 60% at 50% 0%,#17171b 0%,#101013 42%,#0a0a0c 70%,#08080a 100%);
    color:var(--fg);font:15px/1.5 var(--font-display);display:flex;justify-content:center;padding:40px 20px;
    position:relative;overflow-x:hidden;-webkit-font-smoothing:antialiased}
  body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
    background:repeating-linear-gradient(0deg,rgba(255,255,255,.03) 0 1px,transparent 1px 3px);mix-blend-mode:overlay}
  /* body's flex+justify-content:center makes its only child (main) shrink-wrap
     to content width instead of filling the row — main needs an explicit width
     so .shell's own width:100% has something real to resolve against. */
  main{width:100%}
  .stars{position:fixed;inset:0;z-index:0;pointer-events:none}
  .star{position:absolute;width:2px;height:2px;background:#cfd0d6;border-radius:50%;opacity:.4;animation:twinkle 8s ease-in-out infinite}
  @keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.5}}
  @media(prefers-reduced-motion:reduce){.star,.markOrb,.markGlow{animation:none!important}.stat,.card{transition:none}}
  .shell{position:relative;z-index:1;width:100%;max-width:none}
  /* on a wide PC viewport, put short-term and long-term goals side by side
     instead of stacking one narrow column down the middle of the screen. */
  @media(min-width:820px){
    .shell{column-count:2;column-gap:22px}
    .header{column-span:all}
    .stats{column-span:all}
  }
  .card{break-inside:avoid}
  .header{display:flex;align-items:center;gap:14px;margin-bottom:12px}
  .markWrap{position:relative;width:44px;height:44px;flex-shrink:0}
  .markGlow{position:absolute;inset:-10px;border-radius:50%;background:var(--brand);filter:blur(14px);opacity:.4;
    animation:glowBreathe 4.5s ease-in-out infinite}
  @keyframes glowBreathe{0%,100%{opacity:.28;transform:scale(.92)}50%{opacity:.5;transform:scale(1.06)}}
  .mark{position:relative;width:44px;height:44px;flex-shrink:0;border-radius:50%;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 35% 30%,#e4e5ea,var(--brand) 46%,#6d6f76 100%);box-shadow:0 0 26px rgba(0,0,0,.5);
    animation:sway 7s ease-in-out infinite}
  @keyframes sway{0%,100%{transform:rotate(-3deg) translateY(0)}50%{transform:rotate(3deg) translateY(-2px)}}
  .mark svg{width:22px;height:22px}
  .title{font-family:var(--font-serif);font-style:italic;font-size:26px;font-weight:600;letter-spacing:-.01em;margin:0}
  .subtitle{color:var(--muted);font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;margin:5px 0 0}
  .stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:10px}
  .stat{position:relative;border:1px solid var(--border);border-radius:var(--radius-md);background:var(--surface);padding:10px 12px;text-align:center;
    -webkit-backdrop-filter:blur(18px);backdrop-filter:blur(18px);overflow:hidden;transition:border-color .2s var(--ease)}
  .stat:hover,.card:hover{border-color:var(--brand-line);box-shadow:0 0 0 1px var(--brand-line) inset}
  .statNum{font-size:20px;font-weight:600;letter-spacing:-.01em}
  .statNum.brand{color:var(--brand)}
  .statNum.short{color:var(--short)}
  .statNum.long{color:var(--long)}
  .statLbl{color:var(--muted);font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;margin-top:3px}
  .card{position:relative;border:1px solid var(--border);border-radius:16px;background:var(--surface);padding:12px;margin-bottom:10px;
    -webkit-backdrop-filter:blur(20px) saturate(120%);backdrop-filter:blur(20px) saturate(120%);
    overflow:hidden;transition:border-color .2s var(--ease)}
  .cardHead{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:10px}
  .cardName{font-family:var(--font-mono);font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#fff}
  .count{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;color:var(--muted)}
  .row{display:flex;gap:10px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
  .field{flex:1;min-width:90px}
  .fieldLbl{display:block;font-size:11px;color:var(--muted);margin-bottom:6px}
  input[type=text],input[type=number]{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--fg);
    border-radius:10px;padding:10px 12px;font:inherit}
  input:focus{outline:none;border-color:var(--brand)}
  /* hide native number-input spin arrows for visual consistency with the rest of the dashboard */
  input[type=number]{-moz-appearance:textfield;appearance:textfield}
  input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
  input::placeholder{color:#55555c}
  .btn-primary{background:var(--brand);color:#0a0a0c;border:none;font-weight:600;border-radius:10px;padding:10px 16px;font:inherit;cursor:pointer;white-space:nowrap}
  @media(max-width:640px){.row.durRow{flex-direction:column;align-items:stretch}}
  .card.cardShort .cardName{color:var(--short)}
  .card.cardLong .cardName{color:var(--long)}
  .card.cardShort .btn-primary{background:var(--short);color:#1a1006}
  .card.cardLong .btn-primary{background:var(--long);color:#160f26}
  .card.cardShort input:focus{border-color:var(--short)}
  .card.cardLong input:focus{border-color:var(--long)}
  .list{display:flex;flex-direction:column;gap:6px}
  .goal{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:9px 12px;border:1px solid var(--border);
    border-left:3px solid var(--brand-line);border-radius:var(--radius-md);background:var(--surface)}
  .card.cardShort .goal{border-left-color:var(--short-line)}
  .card.cardLong .goal{border-left-color:var(--long-line)}
  .goal.done{opacity:.5}
  .goal.done .goalText{text-decoration:line-through}
  .goalLeft{display:flex;align-items:center;gap:12px;min-width:0}
  .checkBtn{background:transparent;border:1.5px solid var(--border);color:transparent;width:22px;height:22px;border-radius:50%;
    cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:border-color .15s,background .15s,color .15s}
  .checkBtn:hover{border-color:var(--brand);background:var(--brand-soft)}
  .goal.done .checkBtn{color:var(--brand);border-color:var(--brand)}
  .card.cardShort .checkBtn:hover{border-color:var(--short);background:var(--short-soft)}
  .card.cardShort .goal.done .checkBtn{color:var(--short);border-color:var(--short)}
  .card.cardLong .checkBtn:hover{border-color:var(--long);background:var(--long-soft)}
  .card.cardLong .goal.done .checkBtn{color:var(--long);border-color:var(--long)}
  .checkBtn svg{width:12px;height:12px}
  .goalTextWrap{display:flex;flex-direction:column;gap:2px;min-width:0}
  .goalText{font-size:14.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .goalDue{font-family:var(--font-mono);font-size:10px;letter-spacing:.06em;color:var(--muted)}
  .card.cardShort .goalDue.overdue{color:var(--neg)}
  .card.cardLong .goalDue.overdue{color:var(--neg)}
  .xBtn{background:transparent;border:1px solid var(--border);color:var(--muted);width:26px;height:26px;border-radius:50%;cursor:pointer;flex-shrink:0;line-height:1}
  .xBtn:hover{color:var(--neg);border-color:var(--neg-line)}
  .empty{color:var(--muted);font-size:13px;padding:6px 0}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<main><div class="shell" id="app"></div></main>
<script>
/* Goals — short-term + long-term goal lists. No network: persists through
   the dashboard bridge (window.Vitality) as one object with two arrays. */
let store={shortTerm:[],longTerm:[]};
const $=id=>document.getElementById(id);
const REDUCED=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function persist(){window.Vitality.save(store);}
function newId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

function spawnStars(){
  const wrap=$('stars');if(!wrap)return;
  let html='';
  for(let i=0;i<40;i++){
    const left=Math.random()*100, top=Math.random()*55, delay=-Math.random()*8;
    html+='<div class="star" style="left:'+left+'%;top:'+top+'%;animation-delay:'+delay+'s"></div>';
  }
  wrap.innerHTML=html;
}
function headerHtml(){
  return '<header class="header"><div class="markWrap"><div class="markGlow"></div><div class="mark" aria-hidden="true">'
    +'<svg viewBox="-12 -12 24 24" fill="none" stroke="#0a0a0c" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">'
    +'<path d="M-7 10 L-7 -9 L7 -6 L-2 -2 L7 2 L-7 5"/></svg></div></div>'
    +'<div><h1 class="title">Goals</h1><p class="subtitle">Short-term · Long-term</p></div></header>';
}
function statsHtml(){
  const openShort=store.shortTerm.filter(g=>!g.done).length;
  const openLong=store.longTerm.filter(g=>!g.done).length;
  return '<section class="stats">'
    +'<div class="stat"><div class="statNum short">'+openShort+'</div><div class="statLbl">Short-term open</div></div>'
    +'<div class="stat"><div class="statNum long">'+openLong+'</div><div class="statLbl">Long-term open</div></div>'
    +'</section>';
}
/* Goals can carry an optional target deadline: short-term ones are set as a
   days+weeks span from today, long-term ones as a months+years span (see
   addGoal) — this turns that stored timestamp back into a compact label. */
function dueLabel(due){
  if(!due)return '';
  const now=new Date();now.setHours(0,0,0,0);
  const diffDays=Math.round((due-now.getTime())/86400000);
  const dateStr=new Date(due).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});
  if(diffDays<0)return 'Overdue · '+dateStr;
  if(diffDays===0)return 'Due today';
  if(diffDays===1)return 'Due tomorrow';
  if(diffDays<30)return 'Due in '+diffDays+' days';
  return 'Due '+dateStr;
}
function listInner(key){
  const items=store[key];
  if(!items.length)return '<p class="empty">Nothing here yet.</p>';
  const sorted=items.slice().sort((a,b)=>(a.done===b.done)?0:(a.done?1:-1));
  return sorted.map(g=>{
    const due=!g.done&&g.due?dueLabel(g.due):'';
    return '<div class="goal'+(g.done?' done':'')+'">'
    +'<div class="goalLeft"><button class="checkBtn" data-complete="'+key+':'+g.id+'" title="Toggle done">'
    +'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12l5 5L20 6"/></svg></button>'
    +'<div class="goalTextWrap"><span class="goalText">'+esc(g.text)+'</span>'
    +(due?'<span class="goalDue'+(due.indexOf('Overdue')===0?' overdue':'')+'">'+due+'</span>':'')
    +'</div></div>'
    +'<button class="xBtn" data-del="'+key+':'+g.id+'" title="Remove">×</button>'
    +'</div>';
  }).join('');
}
function sectionHtml(key,label,inputId,btnId){
  const items=store[key];
  const accentCls=key==='shortTerm'?'cardShort':'cardLong';
  const isShort=key==='shortTerm';
  const durFields=isShort
    ? '<div class="field"><label class="fieldLbl">Days</label><input type="number" id="'+inputId+'Days" min="0" placeholder="0" /></div>'
     +'<div class="field"><label class="fieldLbl">Weeks</label><input type="number" id="'+inputId+'Weeks" min="0" placeholder="0" /></div>'
    : '<div class="field"><label class="fieldLbl">Months</label><input type="number" id="'+inputId+'Months" min="0" placeholder="0" /></div>'
     +'<div class="field"><label class="fieldLbl">Years</label><input type="number" id="'+inputId+'Years" min="0" placeholder="0" /></div>';
  return '<section class="card '+accentCls+'"><div class="cardHead"><span class="cardName">'+label+'</span>'
    +'<span class="count">'+(items.length?items.length+(items.length===1?' goal':' goals'):'Empty')+'</span></div>'
    +'<div class="row"><input type="text" id="'+inputId+'" placeholder="Add a '+label.toLowerCase()+' goal" autocomplete="off" style="flex:1 1 100%" /></div>'
    +'<div class="row durRow">'+durFields+'<button class="btn-primary" id="'+btnId+'">Add</button></div>'
    +'<div class="list">'+listInner(key)+'</div>'
    +'</section>';
}
function render(){
  $('app').innerHTML=headerHtml()+statsHtml()
    +sectionHtml('shortTerm','Short-term','shortInput','shortAdd')
    +sectionHtml('longTerm','Long-term','longInput','longAdd');
}

/* Short-term goals get a days+weeks span from today; long-term ones get a
   months+years span (calendar-correct via setMonth/setFullYear, not a flat
   30/365-day approximation). Both are optional — leaving every field at 0
   (the default) stores no deadline at all. */
function dueFromInputs(key,inputId){
  const d=new Date();d.setHours(0,0,0,0);
  if(key==='shortTerm'){
    const days=Number($(inputId+'Days').value)||0;
    const weeks=Number($(inputId+'Weeks').value)||0;
    if(days<=0&&weeks<=0)return null;
    d.setDate(d.getDate()+days+weeks*7);
  } else {
    const months=Number($(inputId+'Months').value)||0;
    const years=Number($(inputId+'Years').value)||0;
    if(months<=0&&years<=0)return null;
    d.setMonth(d.getMonth()+months);
    d.setFullYear(d.getFullYear()+years);
  }
  return d.getTime();
}
function addGoal(key,inputId){
  const el=$(inputId);
  const text=(el.value||'').trim();
  if(!text)return;
  const due=dueFromInputs(key,inputId);
  store[key].push({id:newId(),text,done:false,ts:Date.now(),due});
  persist();
  el.value='';
  const durIds=key==='shortTerm'?[inputId+'Days',inputId+'Weeks']:[inputId+'Months',inputId+'Years'];
  durIds.forEach(id=>{const f=$(id);if(f)f.value='';});
  render();
}
function toggleGoal(key,id){
  const g=store[key].find(x=>x.id===id);
  if(g){g.done=!g.done;persist();render();}
}
function deleteGoal(key,id){
  store[key]=store[key].filter(x=>x.id!==id);
  persist();
  render();
}

document.addEventListener('click',e=>{
  if(e.target.closest('#shortAdd')){addGoal('shortTerm','shortInput');return;}
  if(e.target.closest('#longAdd')){addGoal('longTerm','longInput');return;}
  const del=e.target.closest('[data-del]');
  if(del){
    const [key,id]=del.getAttribute('data-del').split(':');
    deleteGoal(key,id);
    return;
  }
  const complete=e.target.closest('[data-complete]');
  if(complete){
    const [key,id]=complete.getAttribute('data-complete').split(':');
    toggleGoal(key,id);
  }
});
document.addEventListener('keydown',e=>{
  if(e.target.id==='shortInput'&&e.key==='Enter'){e.preventDefault();addGoal('shortTerm','shortInput');}
  if(e.target.id==='longInput'&&e.key==='Enter'){e.preventDefault();addGoal('longTerm','longInput');}
});

spawnStars();
(async()=>{
  const d=await window.Vitality.load();
  if(d&&typeof d==='object'&&!Array.isArray(d)){
    store.shortTerm=Array.isArray(d.shortTerm)?d.shortTerm:[];
    store.longTerm=Array.isArray(d.longTerm)?d.longTerm:[];
  }
  render();
  window.Vitality.ready();
})();
</script>
</body>
</html>
