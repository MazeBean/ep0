<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Body</title>
<style>
  /* Vitality Intake tile — daily energy-curve prediction + circadian rhythm
     (ported from the retired Peak tile), a caffeine log (400mg ceiling +
     one-compartment half-life decay), and a daily med/supplement stack
     checklist. Sealed & bridge-backed. */
  :root{
    --bg:#0a0a0c;--surface:rgba(255,255,255,.02);--border:rgba(255,255,255,.08);--brand:#6EE7B7;
    --brand-soft:rgba(110,231,183,.08);--brand-line:rgba(110,231,183,.3);
    --muted:#8a8a90;--muted-strong:#a8a8b0;--fg:#ededf0;--neg:#ff6b6b;--neg-line:rgba(255,107,107,.4);
    --warn:#e8b05f;--track:#17171b;--radius-md:12px;--radius-pill:999px;
    --font-display:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;
    --font-mono:ui-monospace,SFMono-Regular,Menlo,"JetBrains Mono",monospace;
    --font-serif:Georgia,"Iowan Old Style","Times New Roman",serif;
    --duration:.2s;--ease:cubic-bezier(.4,0,.2,1);
  }
  *{box-sizing:border-box}
  h1,h2,h3,p{margin:0}
  /* Reserve the scrollbar's width up front so toggling collapsible content
     (e.g. sleep history) that pushes the page just past the overflow
     threshold doesn't shrink the available width and reflow the grid-paired
     cards by a few pixels. */
  html,body{margin:0;height:100%;scrollbar-gutter:stable}
  body{background:radial-gradient(120% 60% at 50% 0%,#17171b 0%,#101013 42%,#0a0a0c 70%,#08080a 100%);
    color:var(--fg);font:15px/1.5 var(--font-display);display:flex;justify-content:center;padding:40px 20px;
    position:relative;overflow-x:hidden;overflow-y:hidden;-webkit-font-smoothing:antialiased}
  body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
    background:repeating-linear-gradient(0deg,rgba(255,255,255,.03) 0 1px,transparent 1px 3px);mix-blend-mode:overlay}
  /* Same slow drifting mint wash as the home dashboard's own background
     (dashboard.module.css's .page::before/canvasDrift), so this tile doesn't
     feel like a flatter, separate world from the tab it opened out of. */
  body::after{content:'';position:fixed;inset:-10% -5%;z-index:0;pointer-events:none;
    background:radial-gradient(ellipse 50% 35% at 70% 20%,rgba(110,231,183,.06),transparent 65%),
      radial-gradient(ellipse 40% 30% at 20% 80%,rgba(110,231,183,.04),transparent 70%);
    animation:canvasDrift 60s ease-in-out infinite alternate}
  @keyframes canvasDrift{from{transform:translate3d(0,0,0)}to{transform:translate3d(-2%,1%,0)}}
  @media(prefers-reduced-motion:reduce){body::after{animation:none}}
  /* body's flex+justify-content:center makes its only child (main) shrink-wrap
     to content width instead of filling the row — main needs an explicit width
     so .shell's own width:100% has something real to resolve against. */
  main{width:100%}
  .stars{position:fixed;inset:0;z-index:0;pointer-events:none}
  .star{position:absolute;width:2px;height:2px;background:#cfd0d6;border-radius:50%;opacity:.4;animation:twinkle 8s ease-in-out infinite}
  @keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.5}}
  @media(prefers-reduced-motion:reduce){.star,.markOrb,.markGlow{animation:none!important}.card{transition:none}.card,.doseCard{animation:none!important;opacity:1!important}}
  .shell{position:relative;z-index:1;width:100%;max-width:none}
  /* Peak and the detailed Caffeine breakdown sit side by side on a wide PC
     viewport instead of each spanning the full width — every other section
     (Daily stack, the quick-log row, Today's Plan, Rhythm) stays a normal
     full-width band. */
  .peakRow{display:block}
  @media(min-width:820px){
    .peakRow{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:stretch}
  }
  .header{display:flex;align-items:center;gap:12px;margin-bottom:10px}
  .markWrap{position:relative;width:40px;height:40px;flex-shrink:0}
  .markGlow{position:absolute;inset:-10px;border-radius:50%;background:var(--brand);filter:blur(14px);opacity:.4;
    animation:glowBreathe 4.5s ease-in-out infinite}
  @keyframes glowBreathe{0%,100%{opacity:.28;transform:scale(.92)}50%{opacity:.5;transform:scale(1.06)}}
  .mark{position:relative;width:40px;height:40px;flex-shrink:0;border-radius:50%;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 35% 30%,#e4e5ea,var(--brand) 46%,#6d6f76 100%);box-shadow:0 0 26px rgba(0,0,0,.5);
    animation:sway 7s ease-in-out infinite}
  @keyframes sway{0%,100%{transform:rotate(-3deg) translateY(0)}50%{transform:rotate(3deg) translateY(-2px)}}
  .mark svg{width:20px;height:20px}
  .title{font-family:var(--font-serif);font-style:italic;font-size:40px;font-weight:600;line-height:1;letter-spacing:-.01em;margin:0}
  .subtitle{color:var(--muted);font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;margin:4px 0 0}
  /* Transparent, not frosted — same treatment as the home dashboard's own
     overview cards: a near-invisible tint (--surface) with no backdrop blur,
     so the starfield reads through crisp instead of behind a glass pane. */
  .card{position:relative;border:1px solid var(--border);border-radius:16px;background:var(--surface);padding:12px;margin-bottom:10px;
    overflow:hidden;transition:border-color .2s var(--ease),box-shadow .2s var(--ease)}
  .card:hover{border-color:var(--brand-line);box-shadow:0 0 0 1px var(--brand-line) inset}
  /* Panel load-in — same recipe as the home dashboard's overview cards (a
     slight overshoot + a brief mint border/glow flash before settling), just
     without the ripple/ping rings that only make sense on that 6-card grid.
     Each card's own inline animation-delay staggers them in render order. */
  /* Two separate animations, not one: cardIn (forwards) owns opacity/transform
     so the reveal sticks; cardFlash has no fill-mode, so once its one pass
     ends the browser drops it and border-color/box-shadow revert to the
     normal cascade — including :hover. A forwards-filled animation freezes
     its last keyframe at "animation" priority (above normal author rules
     regardless of specificity), so if cardFlash also used forwards its
     frozen border-color would permanently block :hover from ever applying
     again. The single animation-delay set inline per card still staggers
     both animations — with two names it cycles to cover both (spec). */
  .card,.doseCard{opacity:0;animation:cardIn .65s cubic-bezier(.16,1,.3,1) forwards,cardFlash .65s cubic-bezier(.16,1,.3,1)}
  @keyframes cardIn{
    0%{opacity:0;transform:translateY(14px) scale(.94)}
    55%{opacity:1;transform:translateY(-2px) scale(1.015)}
    100%{opacity:1;transform:translateY(0) scale(1)}
  }
  @keyframes cardFlash{
    0%{border-color:var(--border);box-shadow:none}
    55%{border-color:rgba(110,231,183,.55);box-shadow:0 0 0 1px rgba(110,231,183,.25),0 10px 26px -14px rgba(110,231,183,.4)}
    100%{border-color:var(--border);box-shadow:none}
  }
  .cardName{font-family:var(--font-mono);font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#fff;display:block;margin-bottom:10px}

  /* -- quick-log dose cards -- */
  .doseGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:10px}
  .doseCard{position:relative;border:1px solid var(--border);border-radius:14px;background:var(--surface);padding:12px;
    display:flex;flex-direction:column;gap:8px;
    transition:border-color .2s var(--ease),box-shadow .2s var(--ease)}
  .doseCard:hover{border-color:var(--dose-accent);box-shadow:0 0 0 1px var(--dose-accent) inset}
  .doseIconBadge{width:28px;height:28px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:var(--dose-accent)}
  .doseIconBadge svg{width:15px;height:15px}
  .doseInfo{display:flex;flex-direction:column;gap:1px}
  .doseName{font-weight:600;font-size:13.5px}
  .doseMg{font-family:var(--font-mono);font-size:10.5px;color:var(--muted)}
  .doseLogBtn{margin-top:auto;background:var(--dose-accent);color:#06110c;border:none;border-radius:var(--radius-pill);padding:7px 0;
    font:inherit;font-weight:700;font-size:12.5px;cursor:pointer;transition:transform .15s var(--ease),box-shadow .15s var(--ease)}
  .doseLogBtn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.35)}
  .doseLogBtn:active{transform:translateY(0)}
  .doseUnderline{height:2px;border-radius:2px;background:linear-gradient(90deg,transparent,var(--dose-accent),transparent);opacity:.55}

  /* -- quick time entry, next to "Add now" and under each preset -- lets a
     dose be logged for a time earlier today instead of always "right now" */
  .timeChip{display:flex;align-items:center;gap:6px;border:1px solid var(--border);border-radius:10px;
    padding:0 9px;background:var(--bg);color:var(--muted);flex-shrink:0;transition:border-color .15s var(--ease)}
  .timeChip:focus-within{border-color:var(--brand-line)}
  .timeChip svg{width:13px;height:13px;flex-shrink:0}
  .timeChip input{background:transparent;border:none;color:var(--fg);font:inherit;font-size:12.5px;
    padding:7px 0;width:100%;min-width:0}
  .timeChip input:focus{outline:none}
  .timeChip input::placeholder{color:var(--muted)}

  /* -- Peak (energy curve) card -- */
  .peakCard{padding:13px;display:flex;flex-direction:column}
  .peakTop{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:6px}
  .peakGauge{position:relative;width:68px;height:68px;flex-shrink:0}
  .peakGauge svg{width:100%;height:100%;transform:rotate(-90deg)}
  .peakGauge .gaugeTrack{fill:none;stroke:var(--border);stroke-width:6}
  .peakGauge .gaugeFill{fill:none;stroke:var(--brand);stroke-width:6;stroke-linecap:round;
    filter:drop-shadow(0 0 6px rgba(110,231,183,.6));transition:stroke-dashoffset .4s var(--ease)}
  .peakGaugeNum{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-family:var(--font-serif);font-style:italic;font-weight:600;font-size:20px;color:var(--brand)}
  .peakTitleBlock{display:flex;flex-direction:column;gap:2px}
  .peakTitle{font-family:var(--font-serif);font-style:italic;font-weight:600;font-size:22px;margin:0;letter-spacing:-.01em}
  .peakSub{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.12em;color:var(--muted)}
  .peakDesc{flex:1;min-width:190px}
  .peakDescLabel{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:4px}
  .peakDescText{font-size:13px;color:var(--muted-strong);margin:0;line-height:1.5}
  .peakControls{display:flex;align-items:center;gap:8px;margin-left:auto}
  .segToggle{display:flex;border:1px solid var(--border);border-radius:var(--radius-pill);padding:2px;gap:2px}
  .segBtn{background:transparent;border:none;color:var(--muted);font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;
    text-transform:uppercase;padding:6px 11px;border-radius:var(--radius-pill);cursor:pointer;transition:background .15s var(--ease),color .15s var(--ease)}
  .segBtn.active{background:var(--brand);color:#06110c;font-weight:700}
  .gearBtn{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--muted);
    display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color .15s var(--ease),color .15s var(--ease);flex-shrink:0}
  .gearBtn:hover{border-color:var(--brand-line);color:var(--brand)}
  .gearBtn.active{color:var(--brand);border-color:var(--brand-line)}
  .gearBtn svg{width:15px;height:15px}

  /* -- shared chart chrome -- */
  .chartWrap{position:relative;flex:1;display:flex;flex-direction:column;justify-content:flex-start;min-height:90px}
  .chart{width:100%;height:auto;display:block;margin-top:6px}
  .chart .grid{stroke:var(--border);stroke-width:1}
  .chart .axl{fill:var(--muted);font-family:var(--font-mono);font-size:9px;letter-spacing:.08em}
  /* In normal flow (not absolutely positioned over the chart) so it pushes
     the chart down instead of overlapping its top edge — on a narrow phone
     viewport the chart renders shorter (same viewBox, less width), so an
     overlaid hint here used to sit right on top of the curve. */
  .dragHint{font-family:var(--font-mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--brand);opacity:.85;pointer-events:none;margin-bottom:4px}
  .logFeelTip{position:absolute;top:2px;transform:translateX(-50%);font-family:var(--font-mono);font-size:9px;letter-spacing:.05em;
    text-transform:uppercase;color:var(--brand);border:1px solid var(--brand-line);border-radius:var(--radius-pill);padding:3px 8px;
    background:rgba(110,231,183,.1);pointer-events:none;white-space:nowrap}
  /* energy chart (e-prefixed to keep it distinct from the caffeine decay chart below) */
  .chart .eline{fill:none;stroke:var(--brand);stroke-width:2;stroke-linejoin:round;stroke-linecap:round;
    filter:drop-shadow(0 0 3px rgba(110,231,183,.9)) drop-shadow(0 0 8px rgba(110,231,183,.45))}
  .chart .ebline{fill:none;stroke:var(--muted-strong);stroke-width:1.5;stroke-dasharray:3 4;opacity:.8}
  .chart .nowLine{stroke:var(--brand);stroke-width:1;opacity:.6;stroke-dasharray:2 3;pointer-events:none}
  .chart .nowHandle{fill:transparent;cursor:ns-resize;pointer-events:all}
  .chart .enowd{fill:var(--fg)}
  .chart .epeakd{fill:var(--warn);stroke:var(--bg);stroke-width:1.5}
  .chart .feelDot{fill:#fff;stroke:var(--brand);stroke-width:2;filter:drop-shadow(0 0 4px rgba(255,255,255,.6));transition:opacity .15s var(--ease)}
  .chart .ebar{fill:var(--brand);filter:drop-shadow(0 0 4px rgba(110,231,183,.5))}
  .chart .ebar.now{stroke:#fff;stroke-width:1.2}
  .chart .ebarBase{fill:var(--muted);opacity:.35}
  /* caffeine decay chart */
  .chart .dline{fill:none;stroke:var(--brand);stroke-width:2;stroke-linejoin:round;stroke-linecap:round}
  .chart .darea{opacity:.6}
  .chart .nowd{fill:var(--brand);stroke:var(--bg);stroke-width:1.5}
  .legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:4px}
  .legend span{font-family:var(--font-mono);font-size:10px;letter-spacing:.06em;color:var(--muted);display:inline-flex;align-items:center;gap:6px}
  .swatch{width:14px;height:0;border-top:2px solid var(--brand)}
  .swatch.base{border-top:2px dashed var(--muted)}

  /* -- rhythm: log a night's sleep (wake/bed + computed hours), with a
     toggleable history list and a separate sleep-debt readout -- */
  .rhythmBlock{margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
  .rhythmActions{display:flex;gap:8px;margin-top:10px}
  .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted-strong);font-weight:600;border-radius:10px;
    padding:8px 13px;font:inherit;font-size:12.5px;cursor:pointer;white-space:nowrap;transition:border-color .15s var(--ease),color .15s var(--ease)}
  .btn-ghost:hover{border-color:var(--brand-line);color:var(--fg)}
  .decayNow .n.warn{color:var(--warn)}

  .fields{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
  .field{display:flex;flex-direction:column;gap:4px}
  .field .l{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;color:var(--muted)}
  .fieldInput{background:var(--bg);border:1px solid var(--border);color:var(--fg);border-radius:10px;padding:7px 10px;font:inherit;width:100%}
  .fieldInput:focus{outline:none;border-color:var(--brand)}
  /* hide native number-input spin arrows — replaced everywhere with mint stepper buttons */
  .fieldInput[type=number]{-moz-appearance:textfield;appearance:textfield}
  .fieldInput[type=number]::-webkit-inner-spin-button,.fieldInput[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
  .stepperRow{display:flex;align-items:center;gap:6px}
  .stepperRow .fieldInput{text-align:center}
  .miniStepBtn{width:26px;height:26px;flex-shrink:0;border-radius:50%;border:1px solid var(--border);background:var(--bg);
    color:var(--brand);font-size:15px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:border-color .15s var(--ease),background .15s var(--ease),transform .1s var(--ease)}
  .miniStepBtn:hover{border-color:var(--brand-line);background:var(--brand-soft)}
  .miniStepBtn:active{transform:scale(.9)}

  /* -- caffeine -- */
  .caffHead{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:4px}
  .caffTotal{font-weight:600;font-size:22px;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
  .caffTotal.over{color:var(--neg)}
  .caffCeil{font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;color:var(--muted)}
  /* A plain var(--track) here read as almost the same color as the card
     surface behind it — too dark to register as an empty progress track
     (same fix as Fuel's macro bars). */
  .caffBarTrack{height:8px;border-radius:var(--radius-pill);background:rgba(255,255,255,.12);overflow:hidden;margin:8px 0 4px}
  .caffBarFill{height:100%;border-radius:var(--radius-pill);background:var(--brand);transition:width var(--duration) ease}
  .caffBarFill.over{background:var(--neg)}
  .coach{font-family:var(--font-mono);font-size:11px;letter-spacing:.02em;color:var(--muted-strong);margin:4px 0 8px}
  .coach.warn{color:var(--warn)}
  .customAdd{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:6px}
  .customAdd .stepperRow{width:120px}
  .customAdd .timeChip{width:104px}
  .btn-primary{background:var(--brand);color:#06110c;border:none;border-radius:10px;padding:7px 14px;font:inherit;font-weight:700;cursor:pointer}
  .hint{color:var(--neg);font-size:12px;font-family:var(--font-mono);min-height:14px;margin-top:6px}
  .decayRow{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin:6px 0 2px;flex-wrap:wrap}
  .decayNow{display:flex;flex-direction:column;gap:2px}
  .decayNow .n{font-weight:600;font-size:28px;letter-spacing:-.02em;line-height:1;font-variant-numeric:tabular-nums;color:var(--brand)}
  .decayNow .l{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;color:var(--muted)}
  .decayHalf{text-align:right;font-family:var(--font-mono);font-size:11px;color:var(--muted-strong)}
  .logList{display:flex;flex-direction:column;gap:5px;margin-top:6px}
  .logRow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-md);background:var(--bg)}
  .logRow .nm{font-weight:600;font-size:14px}
  .logRow .meta{font-family:var(--font-mono);font-size:11px;color:var(--muted)}
  .xBtn{background:transparent;border:1px solid var(--border);color:var(--muted);width:26px;height:26px;border-radius:50%;cursor:pointer;flex-shrink:0}
  .xBtn:hover{color:var(--neg);border-color:var(--neg-line)}
  .empty{color:var(--muted);font-size:13px;padding:8px 0}

  /* -- daily stack -- */
  .stackList{display:flex;flex-direction:column;gap:6px}
  .stackRow{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:9px 12px;border:1px solid var(--border);
    border-left:3px solid var(--brand-line);border-radius:var(--radius-md);background:var(--surface)}
  .stackRow.checked{opacity:.55}
  .stackRow.checked .stackName{text-decoration:line-through}
  .stackLeft{display:flex;align-items:center;gap:12px;min-width:0}
  .checkBtn{background:transparent;border:1.5px solid var(--border);color:transparent;width:22px;height:22px;border-radius:50%;
    cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:border-color .15s,background .15s,color .15s}
  .checkBtn:hover{border-color:var(--brand)}
  .checkBtn.checked{background:var(--brand);border-color:var(--brand);color:#06110c}
  .checkBtn svg{width:12px;height:12px}
  .stackName{font-size:14px}
  .stackAdd{display:flex;gap:8px;margin-top:10px}
  .stackAdd .fieldInput{flex:1}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<main><div class="shell" id="app"></div></main>
<script>
/* Intake — daily energy-curve prediction (ported from the retired Peak
   tile: circadian shape + caffeine pharmacokinetics), a caffeine log
   (400mg ceiling + half-life decay), and a daily med/supplement stack
   checklist. No network: persists through the dashboard bridge
   (window.Vitality). */
let store={};
const $=id=>document.getElementById(id);
const REDUCED=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function persist(){window.Vitality.save(store);}
function newId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function todayKey(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function hexToRgba(hex,a){
  const h=hex.replace('#','');
  const r=parseInt(h.substring(0,2),16),g=parseInt(h.substring(2,4),16),b=parseInt(h.substring(4,6),16);
  return 'rgba('+r+','+g+','+b+','+a+')';
}

/* transient view state — not persisted, resets each session */
let chartMode='line'; // 'line' | 'bars' | 'stack'
let showBaseline=true;
let sleepHistoryOpen=false;

function spawnStars(){
  const wrap=$('stars');if(!wrap)return;
  let html='';
  for(let i=0;i<40;i++){
    const left=Math.random()*100, top=Math.random()*55, delay=-Math.random()*8;
    html+='<div class="star" style="left:'+left+'%;top:'+top+'%;animation-delay:'+delay+'s"></div>';
  }
  wrap.innerHTML=html;
}

/* ---- shared math helpers ---- */
function clamp(x,a,b){return Math.max(a,Math.min(b,x));}
function nowT(){ const d=new Date(); return d.getHours()+d.getMinutes()/60; }
function clockOf(t){ t=((t%24)+24)%24; let hh=Math.floor(t); const mm=Math.round((t-hh)*60); let m2=mm; if(m2===60){hh+=1;m2=0;} const ap=hh<12?'AM':'PM'; let h12=hh%12; if(h12===0)h12=12; return h12+(m2?':'+String(m2).padStart(2,'0'):'')+' '+ap; }

/* ---- caffeine: today's dose log, keyed by date (resets daily) ---- */
function today(){
  if(!store.caff||typeof store.caff!=='object')store.caff={};
  let d=store.caff[todayKey()];
  if(!d||typeof d!=='object'){d={doses:[]};store.caff[todayKey()]=d;}
  if(!Array.isArray(d.doses))d.doses=[];
  return d;
}
const PRESETS=[

const CAFF_CEIL=400; // FDA-cited safe daily ceiling (mg)
const CLOCK_ICON='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7.5v5l3 2"/></svg>';
function timeChipHtml(id,dataAttr){

    +'</div>';
}

/* one-compartment pharmacokinetic model — the energy curve's caffeine
   boost/rebound (below) reuses bodyAt() rather than re-deriving it. */
const KA=4.0,HALF_LIFE=5,KE=Math.LN2/HALF_LIFE;
function doseAmount(mg,h){ if(h<0)return 0; if(Math.abs(KA-KE)<1e-9)return 0;
  const a=mg*KA/(KA-KE)*(Math.exp(-KE*h)-Math.exp(-KA*h)); return Math.max(0,a); }
function bodyAt(t){ return today().doses.reduce((s,l)=>s+doseAmount(+l.mg||0,t-(+l.t||0)),0); }
function caffTotal(){ return today().doses.reduce((s,l)=>s+(+l.mg||0),0); }

function addDose(mg,label,t){
  mg=Math.round(mg);
  const at=(typeof t==='number'&&isFinite(t))?((t%24)+24)%24:nowT();
  today().doses.push({id:newId(),t:Math.round(at*4)/4,mg,label:label||''});
  persist(); render();
}
/* Reads an optional quick-time field next to a log button: blank means "now"
   (addDose's own default), anything else is parsed and assumed to be
   earlier today — logging a dose after the fact still lands in today's log
   and feeds the decay chart/energy curve at that clock time, not now. */
function doseTimeFrom(el){
  const raw=el&&el.value;
  if(!raw)return undefined;
  const hm=parseQuickTime(raw);
  return hm?parseHM(hm):undefined;
}
function deleteDose(id){
  const d=today(); d.doses=d.doses.filter(l=>String(l.id)!==id); persist(); render();
}

/* ---- rhythm: sleep is logged as discrete wake/bed entries (like Workout's
   bodyweight log), not a live-editing daily setting. The most recently
   logged entry feeds both the caffeine cut-off and the energy curve's
   sleep-quality scaling below. ---- */
function sleepLog(){ if(!Array.isArray(store.sleepLog))store.sleepLog=[]; return store.sleepLog; }
function sleepSorted(){ return sleepLog().slice().sort((a,b)=>a.ts-b.ts); }
function latestSleep(){ const l=sleepLog(); return l.length?l.slice().sort((a,b)=>b.ts-a.ts)[0]:null; }
function wakeStr(){ const l=latestSleep(); return (l&&l.wake)||'07:00'; }
function bedStr(){ const l=latestSleep(); return (l&&l.bed)||'23:00'; }
function parseHM(s){ if(!s)return null; const m=String(s).match(/(\d{1,2}):(\d{2})/); if(!m)return null; return (+m[1])+(+m[2])/60; }
/* Quick keyboard time entry — typed straight into a plain text field instead
   of a native <input type=time>, whose per-segment click-then-type behavior
   is what people were actually complaining "not having to click and
   replace" about. Accepts bare digits ("930", "2130"), a colon ("9:30"),
   and an optional am/pm ("930p", "9:30pm") — always normalizes to 24h
   "HH:MM" so it round-trips through parseHM/wakeStr/bedStr unchanged. */
function parseQuickTime(str){
  if(!str)return null;
  const s=String(str).trim().toLowerCase().replace(/[.\s]/g,'');
  const m=s.match(/^(\d{1,2}):?(\d{2})?(am|pm|a|p)?$/);
  if(!m)return null;
  let hh=+m[1];
  const mm=m[2]!=null?+m[2]:0;
  const ap=m[3];
  if(mm>59)return null;
  if(ap){
    if(hh<1||hh>12)return null;
    hh=hh%12; if(ap[0]==='p')hh+=12;
  } else if(hh>23) return null;
  return String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0');
}
function wakeBed(){ let wake=parseHM(wakeStr()),bed=parseHM(bedStr()); if(wake==null)wake=7; if(bed==null)bed=23; return {wake,bed}; }
function sleepHoursFor(bed,wake){
  const b=parseHM(bed), w=parseHM(wake);
  if(b==null||w==null)return null;
  return ((w-b)+24)%24;
}
function logSleep(wake,bed){
  const hours=sleepHoursFor(bed,wake);
  if(hours==null)return false;
  sleepLog().push({id:newId(),wake,bed,hours:Math.round(hours*100)/100,ts:Date.now()});
  persist();
  return true;
}
function deleteSleepEntry(id){
  store.sleepLog=sleepLog().filter(s=>s.id!==id);
  persist();
}
const SLEEP_TARGET=8; // hours/night reference — matches recScale()'s own s/8 baseline below
function sleepDebt(days){
  const cutoff=Date.now()-days*86400000;
  const entries=sleepLog().filter(s=>s.ts>=cutoff);
  return {debt:entries.reduce((sum,s)=>sum+(SLEEP_TARGET-s.hours),0),nights:entries.length};
}

/* ---- caffeine coaching: ceiling + bed-time cut-off (ported from Peak,
   now that rhythm data lives in this same tile) ---- */
const CLEAR_HRS=HALF_LIFE*1.6; // ~time to fall to a sleep-safe level
function caffCutoff(){ const {bed}=wakeBed(); return ((bed-CLEAR_HRS)%24+24)%24; }
function pastCutoff(){ const {bed}=wakeBed(); const hrsToBed=((bed-nowT())+24)%24; return hrsToBed>0&&hrsToBed<CLEAR_HRS; }
function coachInfo(){
  const total=caffTotal();
  if(total>=CAFF_CEIL) return {warn:true,txt:'At your '+CAFF_CEIL+' mg ceiling — more now risks jitters + a rough crash.'};
  if(pastCutoff()) return {warn:true,txt:'Past cut-off ('+clockOf(caffCutoff())+') — caffeine now costs you deep sleep.'};
  return {warn:false,txt:'Cut-off '+clockOf(caffCutoff())+' · '+Math.round(CAFF_CEIL-total)+' mg left today'};
}

/* ---- circadian energy shape (ported from Peak) ---- */
function recScale(){ const l=latestSleep(); const s=l?l.hours:null; const r=(s==null)?0.78:clamp(s/8,0.3,1); return 0.58+0.42*r; }
function shape(t,wake,bed){
  const L=(((bed-wake)%24)+24)%24 || 16;
  let aw=(((t-wake)%24)+24)%24;
  if(aw>L){ const into=aw-L, sleepLen=24-L||8, mid=sleepLen/2; return 0.12-0.07*(1-Math.abs(into-mid)/mid); }
  const inertia=0.55+0.45*(1-Math.exp(-aw/1.0));
  const decline=1-0.16*(aw/L);
  const winddown=1-0.40*clamp((aw-(L-1.5))/1.5,0,1);
  const dip=0.13*Math.exp(-Math.pow(aw-L*0.45,2)/(2*1.7*1.7));
  const eve=0.07*Math.exp(-Math.pow(aw-(L-4),2)/(2*2.0*2.0));
  return Math.max(0.04,0.92*inertia*decline*winddown-dip+eve);
}
/* net caffeine effect on energy: a boost while it's in your system, then a
   rebound dip below baseline as it clears (adenosine rebound = the crash). */
function caffNet(t){
  const cur=bodyAt(t); let mx=cur;
  for(let dt=0.5;dt<=5;dt+=0.5){ const b=bodyAt(t-dt); if(b>mx)mx=b; }
  const boost=Math.min(22,cur*0.14);
  const rebound=Math.min(13,Math.max(0,mx-cur)*0.10);
  return boost-rebound;
}
function energyAt(t){ const {wake,bed}=wakeBed(); const base=clamp(shape(t,wake,bed)*100*recScale(),1,100); const caf=caffNet(t); return {base,caf,e:clamp(base+caf,1,100)}; }
function buildCurve(){ const a=[]; for(let t=0;t<=24;t+=0.25)a.push(Object.assign({t},energyAt(t))); return a; }
function peakOf(c){ const {wake,bed}=wakeBed(); let best=c[0];
  for(const p of c){ const inDay=bed>wake?(p.t>=wake&&p.t<=bed):(p.t>=wake||p.t<=bed); if(inDay&&p.e>best.e)best=p; }
  if(best.e<=2)for(const p of c)if(p.e>best.e)best=p; return best; }
function statusOf(e){ return e>=80?'Peak zone':e>=62?'Dialed in':e>=45?'Steady':e>=28?'Running low':'Depleted'; }

/* ---- how-you-feel drag log: one value per day, set by dragging the
   now-line on the energy chart. purely a personal log for now — not yet
   fed back into the prediction model. ---- */

  return store.feel[todayKey()];
}
function setFeelToday(v){

}

/* ---- energy chart geometry ---- */
const EW=560,ECX0=10,ECX1=550,ECY0=8,ECY1=95;
function exOf(t){ return ECX0+(clamp(t,0,24)/24)*(ECX1-ECX0); }
function eyOf(e){ return ECY1-(clamp(e,0,100)/100)*(ECY1-ECY0); }

function energyChartHtml(curve,peak,now,nowE){
  const feel=feelToday();
  const nowX=exOf(now);
  let svgInner='';

  if(chartMode==='bars'||chartMode==='stack'){
    const bars=[];
    for(let h=0;h<24;h++)bars.push(Object.assign({h:h+0.5},energyAt(h+0.5)));
    const bw=(ECX1-ECX0)/24;
    svgInner=bars.map(b=>{
      const isNow=Math.abs(b.h-now)<0.6;
      const x=ECX0+(b.h/24)*(ECX1-ECX0)-bw*0.36;
      const w=bw*0.72;
      if(chartMode==='stack'){
        const baseH=clamp(b.base,0,100), totalH=clamp(b.e,0,100);
        const topH=Math.max(0,totalH-baseH);
        const yBaseTop=eyOf(baseH), yTotalTop=eyOf(totalH);
        return '<rect x="'+x.toFixed(1)+'" y="'+yBaseTop.toFixed(1)+'" width="'+w.toFixed(1)+'" height="'+(ECY1-yBaseTop).toFixed(1)+'" class="ebarBase'+(isNow?' now':'')+'"/>'
          +(topH>0.5?'<rect x="'+x.toFixed(1)+'" y="'+yTotalTop.toFixed(1)+'" width="'+w.toFixed(1)+'" height="'+(yBaseTop-yTotalTop).toFixed(1)+'" class="ebar'+(isNow?' now':'')+'"/>':'');
      }
      const y=eyOf(clamp(b.e,0,100));
      return '<rect x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+w.toFixed(1)+'" height="'+(ECY1-y).toFixed(1)+'" class="ebar'+(isNow?' now':'')+'"/>';
    }).join('');
  } else {
    const eline=curve.map((p,i)=>(i?'L':'M')+exOf(p.t).toFixed(1)+' '+eyOf(p.e).toFixed(1)).join(' ');
    const bline=curve.map((p,i)=>(i?'L':'M')+exOf(p.t).toFixed(1)+' '+eyOf(p.base).toFixed(1)).join(' ');

    const feelY=feel?eyOf(feel.v):eyOf(nowE);

      +'<path d="'+area+'" fill="url(#efill)"/>'
      +(showBaseline?'<path d="'+bline+'" class="ebline"/>':'')
      +'<path d="'+eline+'" class="eline"/>'
      +'<line x1="'+nowX.toFixed(1)+'" y1="'+ECY0+'" x2="'+nowX.toFixed(1)+'" y2="'+ECY1+'" class="nowLine"/>'
      +'<circle cx="'+exOf(peak.t).toFixed(1)+'" cy="'+eyOf(peak.e).toFixed(1)+'" r="4" class="epeakd"/>'
      +'<circle cx="'+nowX.toFixed(1)+'" cy="'+eyOf(nowE).toFixed(1)+'" r="3.5" class="enowd"/>'
      +'<circle id="feelDot" cx="'+nowX.toFixed(1)+'" cy="'+feelY.toFixed(1)+'" r="5" class="feelDot" style="opacity:'+(feel?1:0)+'"/>'
      +'<rect class="nowHandle" data-vitality-drag x="'+(nowX-10).toFixed(1)+'" y="'+ECY0+'" width="20" height="'+(ECY1-ECY0)+'"/>';
    tooltip='<div class="logFeelTip" id="feelTip" style="left:'+((nowX/EW)*100).toFixed(1)+'%">'+(feel?('FEELS '+feel.v+' ↕'):'LOG FEEL ↓')+'</div>';
  }
  const grid=[6,12,18].map(h=>'<line x1="'+exOf(h)+'" y1="'+ECY0+'" x2="'+exOf(h)+'" y2="'+ECY1+'" class="grid"/>').join('');
  const labels=[[0,'12a'],[3,'3a'],[6,'6a'],[9,'9a'],[12,'12p'],[15,'3p'],[18,'6p'],[21,'9p'],[24,'12a']]
    .map(a=>'<text x="'+exOf(a[0])+'" y="'+(ECY1+15)+'" class="axl" text-anchor="middle">'+a[1]+'</text>').join('');
  return (chartMode==='line'?'<div class="dragHint">Drag to log feel</div>':'')

    +grid+svgInner+labels+'</svg>'
    +tooltip;
}

function sleepDebtHtml(){
  const {debt,nights}=sleepDebt(7);
  const owed=debt>0.05;
  const ahead=debt<-0.05;
  const num=nights?( (owed?'-':ahead?'+':'') +Math.abs(debt).toFixed(1)+'h'):'—';
  const note=!nights
    ? 'Log a night’s sleep to start tracking debt.'
    : owed
      ? Math.abs(debt).toFixed(1)+'h behind your '+SLEEP_TARGET+'h/night target over the last 7 nights.'
      : ahead
        ? Math.abs(debt).toFixed(1)+'h ahead of your '+SLEEP_TARGET+'h/night target over the last 7 nights.'
        : 'Right on your '+SLEEP_TARGET+'h/night target over the last 7 nights.';
  return '<section class="card" style="animation-delay:490ms"><span class="cardName">Sleep debt</span>'
    +'<div class="decayRow"><div class="decayNow"><span class="n'+(owed?' warn':'')+'">'+num+'</span><span class="l">last 7 nights</span></div></div>'
    +'<p class="coach'+(owed?' warn':'')+'">'+note+'</p>'
    +'</section>';
}

/* ---- caffeine decay chart: mg remaining from now out to +10h, assuming no
   more doses — the visual half-life tracker. ---- */
const CW=560,CX0=10,CX1=550,CY0=8,CY1=60;
function decayChartHtml(){
  const now=nowT(), nowMg=bodyAt(now);
  const HOURS=10, STEP=0.25, N=Math.round(HOURS/STEP);
  const pts=[]; for(let i=0;i<=N;i++)pts.push({h:i*STEP,mg:bodyAt(now+i*STEP)});
  const maxMg=Math.max(nowMg,1,...pts.map(p=>p.mg))*1.1;
  const xOf=h=>CX0+(h/HOURS)*(CX1-CX0);
  const yOf=mg=>CY1-(clamp(mg/maxMg,0,1))*(CY1-CY0);
  const dline=pts.map((p,i)=>(i?'L':'M')+xOf(p.h).toFixed(1)+' '+yOf(p.mg).toFixed(1)).join(' ');
  const area=dline+' L '+xOf(HOURS).toFixed(1)+' '+CY1+' L '+xOf(0).toFixed(1)+' '+CY1+' Z';
  const grid=[2.5,5,7.5].map(h=>'<line x1="'+xOf(h).toFixed(1)+'" y1="'+CY0+'" x2="'+xOf(h).toFixed(1)+'" y2="'+CY1+'" class="grid"/>').join('');
  const labels=[0,2.5,5,7.5,10].map(h=>{
    const label=h===0?'now':clockOf(Math.round((now+h)*2)/2);
    return '<text x="'+xOf(h).toFixed(1)+'" y="'+(CY1+15)+'" class="axl" text-anchor="middle">'+label+'</text>';
  }).join('');
  return '<svg viewBox="0 0 '+CW+' '+(CY1+22)+'" class="chart" role="img" aria-label="Caffeine remaining, by clock time through the evening">'
    +'<defs><linearGradient id="dfill" x1="0" y1="0" x2="0" y2="1">'
    +'<stop offset="0" stop-color="#6EE7B7" stop-opacity=".24"/><stop offset="1" stop-color="#6EE7B7" stop-opacity="0"/></linearGradient></defs>'
    +grid+'<path d="'+area+'" fill="url(#dfill)" class="darea"/><path d="'+dline+'" class="dline"/>'
    +'<circle cx="'+xOf(0).toFixed(1)+'" cy="'+yOf(nowMg).toFixed(1)+'" r="4" class="nowd"/>'
    +labels+'</svg>';
}

function caffeineHtml(){
  const total=caffTotal(), over=total>=CAFF_CEIL, nowMg=Math.round(bodyAt(nowT()));
  const pct=Math.min(100,(total/CAFF_CEIL)*100);
  const c=coachInfo();
  const log=today().doses.slice().sort((a,b)=>a.t-b.t);
  const rows=log.length
    ? '<div class="logList">'+log.map(l=>'<div class="logRow"><div><div class="nm">'+Math.round(l.mg)+' mg <span class="meta">'+(l.label?esc(l.label)+' · ':'')+clockOf(l.t)+'</span></div></div><button class="xBtn" data-del="'+l.id+'" title="Remove">×</button></div>').join('')+'</div>'
    : '<p class="empty">No caffeine logged yet today.</p>';
  return '<section class="card" style="animation-delay:420ms"><h2 class="peakTitle" style="margin-bottom:10px">Caffeine</h2>'
    +'<div class="caffHead"><span class="caffTotal'+(over?' over':'')+'">'+Math.round(total)+' mg</span><span class="caffCeil">of '+CAFF_CEIL+' mg limit</span></div>'
    +'<div class="caffBarTrack"><div class="caffBarFill'+(over?' over':'')+'" style="width:'+pct+'%"></div></div>'
    +'<p class="coach'+(c.warn?' warn':'')+'">'+c.txt+'</p>'
    +'<div class="customAdd"><div class="stepperRow">'
    +'<button type="button" class="miniStepBtn" data-step-target="caffMg" data-step="-5" aria-label="Subtract 5 mg">−</button>'
    +'<input class="fieldInput" id="caffMg" type="number" min="0" step="5" placeholder="mg" />'
    +'<button type="button" class="miniStepBtn" data-step-target="caffMg" data-step="5" aria-label="Add 5 mg">+</button>'
    +'</div><button class="btn-primary" id="caffAdd">Add now</button>'
    +timeChipHtml('caffTime','')
    +'</div>'
    +'<div class="hint" id="hint"></div>'
    +'<div class="decayRow"><div class="decayNow"><span class="n">'+nowMg+'</span><span class="l">mg in system now</span></div>'
    +'<span class="decayHalf">~'+HALF_LIFE+'h half-life</span></div>'
    +decayChartHtml()
    +rows+'</section>';
}

/* ---- daily stack: Celexa 20mg + Creatine by default, one-tap check that
   resets each day (same pattern as Fuel's supplement checklist). ---- */
function stackItems(){
  if(!Array.isArray(store.stack)){
    store.stack=[{id:newId(),name:'Celexa 20mg'},{id:newId(),name:'Creatine'}];
  }
  return store.stack;
}
function stackChecked(){
  if(!store.stackChecks||typeof store.stackChecks!=='object')store.stackChecks={};
  return Array.isArray(store.stackChecks[todayKey()])?store.stackChecks[todayKey()]:[];
}
function setStackChecked(ids){
  if(!store.stackChecks||typeof store.stackChecks!=='object')store.stackChecks={};
  store.stackChecks[todayKey()]=ids;persist();
}
function toggleStack(id){
  const checked=stackChecked();
  const next=checked.includes(id)?checked.filter(x=>x!==id):[...checked,id];
  setStackChecked(next);
}
function addStackItem(name){
  const trimmed=name.trim();if(!trimmed)return;
  stackItems().push({id:newId(),name:trimmed});persist();
}
function deleteStackItem(id){
  store.stack=stackItems().filter(s=>s.id!==id);
  setStackChecked(stackChecked().filter(x=>x!==id));
  persist();
}
function stackHtml(){
  const items=stackItems(),checked=stackChecked();
  const rows=items.map(s=>{
    const isChecked=checked.includes(s.id);
    return '<div class="stackRow'+(isChecked?' checked':'')+'"><div class="stackLeft">'
      +'<button class="checkBtn'+(isChecked?' checked':'')+'" data-toggle-stack="'+s.id+'" title="Toggle taken today">'
      +'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12l5 5L20 6"/></svg></button>'
      +'<span class="stackName">'+esc(s.name)+'</span></div>'
      +'<button class="xBtn" data-del-stack="'+s.id+'" title="Remove">×</button></div>';
  }).join('');
  return '<section class="card" style="animation-delay:0ms"><span class="cardName">Daily stack</span>'
    +'<div class="stackList">'+rows+'</div>'
    +'<div class="stackAdd"><input class="fieldInput" id="stackName" type="text" placeholder="e.g. Vitamin D" autocomplete="off" />'
    +'<button class="btn-primary" id="stackAdd">Add</button></div>'
    +'</section>';
}

function headerHtml(){
  return '<header class="header"><div class="markWrap"><div class="markGlow"></div><div class="mark" aria-hidden="true">'
    +'<svg viewBox="-12 -12 24 24" fill="none" stroke="#0a0a0c" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round">'
    +'<g transform="rotate(45)"><rect x="-9" y="-4.5" width="18" height="9" rx="4.5"/><line x1="0" y1="-4.5" x2="0" y2="4.5"/></g></svg></div></div>'
    +'<div><h1 class="title">Body</h1><p class="subtitle">Energy · Caffeine · Daily stack</p></div></header>';
}
function render(){
  $('app').innerHTML=headerHtml()+stackHtml()+doseGridHtml()
    +'<div class="peakRow">'+peakCardHtml()+caffeineHtml()+'</div>'
    +sleepDebtHtml();
}

document.addEventListener('click',e=>{
  const stepBtn=e.target.closest('[data-step-target]');
  if(stepBtn){
    const id=stepBtn.getAttribute('data-step-target');
    const delta=Number(stepBtn.getAttribute('data-step'));
    const el=$(id);
    if(el){
      let next=Math.max(0,(Number(el.value)||0)+delta);
      next=Math.round(next*100)/100;
      el.value=next;
    }
    return;
  }
  const chartModeBtn=e.target.closest('[data-chart-mode]');
  if(chartModeBtn){ chartMode=chartModeBtn.getAttribute('data-chart-mode'); render(); return; }
  if(e.target.closest('#chartSettings')){ showBaseline=!showBaseline; render(); return; }
  const dosePreset=e.target.closest('[data-dose-preset]');
  if(dosePreset){
    const idx=Number(dosePreset.getAttribute('data-dose-preset'));
    const p=PRESETS[idx];
    if(p)addDose(p.mg,p.name,doseTimeFrom($('doseTime'+idx)));
    return;
  }
  if(e.target.closest('#caffAdd')){
    const el=$('caffMg'), mg=Number(el&&el.value);
    if(!isFinite(mg)||mg<=0){ const h=$('hint'); if(h)h.textContent='Enter a caffeine amount in mg.'; return; }
    addDose(mg,'Custom',doseTimeFrom($('caffTime'))); return;
  }
  const del=e.target.closest('[data-del]');
  if(del){ deleteDose(del.getAttribute('data-del')); return; }
  if(e.target.closest('#logSleepBtn')){
    const wakeEl=$('wake'), bedEl=$('bed');
    const wake=(wakeEl&&parseQuickTime(wakeEl.value))||(wakeEl&&wakeEl.value);
    const bed=(bedEl&&parseQuickTime(bedEl.value))||(bedEl&&bedEl.value);
    logSleep(wake, bed);
    render(); return;
  }
  if(e.target.closest('#toggleSleepHistory')){ sleepHistoryOpen=!sleepHistoryOpen; render(); return; }
  const delSleep=e.target.closest('[data-del-sleep]');
  if(delSleep){ deleteSleepEntry(delSleep.getAttribute('data-del-sleep')); render(); return; }
  if(e.target.closest('#stackAdd')){
    const el=$('stackName');
    addStackItem((el&&el.value)||'');
    if(el)el.value='';
    render(); return;
  }
  const toggleS=e.target.closest('[data-toggle-stack]');
  if(toggleS){ toggleStack(toggleS.getAttribute('data-toggle-stack')); render(); return; }
  const delS=e.target.closest('[data-del-stack]');
  if(delS){ deleteStackItem(delS.getAttribute('data-del-stack')); render(); }
});
document.addEventListener('keydown',e=>{
  if(e.target.id==='stackName'&&e.key==='Enter'){
    e.preventDefault();
    addStackItem(e.target.value||'');
    e.target.value='';render();
  }
  if(e.target.id==='caffMg'&&e.key==='Enter'){
    e.preventDefault();
    const mg=Number(e.target.value);
    if(isFinite(mg)&&mg>0){addDose(mg,'Custom',doseTimeFrom($('caffTime')));e.target.value='';}
  }
});
/* Normalizes the wake/bed quick-time fields to clean 24h "HH:MM" as soon as
   you leave them, so what's on screen always matches what's actually stored
   — typing "930p" then tabbing away shows "21:30", not the raw shorthand.
   blur doesn't bubble, so this listens on the capture phase instead. */
document.addEventListener('blur',e=>{
  const el=e.target;
  if(!el||!el.matches||!el.matches('#wake,#bed'))return;
  const parsed=parseQuickTime(el.value);
  if(parsed)el.value=parsed;
},true);

/* ---- drag-to-log-feel: press and drag the now-line on the energy chart
   (line mode only) to set today's subjective feel reading. Uses SVG
   coordinate transforms so it tracks correctly regardless of the chart's
   rendered (responsive) pixel size. ---- */
function svgPointFromEvent(svg,evt){
  const pt=svg.createSVGPoint();
  pt.x=evt.clientX; pt.y=evt.clientY;
  const ctm=svg.getScreenCTM();
  if(!ctm)return {x:0,y:0};
  const loc=pt.matrixTransform(ctm.inverse());
  return {x:loc.x,y:loc.y};
}
function valueFromY(y){ return clamp((ECY1-y)/(ECY1-ECY0)*100,0,100); }
function previewFeel(v){
  const dot=$('feelDot'), tip=$('feelTip');
  if(dot){ dot.setAttribute('cy',eyOf(v).toFixed(1)); dot.style.opacity='1'; }
  if(tip){ tip.textContent='FEELS '+Math.round(v)+' ↕'; }
}
document.addEventListener('pointerdown',e=>{
  const handle=e.target.closest('.nowHandle');
  if(!handle)return;
  const svg=handle.closest('svg');
  if(!svg)return;
  e.preventDefault();
  const move=ev=>{ const p=svgPointFromEvent(svg,ev); previewFeel(valueFromY(p.y)); };
  const up=ev=>{
    document.removeEventListener('pointermove',move);
    document.removeEventListener('pointerup',up);
    const p=svgPointFromEvent(svg,ev);
    setFeelToday(valueFromY(p.y));
    render();
  };
  document.addEventListener('pointermove',move);
  document.addEventListener('pointerup',up);
  move(e);
});

spawnStars();
(async()=>{const d=await window.Vitality.load();store=(d&&typeof d==='object'&&!Array.isArray(d))?d:{};render();window.Vitality.ready();})();
</script>
