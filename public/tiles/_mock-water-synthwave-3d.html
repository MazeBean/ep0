<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Water — synthwave 3D mock</title>
<style>
  :root{
    --glass:rgba(255,255,255,.055);--stroke:rgba(255,255,255,.14);
    --fg:#f5f6fb;--muted:#a7acc4;
    --cyan:#22D3EE;--pink:#FF3D81;--violet:#8B5CF6;
    --grad:linear-gradient(90deg,var(--cyan),var(--violet) 55%,var(--pink));
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;
    --ease:cubic-bezier(.4,0,.2,1);
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%}
  body{
    background:
      radial-gradient(120% 60% at 50% 0%, #241238 0%, #140b22 42%, #0a0714 70%, #060410 100%);
    color:var(--fg);font:16px/1.6 var(--font);
    display:flex;justify-content:center;padding:64px 28px;position:relative;overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }

  body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
    background:repeating-linear-gradient(0deg,rgba(255,255,255,.035) 0 1px,transparent 1px 3px);
    mix-blend-mode:overlay}

  .stars{position:fixed;inset:0;z-index:0;pointer-events:none}
  .star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;opacity:.5;animation:twinkle 4s ease-in-out infinite}

  .sun{position:fixed;bottom:30vh;left:50%;transform:translateX(-50%);width:240px;height:240px;
    border-radius:50%;z-index:0;pointer-events:none;opacity:.9;
    background:linear-gradient(180deg,#FFE39A 0%,#FFB157 26%,#FF6E8A 55%,#C265F0 82%,#7B5CF6 100%);
    box-shadow:0 0 120px rgba(255,61,129,.35),0 0 220px rgba(139,92,246,.2);
    animation:sunPulse 6s ease-in-out infinite}
  .sun::after{content:'';position:absolute;inset:0;border-radius:50%;
    background:repeating-linear-gradient(0deg,transparent 0 7px,#0a0714 7px 12px);
    -webkit-mask-image:linear-gradient(to bottom,transparent 0%,black 46%);
    mask-image:linear-gradient(to bottom,transparent 0%,black 46%)}
  @keyframes sunPulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.08)}}

  .groundWrap{position:fixed;left:0;right:0;bottom:0;height:44vh;z-index:0;pointer-events:none;overflow:hidden;
    -webkit-mask-image:linear-gradient(to top,black 55%,transparent 100%);
    mask-image:linear-gradient(to top,black 55%,transparent 100%)}
  .ground{position:absolute;inset:-30% -60% 0 -60%;
    background-image:
      linear-gradient(rgba(139,92,246,.55) 1px,transparent 1px),
      linear-gradient(90deg,rgba(34,211,238,.4) 1px,transparent 1px);
    background-size:64px 64px;
    transform:perspective(260px) rotateX(63deg);transform-origin:bottom;
    animation:gridMove 4s linear infinite}
  @keyframes gridMove{from{background-position:0 0,0 0}to{background-position:0 64px,64px 0}}
  .horizonLine{position:fixed;left:0;right:0;bottom:calc(44vh - 1px);height:2px;z-index:0;pointer-events:none;
    background:linear-gradient(90deg,transparent,rgba(255,110,138,.7) 20%,rgba(196,101,240,.8) 50%,rgba(34,211,238,.7) 80%,transparent);
    box-shadow:0 0 20px rgba(255,110,138,.5)}

  /* floating 3D wireframe geometry — real CSS 3D transforms, not flat illusions.
     Two full six-face wireframe cubes tumbling on two axes, plus two thin
     wireframe planes that flip through 3D like a spinning card/diamond. The
     whole layer parallax-shifts opposite the cursor for a sense of depth
     against the static grid/sun behind it. */
  .shapesLayer{position:fixed;inset:0;z-index:0;pointer-events:none;transition:transform .35s ease-out}
  .scene{position:absolute}
  .scene.s1{top:16%;left:9%;width:88px;height:88px;perspective:640px;animation:driftA 20s ease-in-out infinite}
  .scene.s2{top:58%;right:9%;width:64px;height:64px;perspective:560px;animation:driftB 24s ease-in-out infinite}
  .scene.s3{top:22%;right:18%;width:52px;height:52px;perspective:500px;animation:driftA 17s ease-in-out infinite reverse}
  .scene.s4{bottom:16%;left:17%;width:42px;height:42px;perspective:480px;animation:driftB 21s ease-in-out infinite reverse}
  @keyframes driftA{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-16px)}}
  @keyframes driftB{0%,100%{transform:translate(0,0)}50%{transform:translate(-18px,14px)}}

  .cube{position:relative;width:100%;height:100%;transform-style:preserve-3d;animation:spinCube 15s linear infinite}
  .cube .face{position:absolute;inset:0;background:rgba(34,211,238,.05)}
  .scene.s1 .face{border:1.5px solid rgba(34,211,238,.65);box-shadow:0 0 16px rgba(34,211,238,.3) inset}
  .scene.s1 .front{transform:translateZ(44px)}
  .scene.s1 .back{transform:translateZ(-44px) rotateY(180deg)}
  .scene.s1 .right{transform:rotateY(90deg) translateZ(44px)}
  .scene.s1 .left{transform:rotateY(-90deg) translateZ(44px)}
  .scene.s1 .top{transform:rotateX(90deg) translateZ(44px)}
  .scene.s1 .bottom{transform:rotateX(-90deg) translateZ(44px)}

  .scene.s2 .cube{animation-duration:19s;animation-direction:reverse}
  .scene.s2 .face{border:1.5px solid rgba(255,61,129,.6);background:rgba(255,61,129,.05);box-shadow:0 0 14px rgba(255,61,129,.28) inset}
  .scene.s2 .front{transform:translateZ(32px)}
  .scene.s2 .back{transform:translateZ(-32px) rotateY(180deg)}
  .scene.s2 .right{transform:rotateY(90deg) translateZ(32px)}
  .scene.s2 .left{transform:rotateY(-90deg) translateZ(32px)}
  .scene.s2 .top{transform:rotateX(90deg) translateZ(32px)}
  .scene.s2 .bottom{transform:rotateX(-90deg) translateZ(32px)}
  @keyframes spinCube{from{transform:rotateX(0deg) rotateY(0deg)}to{transform:rotateX(360deg) rotateY(360deg)}}

  .plane{position:relative;width:100%;height:100%;transform-style:preserve-3d;
    border:1.5px solid rgba(139,92,246,.65);background:rgba(139,92,246,.06);
    box-shadow:0 0 16px rgba(139,92,246,.3) inset;
    animation:flipPlane 9s linear infinite}
  .scene.s4 .plane{border-color:rgba(34,211,238,.6);background:rgba(34,211,238,.06);
    box-shadow:0 0 14px rgba(34,211,238,.28) inset;animation-duration:12s;animation-direction:reverse}
  @keyframes flipPlane{0%{transform:rotate(45deg) rotateY(0deg)}100%{transform:rotate(45deg) rotateY(360deg)}}

  @keyframes twinkle{0%,100%{opacity:.2}50%{opacity:.85}}
  @media(prefers-reduced-motion:reduce){
    .ground,.sun,.star,.cube,.plane,.scene{animation:none!important}
    .shapesLayer{transform:none!important}
  }

  .shell{position:relative;z-index:1;width:100%;max-width:640px}

  .header{display:flex;align-items:center;gap:18px;margin-bottom:30px}
  .markWrap{position:relative;width:56px;height:56px;flex-shrink:0}
  .markGlow{position:absolute;inset:-10px;border-radius:16px;background:var(--grad);filter:blur(16px);opacity:.6}
  .markOrb{position:relative;width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--cyan),var(--violet) 55%,var(--pink));
    display:flex;align-items:center;justify-content:center;box-shadow:0 6px 30px rgba(139,92,246,.45);
    border:1px solid rgba(255,255,255,.35)}
  .markOrb svg{width:26px;height:26px}
  .title{font-size:27px;font-weight:800;margin:0;letter-spacing:-.01em;
    background:linear-gradient(90deg,#eaf6ff,var(--cyan) 40%,var(--pink));
    -webkit-background-clip:text;background-clip:text;color:transparent}
  .subtitle{color:var(--muted);font-size:13.5px;margin:6px 0 0;letter-spacing:.02em}

  .glass{position:relative;border-radius:20px;background:var(--glass);border:1px solid var(--stroke);
    -webkit-backdrop-filter:blur(22px) saturate(150%);backdrop-filter:blur(22px) saturate(150%);
    box-shadow:0 1px 0 rgba(255,255,255,.08) inset,0 18px 46px rgba(0,0,0,.55);
    padding:24px 22px;margin-bottom:16px}

  .ringCard{display:flex;align-items:center;gap:24px}
  .ringBox{position:relative;width:164px;height:164px;flex-shrink:0}
  .ringBox svg{width:100%;height:100%;transform:rotate(-90deg)}
  .ringBox .ringVal{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ringVal .num{font-size:27px;font-weight:700;color:var(--fg);letter-spacing:-.01em}
  .ringVal .unit{font-size:12px;color:var(--muted);margin-top:2px}
  .ringMeta{flex:1;min-width:0}
  .ringMeta .goal{font-size:13.5px;color:var(--muted);margin:0 0 8px}
  .pct{font-size:32px;font-weight:800;color:var(--fg)}
  .pctLbl{font-size:12.5px;color:var(--muted);margin-top:2px}

  .stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px}
  .stat{border-radius:16px;background:var(--glass);border:1px solid var(--stroke);
    -webkit-backdrop-filter:blur(18px);backdrop-filter:blur(18px);padding:16px 14px;text-align:center}
  .statNum{font-size:21px;font-weight:700;color:var(--fg)}
  .statLbl{color:var(--muted);font-size:12px;margin-top:6px}

  .cardName{font-size:12.5px;color:var(--muted);display:block;margin-bottom:14px;font-weight:600;letter-spacing:.02em}
  .quickRow{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .quickBtn{
    border-radius:12px;border:1px solid rgba(255,255,255,.28);background:rgba(255,255,255,.06);
    color:var(--fg);padding:10px 18px;font:inherit;font-size:14px;font-weight:600;cursor:pointer;
    transition:border-color .18s var(--ease),box-shadow .18s var(--ease),transform .18s var(--ease);
  }
  .quickBtn:hover{border-color:var(--cyan);box-shadow:0 0 0 1px var(--cyan),0 8px 22px rgba(34,211,238,.25);transform:translateY(-2px)}

  .row{display:flex;gap:12px;align-items:center}
  .field{flex:1}
  input[type=number]{
    width:100%;background:rgba(0,0,0,.32);border:1px solid var(--stroke);color:var(--fg);
    border-radius:12px;padding:12px 15px;font:inherit;font-size:15px;
  }
  input::placeholder{color:#767b96}
  input:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 3px rgba(34,211,238,.18)}
  .btn-primary{
    background:var(--grad);color:#0a0714;border:none;font-weight:700;border-radius:12px;
    padding:12px 20px;font:inherit;font-size:14.5px;cursor:pointer;white-space:nowrap;
    box-shadow:0 8px 24px rgba(139,92,246,.4);transition:transform .18s var(--ease),box-shadow .18s var(--ease);
  }
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(255,61,129,.45)}

  .logHead{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin:0 0 14px}
  .sectionTitle{font-weight:700;font-size:16px;margin:0;color:var(--fg)}
  .count{font-size:12.5px;color:var(--muted)}
  .log{display:flex;flex-direction:column;gap:8px}
  .entry{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 15px;
    border-radius:12px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.09);
    border-left:3px solid var(--cyan)}
  .entryAmt{font-size:14.5px;font-weight:600;color:var(--fg)}
  .entryMeta{font-size:12px;color:var(--muted);margin-left:10px}
  .xBtn{background:transparent;border:1px solid rgba(255,255,255,.16);color:var(--muted);width:24px;height:24px;
    border-radius:50%;cursor:pointer;flex-shrink:0;line-height:1;transition:color .15s,border-color .15s}
  .xBtn:hover{color:var(--pink);border-color:var(--pink)}
  .empty{color:var(--muted);font-size:13.5px;padding:6px 2px}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="sun"></div>
<div class="groundWrap"><div class="ground"></div></div>
<div class="horizonLine"></div>
<div class="shapesLayer" id="shapesLayer">
  <div class="scene s1"><div class="cube">
    <div class="face front"></div><div class="face back"></div><div class="face right"></div>
    <div class="face left"></div><div class="face top"></div><div class="face bottom"></div>
  </div></div>
  <div class="scene s2"><div class="cube">
    <div class="face front"></div><div class="face back"></div><div class="face right"></div>
    <div class="face left"></div><div class="face top"></div><div class="face bottom"></div>
  </div></div>
  <div class="scene s3"><div class="plane"></div></div>
  <div class="scene s4"><div class="plane"></div></div>
</div>
<main><div class="shell" id="app"></div></main>
<script>
/* Synthwave + 3D geometry mock — same readable glass-panel UI as the plain
   synthwave version, with real CSS 3D wireframe cubes/planes tumbling in the
   background and a subtle cursor-parallax on that whole layer. Preview only,
   standalone (falls back to sample data). */
const GOAL_ML=2000;
const QUICK=[250,350,500];
const CIRC=2*Math.PI*72;
let entries=[
  {id:'a',ml:350,ts:Date.now()-3*3600e3},
  {id:'b',ml:500,ts:Date.now()-1.5*3600e3},
  {id:'c',ml:250,ts:Date.now()-0.4*3600e3},
];
const $=id=>document.getElementById(id);
const REDUCED=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
function persist(){if(window.Vitality)window.Vitality.save(entries);}
function newId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function when(ts){const d=new Date(ts);return d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});}
function dayKey(ts){const d=new Date(ts);return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function todayEntries(){const k=dayKey(Date.now());return entries.filter(e=>dayKey(e.ts)===k);}
function todayTotal(){return todayEntries().reduce((s,e)=>s+e.ml,0);}
function streak(){return 4;}
function sevenDayAvg(){return 1840;}

function spawnStars(){
  const wrap=$('stars');if(!wrap)return;
  let html='';
  for(let i=0;i<50;i++){
    const left=Math.random()*100, top=Math.random()*55, delay=-Math.random()*4;
    html+='<div class="star" style="left:'+left+'%;top:'+top+'%;animation-delay:'+delay+'s"></div>';
  }
  wrap.innerHTML=html;
}
function initParallax(){
  if(REDUCED)return;
  const layer=$('shapesLayer');if(!layer)return;
  document.addEventListener('mousemove',e=>{
    const dx=(e.clientX/window.innerWidth-0.5);
    const dy=(e.clientY/window.innerHeight-0.5);
    layer.style.transform='translate('+(-dx*26).toFixed(1)+'px,'+(-dy*20).toFixed(1)+'px)';
  });
}

function headerHtml(){
  return '<header class="header"><div class="markWrap"><div class="markGlow"></div><div class="markOrb" aria-hidden="true">'
    +'<svg viewBox="0 0 24 24" fill="#0a0714"><path d="M12 2c0 0-7 8.5-7 13a7 7 0 0 0 14 0c0-4.5-7-13-7-13z"/></svg>'
    +'</div></div><div><h1 class="title">Water</h1><p class="subtitle">Daily hydration</p></div></header>';
}
function ringHtml(){
  const total=todayTotal();
  const pct=Math.min(1,total/GOAL_ML);
  const offset=CIRC*(1-pct);
  return '<section class="glass ringCard">'
    +'<div class="ringBox"><svg viewBox="0 0 164 164">'
    +'<circle cx="82" cy="82" r="72" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="13"/>'
    +'<circle cx="82" cy="82" r="72" fill="none" stroke="url(#g)" stroke-width="13" stroke-linecap="round" '
    +'stroke-dasharray="'+CIRC.toFixed(1)+'" stroke-dashoffset="'+offset.toFixed(1)+'" '
    +'style="filter:drop-shadow(0 0 10px rgba(139,92,246,.5));transition:stroke-dashoffset .7s cubic-bezier(.4,0,.2,1)"/>'
    +'<defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">'
    +'<stop offset="0%" stop-color="#22D3EE"/><stop offset="55%" stop-color="#8B5CF6"/><stop offset="100%" stop-color="#FF3D81"/>'
    +'</linearGradient></defs></svg>'
    +'<div class="ringVal"><div class="num">'+total.toLocaleString()+'</div><div class="unit">ml today</div></div></div>'
    +'<div class="ringMeta"><div class="pct">'+Math.round(pct*100)+'%</div><div class="pctLbl">of daily goal</div>'
    +'<p class="goal">Goal '+GOAL_ML.toLocaleString()+' ml</p></div>'
    +'</section>';
}
function statsHtml(){
  return '<section class="stats">'
    +'<div class="stat"><div class="statNum">'+streak()+'</div><div class="statLbl">Day streak</div></div>'
    +'<div class="stat"><div class="statNum">'+sevenDayAvg().toLocaleString()+'</div><div class="statLbl">7-day avg ml</div></div>'
    +'</section>';
}
function formHtml(){
  const chips=QUICK.map(ml=>'<button class="quickBtn" data-quick="'+ml+'">+'+ml+' ml</button>').join('');
  return '<section class="glass"><span class="cardName">Log water</span>'
    +'<div class="quickRow">'+chips+'</div>'
    +'<div class="row"><div class="field">'
    +'<input type="number" id="amount" min="0" placeholder="Custom amount (ml)" /></div>'
    +'<button class="btn-primary" id="add">Add</button></div>'
    +'</section>';
}
function logInner(){
  const today=todayEntries().slice().sort((a,b)=>b.ts-a.ts);
  if(!today.length)return '<p class="empty">No water logged today. Add your first cup above.</p>';
  return today.map(e=>
    '<div class="entry"><div><span class="entryAmt">'+e.ml+' ml</span><span class="entryMeta">'+when(e.ts)+'</span></div>'
    +'<button class="xBtn" data-del="'+e.id+'" title="Remove">×</button></div>'
  ).join('');
}
function logHtml(){
  const today=todayEntries();
  return '<section class="glass"><div class="logHead"><h2 class="sectionTitle">Today</h2>'
    +'<span class="count">'+(today.length?today.length+(today.length===1?' entry':' entries'):'empty')+'</span></div>'
    +'<div class="log" id="log">'+logInner()+'</div></section>';
}
function render(){$('app').innerHTML=headerHtml()+ringHtml()+statsHtml()+formHtml()+logHtml();}

function addAmount(ml){
  if(!ml||ml<=0)return;
  entries.push({id:newId(),ml,ts:Date.now()});
  persist();render();
}
function addCustom(){
  const ml=parseInt($('amount').value,10);
  if(ml>0)addAmount(ml);
}

document.addEventListener('click',e=>{
  const quick=e.target.closest('[data-quick]');
  if(quick){addAmount(parseInt(quick.getAttribute('data-quick'),10));return;}
  if(e.target.closest('#add')){addCustom();return;}
  const del=e.target.closest('[data-del]');
  if(del){const id=del.getAttribute('data-del');entries=entries.filter(en=>en.id!==id);persist();render();}
});
document.addEventListener('keydown',e=>{if(e.target.id==='amount'&&e.key==='Enter'){e.preventDefault();addCustom();}});

spawnStars();
initParallax();
(async()=>{
  if(window.Vitality){const d=await window.Vitality.load();if(Array.isArray(d)&&d.length)entries=d;}
  render();
})();
</script>
</body>
</html>
