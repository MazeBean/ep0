<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Calendar</title>
<style>
  :root{
    --bg:#0a0a0c;--surface:rgba(255,255,255,.02);--border:rgba(255,255,255,.08);--brand:#6EE7B7;
    --brand-soft:rgba(110,231,183,.08);--brand-line:rgba(110,231,183,.3);
    --muted:#8a8a90;--muted-strong:#a8a8b0;--fg:#ededf0;--neg:#ff6b6b;--neg-line:rgba(255,107,107,.4);
    --today:#6EE7B7;--track:#17171b;--radius-md:12px;--radius-pill:999px;
    --font-display:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;
    --font-mono:ui-monospace,SFMono-Regular,Menlo,"JetBrains Mono",monospace;
    --font-serif:Georgia,"Iowan Old Style","Times New Roman",serif;
    --ease:cubic-bezier(.4,0,.2,1);
  }
  *{box-sizing:border-box}
  h1,h2,h3,p{margin:0}
  html,body{margin:0;height:100%;scrollbar-gutter:stable}
  body{background:radial-gradient(120% 60% at 50% 0%,#17171b 0%,#101013 42%,#0a0a0c 70%,#08080a 100%);
    color:var(--fg);font:15px/1.5 var(--font-display);display:flex;justify-content:center;padding:40px 20px;
    position:relative;overflow-x:hidden;overflow-y:hidden;-webkit-font-smoothing:antialiased}
  body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
    background:repeating-linear-gradient(0deg,rgba(255,255,255,.03) 0 1px,transparent 1px 3px);mix-blend-mode:overlay}
  /* Same slow drifting mint wash as the home dashboard's own background
     (dashboard.module.css's .page::before/canvasDrift), so this tile doesn't
     feel like a flatter, separate world from the tab it opened out of. */
  body::after{content:'';position:fixed;inset:-10% -5%;z-index:0;pointer-events:none;
    background:radial-gradient(ellipse 50% 35% at 70% 20%,rgba(110,231,183,.06),transparent 65%),
      radial-gradient(ellipse 40% 30% at 20% 80%,rgba(110,231,183,.04),transparent 70%);
    animation:canvasDrift 60s ease-in-out infinite alternate}
  @keyframes canvasDrift{from{transform:translate3d(0,0,0)}to{transform:translate3d(-2%,1%,0)}}
  @media(prefers-reduced-motion:reduce){body::after{animation:none}}
  /* body's flex+justify-content:center makes its only child (main) shrink-wrap
     to content width instead of filling the row — main needs an explicit width
     so .shell's own width:100% has something real to resolve against. */
  main{width:100%}
  .stars{position:fixed;inset:0;z-index:0;pointer-events:none}
  .star{position:absolute;width:2px;height:2px;background:#cfd0d6;border-radius:50%;opacity:.4;animation:twinkle 8s ease-in-out infinite}
  @keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.5}}
  @media(prefers-reduced-motion:reduce){.star,.markOrb,.markGlow{animation:none!important}.progressWrap,.stat,.card{transition:none}}
  .shell{position:relative;z-index:1;width:100%;max-width:none;min-width:0}
  /* "Add a task" and the task buckets (Overdue/Upcoming/No due date) sit side
     by side on a wide PC viewport instead of stacking — a fixed pairing
     rather than relying on CSS column-balancing, so they're guaranteed
     adjacent regardless of how tall either card ends up. */
  .taskRow{display:block}
  @media(min-width:820px){
    .taskRow{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
  }
  .header{display:flex;align-items:center;gap:14px;margin-bottom:12px}
  .markWrap{position:relative;width:44px;height:44px;flex-shrink:0}
  .markGlow{position:absolute;inset:-10px;border-radius:50%;background:var(--brand);filter:blur(14px);opacity:.4;
    animation:glowBreathe 4.5s ease-in-out infinite}
  @keyframes glowBreathe{0%,100%{opacity:.28;transform:scale(.92)}50%{opacity:.5;transform:scale(1.06)}}
  .mark{position:relative;width:44px;height:44px;flex-shrink:0;border-radius:50%;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 35% 30%,#e4e5ea,var(--brand) 46%,#6d6f76 100%);box-shadow:0 0 26px rgba(0,0,0,.5);
    animation:sway 7s ease-in-out infinite}
  @keyframes sway{0%,100%{transform:rotate(-3deg) translateY(0)}50%{transform:rotate(3deg) translateY(-2px)}}
  .mark svg{width:22px;height:22px}
  .title{font-family:var(--font-serif);font-style:italic;font-size:40px;font-weight:600;line-height:1;letter-spacing:-.01em;margin:0}
  .subtitle{color:var(--muted);font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;margin:5px 0 0}
  .stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:10px}
  .stat{min-width:0;position:relative;border:1px solid var(--border);border-radius:var(--radius-md);background:var(--surface);padding:10px 12px;text-align:center;
    overflow:hidden;transition:border-color .2s var(--ease)}
  .stat:hover,.card:hover{border-color:var(--brand-line);box-shadow:0 0 0 1px var(--brand-line) inset}
  .statNum{font-size:20px;font-weight:600;letter-spacing:-.01em}
  .statNum.brand{color:var(--today)}
  .statLbl{color:var(--muted);font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;margin-top:3px}
  .card{position:relative;border:1px solid var(--border);border-radius:16px;background:var(--surface);padding:12px;margin-bottom:10px;
    overflow:hidden;transition:border-color .2s var(--ease)}
  /* Panel load-in — same recipe as the home dashboard's overview cards (a
     slight overshoot + a brief mint border/glow flash before settling), just
     without the ripple/ping rings that only make sense on that 6-card grid.
     Each card's own inline animation-delay staggers them in render order. */
  /* Two separate animations, not one: cardIn (forwards) owns opacity/transform
     so the reveal sticks; cardFlash has no fill-mode, so once its one pass
     ends the browser drops it and border-color/box-shadow revert to the
     normal cascade — including :hover. A forwards-filled animation freezes
     its last keyframe at "animation" priority (above normal author rules
     regardless of specificity), so if cardFlash also used forwards its
     frozen border-color would permanently block :hover from ever applying
     again. The single animation-delay set inline per card still staggers
     both animations — with two names it cycles to cover both (spec). */
  .card{opacity:0;animation:cardIn .65s cubic-bezier(.16,1,.3,1) forwards,cardFlash .65s cubic-bezier(.16,1,.3,1)}
  @keyframes cardIn{
    0%{opacity:0;transform:translateY(14px) scale(.94)}
    55%{opacity:1;transform:translateY(-2px) scale(1.015)}
    100%{opacity:1;transform:translateY(0) scale(1)}
  }
  @keyframes cardFlash{
    0%{border-color:var(--border);box-shadow:none}
    55%{border-color:rgba(110,231,183,.55);box-shadow:0 0 0 1px rgba(110,231,183,.25),0 10px 26px -14px rgba(110,231,183,.4)}
    100%{border-color:var(--border);box-shadow:none}
  }
  @media(prefers-reduced-motion:reduce){.card{animation:none!important;opacity:1!important}}
  .cardName{font-family:var(--font-mono);font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#fff;display:block;margin-bottom:10px}
  .row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
  .field{flex:1;min-width:140px}
  @media(max-width:640px){
    .row{flex-direction:column;align-items:stretch}
    /* the due-date field carries an inline flex-basis for its desktop width;
       override it so column-direction stacking uses width, not a 140px row height */
    .row .field{width:100%;flex:1 1 auto!important}
  }
  .fieldLbl{display:block;font-size:11px;color:var(--muted);margin-bottom:6px}
  input[type=text]{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--fg);
    border-radius:10px;padding:10px 12px;font:inherit}
  input:focus{outline:none;border-color:var(--brand)}
  input::placeholder{color:#55555c}
  .btn-primary{background:var(--brand);color:#0a0a0c;border:none;font-weight:600;border-radius:10px;padding:10px 16px;font:inherit;cursor:pointer;white-space:nowrap}
  .hint{color:var(--neg);font-size:12px;font-family:var(--font-mono);min-height:14px;margin:6px 2px 0}
  .logHead{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin:0 0 8px}
  .sectionTitle{font-weight:700;font-size:17px;margin:0}
  .count{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;color:var(--muted)}
  .log{display:flex;flex-direction:column;gap:6px}
  .entry{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:9px 12px;border:1px solid var(--border);
    border-left:3px solid var(--brand-line);border-radius:var(--radius-md);background:var(--surface)}
  .entryLeft{display:flex;align-items:center;gap:12px;min-width:0}
  .checkBtn{background:transparent;border:1.5px solid var(--border);color:transparent;width:22px;height:22px;border-radius:50%;
    cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:border-color .15s,background .15s}
  .checkBtn:hover{border-color:var(--brand);background:var(--brand-soft)}
  .checkBtn svg{width:12px;height:12px}
  .entryContent{font-size:14.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .entryDue{font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;color:var(--muted);white-space:nowrap;flex-shrink:0}
  .xBtn{background:transparent;border:1px solid var(--border);color:var(--muted);width:26px;height:26px;border-radius:50%;cursor:pointer;flex-shrink:0;line-height:1}
  .xBtn:hover{color:var(--neg);border-color:var(--neg-line)}
  .empty{color:var(--muted);font-size:13px;padding:14px 0}
  .notConnected{color:var(--muted-strong);font-size:13.5px;line-height:1.6}
  .notConnected code{font-family:var(--font-mono);background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:2px 6px;color:var(--fg)}

  .weekGrid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
  @media(max-width:640px){.weekGrid{grid-template-columns:repeat(2,1fr);row-gap:16px}}
  .dayCol{display:flex;flex-direction:column;gap:8px;min-width:0}
  .dayHead{text-align:center;padding-bottom:9px;border-bottom:1px solid var(--border)}
  .dayHead .wd{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.06em;color:var(--muted);display:block}
  .dayHead .dn{font-size:19px;font-weight:700;margin-top:3px}
  .dayCol.today .dayHead{border-bottom-color:var(--today)}
  .dayCol.today .dn{color:var(--today)}
  .dayChips{display:flex;flex-direction:column;gap:6px;min-height:32px}
  .chip{position:relative;background:var(--bg);border:1px solid var(--border);border-radius:9px;
    padding:9px 20px 9px 10px;font-size:13px;line-height:1.4;cursor:pointer;transition:border-color .15s,background .15s}
  .chip:hover{border-color:var(--brand-line);background:var(--brand-soft)}
  .chip .chipText{display:block;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical}
  .chip .chipDel{position:absolute;top:2px;right:4px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;line-height:1;padding:4px}
  .chip .chipDel:hover{color:var(--neg)}
  .dayEmpty{color:#4a4a50;font-size:19px;text-align:center;padding:8px 0}
  .bucketRow{display:flex;flex-direction:column;gap:6px;margin-top:14px}
  .bucketRow:first-of-type{margin-top:0}
  .bucketLbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;color:var(--muted)}
  .bucketList{display:flex;flex-wrap:wrap;gap:6px}
  .bucketChip{position:relative;background:var(--bg);border:1px solid var(--border);border-left:3px solid var(--muted);border-radius:8px;
    padding:6px 26px 6px 10px;font-size:12px;cursor:pointer;max-width:100%}
  .bucketChip.overdue{border-left-color:var(--neg)}
  .bucketChip:hover{border-color:var(--brand-line)}
  .bucketChip .chipText{display:block}
  .bucketChip .entryDue{display:block;margin-top:3px}
  .bucketChip .chipDel{position:absolute;top:2px;right:4px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;line-height:1;padding:3px}
  .bucketChip .chipDel:hover{color:var(--neg)}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<main><div class="shell" id="app"></div></main>
<script>
/* Todoist — a real task list, not offline sample data. A sealed tile has no
   network, so window.Vitality.todoist.* relays through the dashboard's own
   page (see lib/tiles/tileBridge.ts + lib/tiles/useTileHost.ts), which calls
   app/api/todoist server-side where TODOIST_TOKEN is held privately. */
let tasks=[];
let status='loading'; // 'loading' | 'ok' | 'unavailable'
const $=id=>document.getElementById(id);
const REDUCED=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function spawnStars(){
  const wrap=$('stars');if(!wrap)return;
  let html='';
  for(let i=0;i<40;i++){
    const left=Math.random()*100, top=Math.random()*55, delay=-Math.random()*8;
    html+='<div class="star" style="left:'+left+'%;top:'+top+'%;animation-delay:'+delay+'s"></div>';
  }
  wrap.innerHTML=html;
}
function dayKey(d){return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
/* Todoist's all-day due date (and this tile's own date-input) is a plain
   "YYYY-MM-DD" string with no time/zone component. new Date() parses that
   shape as UTC midnight, which lands on the PREVIOUS calendar day once
   converted to local time in any negative-UTC-offset timezone — a task due
   "today" could read as overdue. Parse the y/m/d as local instead. */
function parseDue(due){
  if(!due)return null;
  const m=/^(\d{4})-(\d{2})-(\d{2})$/.exec(due);
  if(m)return new Date(Number(m[1]),Number(m[2])-1,Number(m[3]));
  const d=new Date(due);
  return isNaN(d.getTime())?null:d;
}
function isOverdue(due){
  const d=parseDue(due);
  if(!d)return false;
  const today=new Date();today.setHours(0,0,0,0);
  return d<today && dayKey(d)!==dayKey(new Date());
}
function isToday(due){
  const d=parseDue(due);
  if(!d)return false;
  return dayKey(d)===dayKey(new Date());
}
function dueLabel(due){
  const d=parseDue(due);
  if(!d)return due||'';
  if(isToday(due))return 'today';
  const dateStr=d.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'});
  return isOverdue(due)?dateStr+' (overdue)':dateStr;
}

/* ---- the next-7-days calendar grid ---- */
function weekDays(){
  const days=[];
  const base=new Date();base.setHours(0,0,0,0);
  for(let i=0;i<7;i++){const d=new Date(base);d.setDate(base.getDate()+i);days.push(d);}
  return days;
}
function groupTasks(){
  const days=weekDays();
  const map={};
  days.forEach(d=>{map[dayKey(d)]=[];});
  const overdue=[], later=[], undated=[];
  const first=days[0], last=days[days.length-1];
  for(const t of tasks){
    const d=parseDue(t.due);
    if(!d){undated.push(t);continue;}
    d.setHours(0,0,0,0);
    const k=dayKey(d);
    if(map[k]){map[k].push(t);continue;}
    if(d<first){overdue.push(t);continue;}
    if(d>last){later.push(t);continue;}
    undated.push(t);
  }
  return {days,map,overdue,later,undated};
}
function chipHtml(t,cls,showDue){
  const due=showDue?'<span class="entryDue">'+esc(dueLabel(t.due))+'</span>':'';
  return '<div class="'+(cls||'chip')+'" data-complete="'+t.id+'">'
    +'<span class="chipText">'+esc(t.content)+'</span>'
    +due
    +'<button class="chipDel" data-del="'+t.id+'" title="Delete">×</button>'
    +'</div>';
}
function weekGridHtml(){
  const {days,map}=groupTasks();
  const todayKey=dayKey(new Date());
  const cols=days.map(d=>{
    const k=dayKey(d);
    const isToday=k===todayKey;
    const items=map[k];
    const chips=items.length?items.map(t=>chipHtml(t)).join(''):'<div class="dayEmpty">·</div>';
    return '<div class="dayCol'+(isToday?' today':'')+'"><div class="dayHead">'
      +'<span class="wd">'+d.toLocaleDateString(undefined,{weekday:'short'})+'</span>'
      +'<span class="dn">'+d.getDate()+'</span></div>'
      +'<div class="dayChips">'+chips+'</div></div>';
  }).join('');
  return '<section class="card" style="animation-delay:0ms"><span class="cardName">Next 7 days</span><div class="weekGrid">'+cols+'</div></section>';
}
function bucketsHtml(){
  const {overdue,later,undated}=groupTasks();
  if(!overdue.length&&!later.length&&!undated.length)return '';
  const bucket=(label,items,cls,showDue)=>{
    if(!items.length)return '';
    return '<div class="bucketRow"><span class="bucketLbl">'+label+'</span><div class="bucketList">'
      +items.map(t=>chipHtml(t,'bucketChip'+(cls?' '+cls:''),showDue)).join('')+'</div></div>';
  };
  return '<section class="card" style="animation-delay:180ms">'
    +bucket('Overdue',overdue,'overdue',true)
    +bucket('Upcoming',later,'',true)
    +bucket('No due date',undated,'')
    +'</section>';
}

function headerHtml(){
  return '<header class="header"><div class="markWrap"><div class="markGlow"></div><div class="mark" aria-hidden="true">'
    +'<svg viewBox="-12 -12 24 24" fill="none" stroke="#0a0a0c" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">'
    +'<path d="M-8 -1 L-4 3 L8 -8"/></svg></div></div>'
    +'<div><h1 class="title">Calendar</h1><p class="subtitle">Tasks</p></div></header>';
}
function statsHtml(){
  const todayCount=tasks.filter(t=>isToday(t.due)).length;
  const overdueCount=tasks.filter(t=>isOverdue(t.due)).length;
  return '<section class="stats">'
    +'<div class="stat"><div class="statNum">'+tasks.length+'</div><div class="statLbl">Open</div></div>'
    +'<div class="stat"><div class="statNum'+(overdueCount?' brand':'')+'">'+todayCount+'</div><div class="statLbl">Due today</div></div>'
    +'</section>';
}
function formHtml(){
  return '<section class="card" style="animation-delay:90ms"><span class="cardName">Add a task</span>'
    +'<div class="row"><div class="field"><label class="fieldLbl">Task</label><input type="text" id="content" placeholder="e.g. buy milk" autocomplete="off" /></div>'
    +'<div class="field" style="flex:0 0 160px;min-width:140px"><label class="fieldLbl">Date</label><input type="date" id="due" /></div>'
    +'<button class="btn-primary" id="add">Add</button></div>'
    +'<div class="hint" id="hint"></div>'
    +'</section>';
}
function notConnectedHtml(){
  return '<section class="card"><span class="cardName">Todoist</span>'
    +'<p class="notConnected">Not connected yet. Add <code>TODOIST_TOKEN</code> as an env var '
    +'(Todoist → Settings → Integrations → Developer for your token), then reload.</p>'
    +'</section>';
}
function render(){
  if(status==='unavailable'){
    $('app').innerHTML=headerHtml()+notConnectedHtml();
    return;
  }
  $('app').innerHTML=headerHtml()+statsHtml()+weekGridHtml()+'<div class="taskRow">'+formHtml()+bucketsHtml()+'</div>';
}

async function refresh(){
  try{
    tasks=await window.Vitality.todoist.list();
    if(!Array.isArray(tasks))tasks=[];
    status='ok';
  }catch(err){
    status='unavailable';
  }
  render();
  window.Vitality.ready();
}

async function addTask(){
  const contentEl=$('content'), dueEl=$('due');
  const content=(contentEl.value||'').trim();
  if(!content){$('hint').textContent='Write a task first.';contentEl.focus();return;}
  const due=(dueEl.value||'').trim();
  try{
    await window.Vitality.todoist.add(content,due||undefined);
    contentEl.value='';dueEl.value='';
    await refresh();
  }catch(err){
    $('hint').textContent='Could not add that task.';
  }
}
/* Optimistic: update the local list + render immediately so the chip
   vanishes the instant you click, instead of waiting on the remove/complete
   round-trip AND a full re-list before the UI moves at all. Re-syncs with
   the server in the background; rolls back only if the actual call fails. */
async function completeTask(id){
  const prev=tasks;
  tasks=tasks.filter(t=>String(t.id)!==String(id));
  render();
  try{ await window.Vitality.todoist.complete(id); }
  catch(err){ tasks=prev; render(); return; }
  refresh();
}
async function deleteTask(id){
  const prev=tasks;
  tasks=tasks.filter(t=>String(t.id)!==String(id));
  render();
  try{ await window.Vitality.todoist.remove(id); }
  catch(err){ tasks=prev; render(); return; }
  refresh();
}

document.addEventListener('click',e=>{
  if(e.target.closest('#add')){addTask();return;}
  // data-del is checked first: in the calendar chips it's a button NESTED
  // inside the chip's own data-complete div, so it must win over the parent.
  const del=e.target.closest('[data-del]');
  if(del){deleteTask(del.getAttribute('data-del'));return;}
  const complete=e.target.closest('[data-complete]');
  if(complete){completeTask(complete.getAttribute('data-complete'));return;}
});
document.addEventListener('input',e=>{if(e.target.id==='content'||e.target.id==='due'){const h=$('hint');if(h&&h.textContent)h.textContent='';}});
document.addEventListener('keydown',e=>{if((e.target.id==='content'||e.target.id==='due')&&e.key==='Enter'){e.preventDefault();addTask();}});

spawnStars();
render();
refresh();
</script>
</body>
</html>
