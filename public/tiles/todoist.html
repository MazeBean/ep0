<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Calendar</title>
<style>
  :root{
    --bg:#0a0a0c;--surface:rgba(255,255,255,.045);--border:rgba(255,255,255,.11);--brand:#e0b13c;
    --brand-soft:rgba(224,177,60,.08);--brand-line:rgba(224,177,60,.3);
    --muted:#8a8a90;--muted-strong:#a8a8b0;--fg:#ededf0;--neg:#ff6b6b;--neg-line:rgba(255,107,107,.4);
    --today:#e8a15f;--track:#17171b;--radius-md:12px;--radius-pill:999px;
    --font-display:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;
    --font-mono:ui-monospace,SFMono-Regular,Menlo,"JetBrains Mono",monospace;
    --ease:cubic-bezier(.4,0,.2,1);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:radial-gradient(120% 60% at 50% 0%,#17171b 0%,#101013 42%,#0a0a0c 70%,#08080a 100%);
    color:var(--fg);font:15px/1.5 var(--font-display);display:flex;justify-content:center;padding:40px 20px;
    position:relative;overflow-x:hidden;-webkit-font-smoothing:antialiased}
  body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
    background:repeating-linear-gradient(0deg,rgba(255,255,255,.03) 0 1px,transparent 1px 3px);mix-blend-mode:overlay}
  .bgWarp{position:fixed;inset:0;z-index:0;pointer-events:none;filter:url(#distort)}
  .stars{position:absolute;inset:0}
  .star{position:absolute;width:2px;height:2px;background:#cfd0d6;border-radius:50%;opacity:.4;animation:twinkle 8s ease-in-out infinite}
  .sun{position:absolute;bottom:30vh;left:50%;transform:translateX(-50%);width:230px;height:230px;border-radius:50%;opacity:.4;
    background:linear-gradient(180deg,#d9d9dd 0%,#b7b7bd 26%,#96969d 55%,#7a7a80 82%,#5c5c62 100%);box-shadow:0 0 100px rgba(200,200,210,.15);
    animation:sunPulse 14s ease-in-out infinite}
  .sun::after{content:'';position:absolute;inset:0;border-radius:50%;background:repeating-linear-gradient(0deg,transparent 0 7px,#0a0a0c 7px 12px);
    -webkit-mask-image:linear-gradient(to bottom,transparent 0%,black 46%);mask-image:linear-gradient(to bottom,transparent 0%,black 46%)}
  @keyframes sunPulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.06)}}
  .groundWrap{position:absolute;left:0;right:0;bottom:0;height:44vh;overflow:hidden;
    -webkit-mask-image:linear-gradient(to top,black 55%,transparent 100%);mask-image:linear-gradient(to top,black 55%,transparent 100%)}
  .ground{position:absolute;inset:-30% -60% 0 -60%;
    background-image:linear-gradient(rgba(180,180,190,.22) 1px,transparent 1px),linear-gradient(90deg,rgba(160,160,170,.16) 1px,transparent 1px);
    background-size:64px 64px;transform:perspective(260px) rotateX(63deg);transform-origin:bottom;animation:gridMove 20s linear infinite}
  @keyframes gridMove{from{background-position:0 0,0 0}to{background-position:0 64px,64px 0}}
  .horizonLine{position:absolute;left:0;right:0;bottom:calc(44vh - 1px);height:2px;
    background:linear-gradient(90deg,transparent,rgba(190,190,198,.35) 30%,rgba(190,190,198,.45) 50%,rgba(190,190,198,.35) 70%,transparent);
    box-shadow:0 0 16px rgba(190,190,198,.25)}
  @keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.5}}
  @media(prefers-reduced-motion:reduce){.ground,.sun,.star,.markOrb,.markGlow{animation:none!important}.progressWrap,.stat,.card{transition:none}}
  .shell{position:relative;z-index:1;width:100%;max-width:920px}
  .header{display:flex;align-items:center;gap:14px;margin-bottom:22px}
  .markWrap{position:relative;width:44px;height:44px;flex-shrink:0}
  .markGlow{position:absolute;inset:-10px;border-radius:50%;background:var(--brand);filter:blur(14px);opacity:.4;
    animation:glowBreathe 4.5s ease-in-out infinite}
  @keyframes glowBreathe{0%,100%{opacity:.28;transform:scale(.92)}50%{opacity:.5;transform:scale(1.06)}}
  .mark{position:relative;width:44px;height:44px;flex-shrink:0;border-radius:50%;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 35% 30%,#e4e5ea,var(--brand) 46%,#6d6f76 100%);box-shadow:0 0 26px rgba(0,0,0,.5);
    animation:sway 7s ease-in-out infinite}
  @keyframes sway{0%,100%{transform:rotate(-3deg) translateY(0)}50%{transform:rotate(3deg) translateY(-2px)}}
  .mark svg{width:22px;height:22px}
  .title{font-size:24px;font-weight:700;letter-spacing:-.01em;margin:0;text-transform:lowercase}
  .subtitle{color:var(--muted);font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;text-transform:lowercase;margin:5px 0 0}
  .stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px}
  .stat{position:relative;border:1px solid var(--border);border-radius:var(--radius-md);background:var(--surface);padding:14px 12px;text-align:center;
    -webkit-backdrop-filter:blur(18px);backdrop-filter:blur(18px);overflow:hidden;transition:border-color .2s var(--ease)}
  .stat:hover,.card:hover{border-color:var(--brand-line);box-shadow:0 0 0 1px var(--brand-line) inset}
  .statNum{font-size:22px;font-weight:600;letter-spacing:-.01em}
  .statNum.brand{color:var(--today)}
  .statLbl{color:var(--muted);font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:lowercase;margin-top:4px}
  .card{position:relative;border:1px solid var(--border);border-radius:16px;background:var(--surface);padding:18px;margin-bottom:22px;
    -webkit-backdrop-filter:blur(20px) saturate(120%);backdrop-filter:blur(20px) saturate(120%);
    overflow:hidden;transition:border-color .2s var(--ease)}
  .cardName{font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;text-transform:lowercase;color:var(--muted-strong);display:block;margin-bottom:14px}
  .row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
  .field{flex:1;min-width:140px}
  .fieldLbl{display:block;font-size:11px;color:var(--muted);margin-bottom:6px;text-transform:lowercase}
  input[type=text]{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--fg);
    border-radius:10px;padding:10px 12px;font:inherit}
  input:focus{outline:none;border-color:var(--brand)}
  input::placeholder{color:#55555c}
  .btn-primary{background:var(--brand);color:#0a0a0c;border:none;font-weight:600;border-radius:10px;padding:10px 16px;font:inherit;cursor:pointer;white-space:nowrap;text-transform:lowercase}
  .hint{color:var(--neg);font-size:12px;font-family:var(--font-mono);min-height:14px;margin:8px 2px 0}
  .logHead{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin:0 0 12px}
  .sectionTitle{font-weight:700;font-size:17px;margin:0;text-transform:lowercase}
  .count{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:lowercase;color:var(--muted)}
  .log{display:flex;flex-direction:column;gap:8px}
  .entry{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 15px;border:1px solid var(--border);
    border-left:3px solid var(--brand-line);border-radius:var(--radius-md);background:var(--surface)}
  .entryLeft{display:flex;align-items:center;gap:12px;min-width:0}
  .checkBtn{background:transparent;border:1.5px solid var(--border);color:transparent;width:22px;height:22px;border-radius:50%;
    cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:border-color .15s,background .15s}
  .checkBtn:hover{border-color:var(--brand);background:var(--brand-soft)}
  .checkBtn svg{width:12px;height:12px}
  .entryContent{font-size:14.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .entryDue{font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;text-transform:lowercase;color:var(--muted);white-space:nowrap;flex-shrink:0}
  .xBtn{background:transparent;border:1px solid var(--border);color:var(--muted);width:26px;height:26px;border-radius:50%;cursor:pointer;flex-shrink:0;line-height:1}
  .xBtn:hover{color:var(--neg);border-color:var(--neg-line)}
  .empty{color:var(--muted);font-size:13px;padding:14px 0;text-transform:lowercase}
  .notConnected{color:var(--muted-strong);font-size:13.5px;line-height:1.6}
  .notConnected code{font-family:var(--font-mono);background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:2px 6px;color:var(--fg)}

  .weekGrid{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
  .dayCol{display:flex;flex-direction:column;gap:8px;min-width:0}
  .dayHead{text-align:center;padding-bottom:9px;border-bottom:1px solid var(--border)}
  .dayHead .wd{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.06em;color:var(--muted);text-transform:lowercase;display:block}
  .dayHead .dn{font-size:19px;font-weight:700;margin-top:3px}
  .dayCol.today .dayHead{border-bottom-color:var(--today)}
  .dayCol.today .dn{color:var(--today)}
  .dayChips{display:flex;flex-direction:column;gap:7px;min-height:160px}
  .chip{position:relative;background:var(--bg);border:1px solid var(--border);border-radius:9px;
    padding:9px 20px 9px 10px;font-size:13px;line-height:1.4;cursor:pointer;transition:border-color .15s,background .15s}
  .chip:hover{border-color:var(--brand-line);background:var(--brand-soft)}
  .chip .chipText{display:block;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical}
  .chip .chipDel{position:absolute;top:2px;right:4px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;line-height:1;padding:4px}
  .chip .chipDel:hover{color:var(--neg)}
  .dayEmpty{color:#4a4a50;font-size:19px;text-align:center;padding:8px 0}
  .bucketRow{display:flex;flex-direction:column;gap:6px;margin-top:14px}
  .bucketRow:first-of-type{margin-top:0}
  .bucketLbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:lowercase;color:var(--muted)}
  .bucketList{display:flex;flex-wrap:wrap;gap:6px}
  .bucketChip{position:relative;background:var(--bg);border:1px solid var(--border);border-left:3px solid var(--muted);border-radius:8px;
    padding:6px 26px 6px 10px;font-size:12px;cursor:pointer;max-width:100%}
  .bucketChip.overdue{border-left-color:var(--neg)}
  .bucketChip:hover{border-color:var(--brand-line)}
  .bucketChip .chipDel{position:absolute;top:2px;right:4px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;line-height:1;padding:3px}
  .bucketChip .chipDel:hover{color:var(--neg)}
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute">
  <filter id="distort" x="-20%" y="-20%" width="140%" height="140%">
    <feTurbulence type="fractalNoise" baseFrequency="0.006 0.012" numOctaves="2" seed="7" result="noise">
      <animate attributeName="seed" values="0;9;3;11;0" dur="46s" repeatCount="indefinite"/>
    </feTurbulence>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="16" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
</svg>
<div class="bgWarp">
  <div class="sun"></div>
  <div class="groundWrap"><div class="ground"></div></div>
  <div class="horizonLine"></div>
  <div class="stars" id="stars"></div>
</div>
<main><div class="shell" id="app"></div></main>
<script>
/* Todoist — a real task list, not offline sample data. A sealed tile has no
   network, so window.Vitality.todoist.* relays through the dashboard's own
   page (see lib/tiles/tileBridge.ts + lib/tiles/useTileHost.ts), which calls
   app/api/todoist server-side where TODOIST_TOKEN is held privately. */
let tasks=[];
let status='loading'; // 'loading' | 'ok' | 'unavailable'
const $=id=>document.getElementById(id);
const REDUCED=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function spawnStars(){
  const wrap=$('stars');if(!wrap)return;
  let html='';
  for(let i=0;i<40;i++){
    const left=Math.random()*100, top=Math.random()*55, delay=-Math.random()*8;
    html+='<div class="star" style="left:'+left+'%;top:'+top+'%;animation-delay:'+delay+'s"></div>';
  }
  wrap.innerHTML=html;
}
function dayKey(d){return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function isOverdue(due){
  if(!due)return false;
  const d=new Date(due);
  if(isNaN(d.getTime()))return false;
  const today=new Date();today.setHours(0,0,0,0);
  return d<today && dayKey(d)!==dayKey(new Date());
}
function isToday(due){
  if(!due)return false;
  const d=new Date(due);
  if(isNaN(d.getTime()))return false;
  return dayKey(d)===dayKey(new Date());
}
function dueLabel(due){
  if(!due)return '';
  const d=new Date(due);
  if(isNaN(d.getTime()))return due;
  if(isToday(due))return 'today';
  if(isOverdue(due))return d.toLocaleDateString(undefined,{month:'short',day:'numeric'})+' (overdue)';
  return d.toLocaleDateString(undefined,{month:'short',day:'numeric'});
}

/* ---- the next-7-days calendar grid ---- */
function weekDays(){
  const days=[];
  const base=new Date();base.setHours(0,0,0,0);
  for(let i=0;i<7;i++){const d=new Date(base);d.setDate(base.getDate()+i);days.push(d);}
  return days;
}
function groupTasks(){
  const days=weekDays();
  const map={};
  days.forEach(d=>{map[dayKey(d)]=[];});
  const overdue=[], later=[], undated=[];
  const first=days[0], last=days[days.length-1];
  for(const t of tasks){
    if(!t.due){undated.push(t);continue;}
    const d=new Date(t.due);
    if(isNaN(d.getTime())){undated.push(t);continue;}
    d.setHours(0,0,0,0);
    const k=dayKey(d);
    if(map[k]){map[k].push(t);continue;}
    if(d<first){overdue.push(t);continue;}
    if(d>last){later.push(t);continue;}
    undated.push(t);
  }
  return {days,map,overdue,later,undated};
}
function chipHtml(t,cls){
  return '<div class="'+(cls||'chip')+'" data-complete="'+t.id+'">'
    +'<span class="chipText">'+esc(t.content)+'</span>'
    +'<button class="chipDel" data-del="'+t.id+'" title="Delete">×</button>'
    +'</div>';
}
function weekGridHtml(){
  const {days,map}=groupTasks();
  const todayKey=dayKey(new Date());
  const cols=days.map(d=>{
    const k=dayKey(d);
    const isToday=k===todayKey;
    const items=map[k];
    const chips=items.length?items.map(t=>chipHtml(t)).join(''):'<div class="dayEmpty">·</div>';
    return '<div class="dayCol'+(isToday?' today':'')+'"><div class="dayHead">'
      +'<span class="wd">'+d.toLocaleDateString(undefined,{weekday:'short'})+'</span>'
      +'<span class="dn">'+d.getDate()+'</span></div>'
      +'<div class="dayChips">'+chips+'</div></div>';
  }).join('');
  return '<section class="card"><span class="cardName">next 7 days</span><div class="weekGrid">'+cols+'</div></section>';
}
function bucketsHtml(){
  const {overdue,later,undated}=groupTasks();
  if(!overdue.length&&!later.length&&!undated.length)return '';
  const bucket=(label,items,cls)=>{
    if(!items.length)return '';
    return '<div class="bucketRow"><span class="bucketLbl">'+label+'</span><div class="bucketList">'
      +items.map(t=>chipHtml(t,'bucketChip'+(cls?' '+cls:''))).join('')+'</div></div>';
  };
  return '<section class="card">'
    +bucket('overdue',overdue,'overdue')
    +bucket('later',later,'')
    +bucket('no due date',undated,'')
    +'</section>';
}

function headerHtml(){
  return '<header class="header"><div class="markWrap"><div class="markGlow"></div><div class="mark" aria-hidden="true">'
    +'<svg viewBox="-12 -12 24 24" fill="none" stroke="#0a0a0c" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">'
    +'<path d="M-8 -1 L-4 3 L8 -8"/></svg></div></div>'
    +'<div><h1 class="title">Calendar</h1><p class="subtitle">tasks</p></div></header>';
}
function statsHtml(){
  const todayCount=tasks.filter(t=>isToday(t.due)).length;
  const overdueCount=tasks.filter(t=>isOverdue(t.due)).length;
  return '<section class="stats">'
    +'<div class="stat"><div class="statNum">'+tasks.length+'</div><div class="statLbl">open</div></div>'
    +'<div class="stat"><div class="statNum'+(overdueCount?' brand':'')+'">'+todayCount+'</div><div class="statLbl">due today</div></div>'
    +'</section>';
}
function formHtml(){
  return '<section class="card"><span class="cardName">add a task</span>'
    +'<div class="row"><div class="field"><input type="text" id="content" placeholder="e.g. buy milk" autocomplete="off" /></div>'
    +'<div class="field" style="flex:0 0 140px;min-width:110px"><input type="text" id="due" placeholder="due (e.g. today)" autocomplete="off" /></div>'
    +'<button class="btn-primary" id="add">add</button></div>'
    +'<div class="hint" id="hint"></div>'
    +'</section>';
}
function notConnectedHtml(){
  return '<section class="card"><span class="cardName">todoist</span>'
    +'<p class="notConnected">Not connected yet. Add <code>TODOIST_TOKEN</code> as an env var '
    +'(Todoist → Settings → Integrations → Developer for your token), then reload.</p>'
    +'</section>';
}
function render(){
  if(status==='unavailable'){
    $('app').innerHTML=headerHtml()+notConnectedHtml();
    return;
  }
  $('app').innerHTML=headerHtml()+statsHtml()+formHtml()+weekGridHtml()+bucketsHtml();
}

async function refresh(){
  try{
    tasks=await window.Vitality.todoist.list();
    if(!Array.isArray(tasks))tasks=[];
    status='ok';
  }catch(err){
    status='unavailable';
  }
  render();
}

async function addTask(){
  const contentEl=$('content'), dueEl=$('due');
  const content=(contentEl.value||'').trim();
  if(!content){$('hint').textContent='Write a task first.';contentEl.focus();return;}
  const due=(dueEl.value||'').trim();
  try{
    await window.Vitality.todoist.add(content,due||undefined);
    contentEl.value='';dueEl.value='';
    await refresh();
  }catch(err){
    $('hint').textContent='Could not add that task.';
  }
}
async function completeTask(id){
  try{ await window.Vitality.todoist.complete(id); }catch(err){ /* fail quiet, refresh below still shows current state */ }
  await refresh();
}
async function deleteTask(id){
  try{ await window.Vitality.todoist.remove(id); }catch(err){ /* fail quiet */ }
  await refresh();
}

document.addEventListener('click',e=>{
  if(e.target.closest('#add')){addTask();return;}
  // data-del is checked first: in the calendar chips it's a button NESTED
  // inside the chip's own data-complete div, so it must win over the parent.
  const del=e.target.closest('[data-del]');
  if(del){deleteTask(del.getAttribute('data-del'));return;}
  const complete=e.target.closest('[data-complete]');
  if(complete){completeTask(complete.getAttribute('data-complete'));return;}
});
document.addEventListener('input',e=>{if(e.target.id==='content'||e.target.id==='due'){const h=$('hint');if(h&&h.textContent)h.textContent='';}});
document.addEventListener('keydown',e=>{if((e.target.id==='content'||e.target.id==='due')&&e.key==='Enter'){e.preventDefault();addTask();}});

spawnStars();
render();
refresh();
</script>
</body>
</html>
