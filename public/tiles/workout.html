<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Workout</title>
<style>
  :root{
    --bg:#0a0a0c;--surface:rgba(255,255,255,.045);--border:rgba(255,255,255,.11);--brand:#e0b13c;
    --brand-soft:rgba(224,177,60,.08);--brand-line:rgba(224,177,60,.3);
    --muted:#8a8a90;--muted-strong:#a8a8b0;--fg:#ededf0;--neg:#ff6b6b;--neg-line:rgba(255,107,107,.4);
    --gold:#e8c878;--lift:#7fa8e0;--lift-soft:rgba(127,168,224,.22);--track:#17171b;--radius-md:12px;--radius-pill:999px;
    --font-display:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;
    --font-mono:ui-monospace,SFMono-Regular,Menlo,"JetBrains Mono",monospace;
    --ease:cubic-bezier(.4,0,.2,1);
    /* transitions-dev — success check (this is a sealed doc, so the tokens
       from the host app's globals.css aren't reachable here; local copy) */
    --check-opacity-dur:550ms;--check-rotate-dur:550ms;--check-rotate-from:80deg;
    --check-bob-dur:450ms;--check-y-amount:40px;--check-blur-dur:500ms;--check-blur-from:10px;
    --check-path-dur:550ms;--check-path-delay:80ms;
    --check-ease-out:cubic-bezier(.22,1,.36,1);--check-ease-opacity:cubic-bezier(.22,1,.36,1);
    --check-ease-rotate:cubic-bezier(.22,1,.36,1);--check-ease-bob:cubic-bezier(.34,1.35,.64,1);--check-ease-path:cubic-bezier(.22,1,.36,1);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:radial-gradient(120% 60% at 50% 0%,#17171b 0%,#101013 42%,#0a0a0c 70%,#08080a 100%);
    color:var(--fg);font:15px/1.5 var(--font-display);display:flex;justify-content:center;padding:40px 20px;
    position:relative;overflow-x:hidden;-webkit-font-smoothing:antialiased}
  body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
    background:repeating-linear-gradient(0deg,rgba(255,255,255,.03) 0 1px,transparent 1px 3px);mix-blend-mode:overlay}
  /* body's flex+justify-content:center makes its only child (main) shrink-wrap
     to content width instead of filling the row — main needs an explicit width
     so .shell's own width:100% has something real to resolve against. */
  main{width:100%}
  .stars{position:fixed;inset:0;z-index:0;pointer-events:none}
  .star{position:absolute;width:2px;height:2px;background:#cfd0d6;border-radius:50%;opacity:.4;animation:twinkle 8s ease-in-out infinite}
  @keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.5}}
  @media(prefers-reduced-motion:reduce){.star,.markOrb,.markGlow{animation:none!important}.stat,.card{transition:none}}
  .shell{position:relative;z-index:1;width:100%;max-width:none}
  /* Home (sessions/PRs/bodyweight/history) balances into two newspaper-style
     columns on a wide PC viewport. Build/run are one focused card each — the
     same treatment would just leave one column full and the other empty, so
     those stay capped and centered instead of stretching edge to edge. */
  @media(min-width:820px){
    .shell.homeView{column-count:2;column-gap:22px}
    .header{column-span:all}
    .stats{column-span:all}
    .shell:not(.homeView){max-width:760px;margin:0 auto}
  }
  .card{break-inside:avoid}
  .header{display:flex;align-items:center;gap:14px;margin-bottom:22px}
  .markWrap{position:relative;width:44px;height:44px;flex-shrink:0}
  .markGlow{position:absolute;inset:-10px;border-radius:50%;background:var(--brand);filter:blur(14px);opacity:.4;
    animation:glowBreathe 4.5s ease-in-out infinite}
  @keyframes glowBreathe{0%,100%{opacity:.28;transform:scale(.92)}50%{opacity:.5;transform:scale(1.06)}}
  .mark{position:relative;width:44px;height:44px;flex-shrink:0;border-radius:50%;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 35% 30%,#e4e5ea,var(--brand) 46%,#6d6f76 100%);box-shadow:0 0 26px rgba(0,0,0,.5);
    animation:sway 7s ease-in-out infinite}
  @keyframes sway{0%,100%{transform:rotate(-3deg) translateY(0)}50%{transform:rotate(3deg) translateY(-2px)}}
  .mark svg{width:22px;height:22px}
  .title{font-size:24px;font-weight:700;letter-spacing:-.01em;margin:0}
  .subtitle{color:var(--muted);font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;margin:5px 0 0}
  .stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px}
  .stat{position:relative;border:1px solid var(--border);border-radius:var(--radius-md);background:var(--surface);padding:14px 12px;text-align:center;
    -webkit-backdrop-filter:blur(18px);backdrop-filter:blur(18px);overflow:hidden;transition:border-color .2s var(--ease)}
  .stat:hover,.card:hover{border-color:var(--brand-line);box-shadow:0 0 0 1px var(--brand-line) inset}
  .statNum{font-size:22px;font-weight:600;letter-spacing:-.01em}
  .statNum.brand{color:var(--brand)}
  .statLbl{color:var(--muted);font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;margin-top:4px}
  .card{position:relative;border:1px solid var(--border);border-radius:16px;background:var(--surface);padding:18px;margin-bottom:22px;
    -webkit-backdrop-filter:blur(20px) saturate(120%);backdrop-filter:blur(20px) saturate(120%);
    overflow:hidden;transition:border-color .2s var(--ease)}
  .cardName{font-family:var(--font-display);font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#fff;display:block;margin-bottom:14px}
  .cardHead{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .cardHead .cardName{margin-bottom:0}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
  .field{margin-bottom:16px}
  .fieldLbl{display:block;font-size:11px;color:var(--muted);margin-bottom:6px}
  select,input[type=text],input[type=number]{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--fg);
    border-radius:10px;padding:10px 12px;font:inherit}
  select:focus,input:focus{outline:none;border-color:var(--brand)}
  input::placeholder{color:#55555c}
  .btn-primary{background:var(--brand);color:#0a0a0c;border:none;font-weight:600;border-radius:10px;padding:10px 16px;font:inherit;cursor:pointer;white-space:nowrap}
  .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted-strong);font-weight:500;border-radius:10px;padding:8px 13px;font:inherit;font-size:12.5px;cursor:pointer;white-space:nowrap;transition:border-color .15s var(--ease),color .15s var(--ease)}
  .btn-ghost:hover{border-color:var(--brand-line);color:var(--fg)}
  .iconBtn{background:transparent;border:1px solid var(--border);color:var(--muted);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:13px;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:border-color .15s var(--ease),color .15s var(--ease)}
  .iconBtn:hover{border-color:var(--brand-line);color:var(--fg)}
  .hint{color:var(--neg);font-size:12px;font-family:var(--font-mono);min-height:14px;margin-top:8px}

  /* -- sessions (home list + builder) -- */
  .sessionList{display:flex;flex-direction:column;gap:8px}
  .sessionCard{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 16px;border:1px solid var(--border);
    border-radius:var(--radius-md);background:var(--surface);cursor:pointer;transition:border-color .15s var(--ease)}
  .sessionCard:hover{border-color:var(--brand-line)}
  .sessionCardMain{min-width:0}
  .sessionName{font-weight:600;font-size:15px}
  .sessionMeta{font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-top:4px}
  .sessionCardActions{display:flex;align-items:center;gap:6px;flex-shrink:0}
  .pickWrap{display:flex;flex-direction:column;gap:16px;margin-top:4px}
  .pickCategoryName{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  .pickGrid{display:flex;flex-wrap:wrap;gap:8px}
  .exercisePick{display:flex;align-items:center;gap:7px;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-pill);
    background:var(--bg);font-size:13px;cursor:pointer;transition:border-color .15s var(--ease),background .15s var(--ease)}
  .exercisePick:hover{border-color:var(--brand-line)}
  .exercisePick.checked{border-color:var(--brand-line);background:var(--brand-soft)}
  .exercisePick input{accent-color:var(--brand)}

  /* -- running a session -- */
  .runProgress{font-family:var(--font-mono);font-size:11px;color:var(--muted);margin:0 0 16px}
  .runCategory{margin-bottom:18px}
  .runCategory:last-child{margin-bottom:0}
  .runCategoryName{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  .runRow{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 14px;border:1px solid var(--border);
    border-radius:var(--radius-md);background:var(--surface);margin-bottom:8px}
  .runRow:last-child{margin-bottom:0}
  .runRow.done{border-left:3px solid var(--brand-line)}
  .runRowMain{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
  .runExName{font-size:14px;font-weight:500}
  .runRow.done .runExName{text-decoration:line-through;color:var(--muted-strong)}
  .runExWeight{font-family:var(--font-mono);font-size:13px;color:var(--brand);margin-left:auto;display:flex;align-items:center;gap:6px}
  .runWeightInput{width:92px;flex-shrink:0;margin-left:auto}
  .runCompleteBtn{flex-shrink:0}

  .prRow{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .prSelect{max-width:220px}
  .prBadge{text-align:right}
  .prNum{font-size:26px;font-weight:700;letter-spacing:-.01em;color:var(--gold)}
  .prLbl{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;color:var(--muted);margin-top:2px}
  .chart{width:100%;height:auto;display:block;margin-top:4px}
  .chart .grid{stroke:var(--border);stroke-width:1}
  .chart .eline{fill:none;stroke:var(--lift);stroke-width:2;stroke-linejoin:round;stroke-linecap:round}
  .chart .area{opacity:.6}
  .chart .dot{fill:var(--lift)}
  .chart .prdot{fill:var(--gold);stroke:var(--bg);stroke-width:1.5}
  .chart .bwline{fill:none;stroke:var(--brand);stroke-width:2;stroke-linejoin:round;stroke-linecap:round}
  .chart .bwdot{fill:var(--brand)}
  .chart .axl{fill:var(--muted);font-family:var(--font-mono);font-size:9px;letter-spacing:.06em}
  .logHead{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin:0 0 12px;flex-wrap:wrap}
  .sectionTitle{font-weight:700;font-size:17px;margin:0}
  .count{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;color:var(--muted)}
  .log{display:flex;flex-direction:column;gap:8px}
  .entry{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 15px;border:1px solid var(--border);
    border-left:3px solid var(--brand-line);border-radius:var(--radius-md);background:var(--surface)}
  .entry.pr{border-left-color:var(--gold)}
  .entryLeft{min-width:0}
  .entryTop{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .exBadge{font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;color:var(--brand);
    border:1px solid var(--brand-line);background:var(--brand-soft);border-radius:var(--radius-pill);padding:3px 9px}
  .prTag{font-family:var(--font-mono);font-size:9px;letter-spacing:.08em;color:var(--gold);
    border:1px solid rgba(232,200,120,.4);background:rgba(232,200,120,.08);border-radius:var(--radius-pill);padding:3px 8px}
  .entryStats{font-size:14px;color:var(--muted-strong);margin-top:6px}
  .entryMeta{display:block;margin-top:6px;font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;color:var(--muted)}
  .logExList{display:flex;flex-direction:column;gap:5px;margin-top:8px}
  .logExRow{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:13.5px;color:var(--muted-strong)}
  .logExWeight{font-family:var(--font-mono);font-size:12px;color:var(--fg);display:flex;align-items:center;gap:6px;flex-shrink:0}
  .xBtn{background:transparent;border:1px solid var(--border);color:var(--muted);width:26px;height:26px;border-radius:50%;cursor:pointer;flex-shrink:0;line-height:1}
  .xBtn:hover{color:var(--neg);border-color:var(--neg-line)}
  .empty{color:var(--muted);font-size:13px;padding:14px 0}

  /* -- bodyweight -- */
  .bwNow{display:flex;align-items:baseline;gap:8px;margin-bottom:14px}
  .bwNow .n{font-size:30px;font-weight:700;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
  .bwNow .l{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.1em;color:var(--muted)}
  .bwAdd{margin-bottom:14px}

  /* -- PR toast (transitions-dev "success check", ported verbatim) -- */
  .prToast{position:fixed;top:20px;left:50%;translate:-50% 0;z-index:90;display:flex;align-items:center;gap:10px;
    padding:12px 18px;border-radius:var(--radius-pill);background:rgba(10,10,12,.92);border:1px solid var(--brand-line);
    box-shadow:0 12px 32px -12px rgba(0,0,0,.65);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
  .prToastText{font-size:13.5px;color:var(--fg)}
  .prToastText strong{color:var(--brand);font-weight:700}
  .t-success-check{display:inline-block;width:22px;height:22px;color:var(--brand);flex-shrink:0;
    transform-origin:center;opacity:0;will-change:transform,opacity,filter}
  .t-success-check svg{display:block;overflow:visible;width:100%;height:100%}
  .t-success-check svg path{stroke-dasharray:24;stroke-dashoffset:24}
  .t-success-check[data-state="in"]{
    animation:t-check-fade var(--check-opacity-dur) var(--check-ease-opacity) forwards,
      t-check-rotate var(--check-rotate-dur) var(--check-ease-rotate) forwards,
      t-check-blur var(--check-blur-dur) var(--check-ease-out) forwards,
      t-check-bob var(--check-bob-dur) var(--check-ease-bob) forwards}
  .t-success-check[data-state="in"] svg path{animation:t-check-draw var(--check-path-dur) var(--check-ease-path) var(--check-path-delay,0ms) forwards}
  @keyframes t-check-fade{from{opacity:0}to{opacity:1}}
  @keyframes t-check-rotate{from{transform:rotate(var(--check-rotate-from))}to{transform:rotate(0deg)}}
  @keyframes t-check-blur{from{filter:blur(var(--check-blur-from))}to{filter:blur(0)}}
  @keyframes t-check-bob{from{translate:0 var(--check-y-amount)}to{translate:0 0}}
  @keyframes t-check-draw{to{stroke-dashoffset:0}}
  @media(prefers-reduced-motion:reduce){
    .t-success-check{animation:none!important;opacity:1}
    .t-success-check svg path{animation:none!important;stroke-dashoffset:0!important}
  }
  @media(max-width:640px){
    .runRowMain{flex-wrap:wrap}
    .runWeightInput{width:100%;margin-left:0}
    .runCompleteBtn{width:100%}
    .runRow{flex-direction:column;align-items:stretch}
  }
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<main><div class="shell" id="app"></div></main>
<script>
/* Workout — build named sessions (a chosen set of exercises from a fixed,
   category-sorted catalog), then run one in real time: tap it, type a
   weight per exercise as you go, mark each done. Personal records still get
   a toast, still get a per-exercise chart, still get a bodyweight tracker.
   No more logging individual sets — a session run IS the log entry.
   No network: persists through the dashboard bridge (window.Vitality) as
   one object with `sessions`, `logs` and `bodyweight` arrays. */
const CATEGORIES=['Chest','Back','Shoulders','Arms','Legs','Core'];
const EXERCISE_CATALOG={
  Chest:['Barbell bench','Incline barbell bench','Flat DB press','Incline DB press','Machine chest press','Weighted dips','Cable chest fly','Pec deck'],
  Back:['Weighted pull-ups','Pull-ups','Barbell row','Pendlay row','T-bar row','Seated cable row','Chest-supported DB row','Single-arm DB row','Lat pulldown'],
  Shoulders:['Standing barbell OHP','Seated DB shoulder press','Machine shoulder press','Push press','DB lateral raise','Cable lateral raise','Rear delt cable fly','Reverse pec deck','Cable face pull'],
  Arms:['Close-grip bench','Tricep rope pushdown','Overhead cable tri ext','Skullcrushers','Barbell curl','Hammer curl','Cable curl','Incline DB curl','Preacher curl'],
  Legs:['Barbell back squat','Front squat','Hack squat','Leg press','Romanian deadlift','Conventional deadlift','Bulgarian split squat','DB split squat','Walking lunge','Leg extension','Seated leg curl','Lying leg curl','Barbell hip thrust','Calf raise'],
  Core:['Cable crunch','Hanging leg raise','Toes-to-bar','Ab wheel rollout','Weighted sit-up','Decline sit-up','Russian twist','Plank']
};
function categoryOf(exercise){
  for(const cat of CATEGORIES)if(EXERCISE_CATALOG[cat].includes(exercise))return cat;
  return 'Other';
}

let store={sessions:[],logs:[],bodyweight:[]};
let view={mode:'home'}; // {mode:'home'} | {mode:'build'} | {mode:'run',sessionId}
let builderDraft={name:'',selected:new Set(),editId:null}; // live while mode==='build'; editId set when editing an existing session, null when creating
let runDraftWeights={}; // exercise -> typed value, live while mode==='run'; reset on entering a session
let selectedExercise=null; // PR chart's chosen exercise
let prToast=null; // {exercise, weight} while the toast is showing
let prToastTimer=null;
let historyOpen=false; // "view past weights" panel under the PR chart
let bwHistoryOpen=false; // "view past weigh-ins" panel under the bodyweight chart
const $=id=>document.getElementById(id);
const REDUCED=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function persist(){window.Vitality.save(store);}
function newId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function dayKey(ts){const d=new Date(ts);return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function dayLabel(ts){
  const d=new Date(ts);
  const today=new Date();today.setHours(0,0,0,0);
  const that=new Date(d);that.setHours(0,0,0,0);
  if(that.getTime()===today.getTime())return 'Today';
  const yest=new Date(today);yest.setDate(yest.getDate()-1);
  if(that.getTime()===yest.getTime())return 'Yesterday';
  return d.toLocaleDateString(undefined,{weekday:'long',month:'short',day:'numeric'});
}

function spawnStars(){
  const wrap=$('stars');if(!wrap)return;
  let html='';
  for(let i=0;i<40;i++){
    const left=Math.random()*100, top=Math.random()*55, delay=-Math.random()*8;
    html+='<div class="star" style="left:'+left+'%;top:'+top+'%;animation-delay:'+delay+'s"></div>';
  }
  wrap.innerHTML=html;
}

/* ---- sessions: named templates built from the fixed catalog ---- */
function createOrUpdateSession(id,name,exerciseList){
  if(id){
    const s=store.sessions.find(x=>x.id===id);
    if(s){s.name=name;s.exercises=exerciseList;persist();return;}
  }
  store.sessions.push({id:newId(),name,exercises:exerciseList});
  persist();
}
function deleteSession(id){
  store.sessions=store.sessions.filter(s=>s.id!==id);
  persist();
}

/* ---- logs: one entry per (session, calendar day) actually run, filled in
   progressively as exercises are completed — this IS the workout history,
   there's no separate "finish session" step. ---- */
function logFor(sessionId,dateKey){
  return store.logs.find(l=>l.sessionId===sessionId&&l.date===dateKey);
}
function ensureLog(sessionId,sessionName,dateKey){
  let l=logFor(sessionId,dateKey);
  if(!l){l={id:newId(),sessionId,sessionName,date:dateKey,ts:null,entries:[]};store.logs.push(l);}
  return l;
}
function allEntries(){
  const out=[];
  for(const l of store.logs)for(const e of l.entries)out.push(e);
  return out;
}
function entriesFor(exercise){
  const k=(exercise||'').toLowerCase();
  return allEntries().filter(e=>e.exercise.toLowerCase()===k).sort((a,b)=>a.ts-b.ts);
}
function prFor(exercise){
  const list=entriesFor(exercise);
  if(!list.length)return null;
  return list.reduce((best,e)=>e.weight>best.weight?e:best,list[0]);
}
/* running max at the time each entry was logged, for the PR badge on rows */
function prAtLogTime(){
  const running={};
  const marks={};
  const chronological=allEntries().slice().sort((a,b)=>a.ts-b.ts);
  for(const e of chronological){
    const k=e.exercise.toLowerCase();
    const prev=running[k]||0;
    if(e.weight>=prev&&e.weight>0){marks[e.id]=true;running[k]=e.weight;}
    else if(running[k]==null)running[k]=e.weight;
  }
  return marks;
}
function loggedExercises(){
  const seen=new Map();
  for(const e of allEntries()){
    const k=e.exercise.toLowerCase();
    if(!seen.has(k))seen.set(k,e.exercise);
  }
  return Array.from(seen.values()).sort((a,b)=>a.localeCompare(b));
}
function sessionsThisWeekCount(){
  const cutoff=Date.now()-7*24*60*60*1000;
  return store.logs.filter(l=>l.entries.length&&l.ts>=cutoff).length;
}
function prsThisMonth(){
  const marks=prAtLogTime();
  const now=new Date();const monthStart=new Date(now.getFullYear(),now.getMonth(),1).getTime();
  return allEntries().filter(e=>marks[e.id]&&e.ts>=monthStart).length;
}
/* Completing (or re-completing, to fix a mistake) one exercise within
   today's run of a session — this is the only way data enters the log. */
function completeExercise(sessionId,sessionName,exercise,weight){
  const dk=dayKey(Date.now());
  const log=ensureLog(sessionId,sessionName,dk);
  log.entries=log.entries.filter(e=>e.exercise!==exercise); // replace, don't duplicate, on re-complete
  const prevPR=prFor(exercise); // computed AFTER the removal above, so editing compares fairly
  const entry={id:newId(),exercise,weight,ts:Date.now()};
  log.entries.push(entry);
  if(!log.ts)log.ts=entry.ts;
  persist();
  return !prevPR||weight>prevPR.weight;
}
function uncompleteExercise(sessionId,exercise){
  const log=logFor(sessionId,dayKey(Date.now()));
  if(!log)return;
  log.entries=log.entries.filter(e=>e.exercise!==exercise);
  if(!log.entries.length)store.logs=store.logs.filter(l=>l.id!==log.id);
  persist();
}
function deleteEntryById(id){
  for(const l of store.logs){
    const idx=l.entries.findIndex(e=>e.id===id);
    if(idx>=0){
      l.entries.splice(idx,1);
      if(!l.entries.length)store.logs=store.logs.filter(x=>x.id!==l.id);
      persist();
      return;
    }
  }
}
function deleteLog(id){
  store.logs=store.logs.filter(l=>l.id!==id);
  persist();
}

/* ---- chart geometry (shared by the PR chart and the bodyweight chart) ---- */
const CW=560,CX0=10,CX1=550,CY0=14,CY1=130;
function xOf(i,n){return n<=1?(CX0+CX1)/2:CX0+(i/(n-1))*(CX1-CX0);}
function yOf(w,maxW){return CY1-(maxW>0?Math.min(1,w/maxW):0)*(CY1-CY0);}
function chartHtml(exercise){
  const data=entriesFor(exercise);
  if(!data.length)return '<p class="empty">No entries logged for this exercise yet.</p>';
  const prMarks=prAtLogTime();
  const maxW=Math.max(...data.map(d=>d.weight),1)*1.15;
  const pts=data.map((d,i)=>({x:xOf(i,data.length),y:yOf(d.weight,maxW),pr:!!prMarks[d.id]}));
  const eline=pts.map((p,i)=>(i?'L':'M')+p.x.toFixed(1)+' '+p.y.toFixed(1)).join(' ');
  const area=eline+' L '+pts[pts.length-1].x.toFixed(1)+' '+CY1+' L '+pts[0].x.toFixed(1)+' '+CY1+' Z';
  const grid=[0.25,0.5,0.75].map(f=>'<line x1="'+CX0+'" y1="'+(CY1-f*(CY1-CY0)).toFixed(1)+'" x2="'+CX1+'" y2="'+(CY1-f*(CY1-CY0)).toFixed(1)+'" class="grid"/>').join('');
  const dots=pts.map(p=>'<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="'+(p.pr?4.5:3)+'" class="'+(p.pr?'prdot':'dot')+'"/>').join('');
  const first=data[0],last=data[data.length-1];
  const fmt=ts=>new Date(ts).toLocaleDateString(undefined,{month:'short',day:'numeric'});
  const labels='<text x="'+CX0+'" y="'+(CY1+15)+'" class="axl">'+fmt(first.ts)+'</text>'
    +'<text x="'+CX1+'" y="'+(CY1+15)+'" class="axl" text-anchor="end">'+fmt(last.ts)+'</text>';
  return '<svg viewBox="0 0 '+CW+' '+(CY1+22)+'" class="chart" role="img" aria-label="Weight progress for '+esc(exercise)+'">'
    +'<defs><linearGradient id="wfill" x1="0" y1="0" x2="0" y2="1">'
    +'<stop offset="0" stop-color="#7fa8e0" stop-opacity=".24"/><stop offset="1" stop-color="#7fa8e0" stop-opacity="0"/></linearGradient></defs>'
    +grid+'<path d="'+area+'" fill="url(#wfill)" class="area"/><path d="'+eline+'" class="eline"/>'+dots+labels+'</svg>';
}

/* ---- bodyweight (unchanged) ---- */
function bwSorted(){return (store.bodyweight||[]).slice().sort((a,b)=>a.ts-b.ts);}
function addBodyweight(lb){
  if(!Array.isArray(store.bodyweight))store.bodyweight=[];
  store.bodyweight.push({id:newId(),lb,ts:Date.now()});
  persist();render();
}
function deleteBodyweight(id){
  store.bodyweight=bwSorted().filter(b=>b.id!==id);
  persist();render();
}
function bwChartHtml(){
  const data=bwSorted();
  if(!data.length)return '<p class="empty">No bodyweight logged yet.</p>';
  const vals=data.map(d=>d.lb);
  const minW=Math.min(...vals),maxW=Math.max(...vals);
  const span=(maxW-minW)||1;
  const pts=data.map((d,i)=>({x:xOf(i,data.length),y:CY1-((d.lb-minW)/span)*(CY1-CY0)}));
  const line=pts.map((p,i)=>(i?'L':'M')+p.x.toFixed(1)+' '+p.y.toFixed(1)).join(' ');
  const area=line+' L '+pts[pts.length-1].x.toFixed(1)+' '+CY1+' L '+pts[0].x.toFixed(1)+' '+CY1+' Z';
  const dots=pts.map(p=>'<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="3" class="bwdot"/>').join('');
  const first=data[0],last=data[data.length-1];
  const fmt=ts=>new Date(ts).toLocaleDateString(undefined,{month:'short',day:'numeric'});
  const labels='<text x="'+CX0+'" y="'+(CY1+15)+'" class="axl">'+fmt(first.ts)+'</text>'
    +'<text x="'+CX1+'" y="'+(CY1+15)+'" class="axl" text-anchor="end">'+fmt(last.ts)+'</text>';
  return '<svg viewBox="0 0 '+CW+' '+(CY1+22)+'" class="chart" role="img" aria-label="Bodyweight over time">'
    +'<defs><linearGradient id="bwfill" x1="0" y1="0" x2="0" y2="1">'
    +'<stop offset="0" stop-color="#e0b13c" stop-opacity=".22"/><stop offset="1" stop-color="#e0b13c" stop-opacity="0"/></linearGradient></defs>'
    +'<path d="'+area+'" fill="url(#bwfill)" class="area"/><path d="'+line+'" class="bwline"/>'+dots+labels+'</svg>';
}
function bwHistoryListHtml(){
  const list=bwSorted().slice().reverse();
  if(!list.length)return '<p class="empty">No weigh-ins logged yet.</p>';
  return '<div class="log">'+list.map(b=>

    +'<div class="entryStats">'+b.lb+' lb</div>'
    +'<span class="entryMeta">'+new Date(b.ts).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'})+'</span></div>'

function bodyweightHtml(){

function saveSessionFromBuilder(){
  const name=(builderDraft.name||'').trim();
  if(!name){$('buildHint').textContent='Name the session first.';return;}
  if(!builderDraft.selected.size){$('buildHint').textContent='Pick at least one exercise.';return;}
  const exerciseList=CATEGORIES.flatMap(cat=>EXERCISE_CATALOG[cat].filter(ex=>builderDraft.selected.has(ex)));
  createOrUpdateSession(builderDraft.editId,name,exerciseList);
  view={mode:'home'};
  render();

/* ---- running a session ---- */
function runViewHtml(){
  const s=store.sessions.find(x=>x.id===view.sessionId);
  if(!s){view={mode:'home'};return sessionsHtml();}
  const dk=dayKey(Date.now());
  const log=logFor(s.id,dk);
  const doneMap={};
  if(log)for(const e of log.entries)doneMap[e.exercise]=e;
  const prMarks=prAtLogTime();
  const byCat={};
  for(const ex of s.exercises){const cat=categoryOf(ex);(byCat[cat]=byCat[cat]||[]).push(ex);}
  const blocks=CATEGORIES.concat(['Other']).filter(cat=>byCat[cat]&&byCat[cat].length).map(cat=>{
    const rows=byCat[cat].map(ex=>{
      const done=doneMap[ex];
      if(done){
        const isPR=!!prMarks[done.id];
        return '<div class="runRow done"><div class="runRowMain"><span class="runExName">'+esc(ex)+'</span></div>'
          +'<span class="runExWeight">'+done.weight+' lb'+(isPR?' <span class="prTag">PR</span>':'')+'</span>'
          +'<button type="button" class="iconBtn" data-edit-run="'+esc(ex)+'" title="Edit">✎</button></div>';
      }
      const draft=runDraftWeights[ex]!=null?runDraftWeights[ex]:'';
      return '<div class="runRow"><div class="runRowMain"><span class="runExName">'+esc(ex)+'</span></div>'
        +'<input class="fieldInput runWeightInput" type="number" inputmode="decimal" placeholder="lb" data-weight-for="'+esc(ex)+'" value="'+esc(draft)+'" />'
        +'<button type="button" class="btn-primary runCompleteBtn" data-complete-run="'+esc(ex)+'">Done</button></div>';
    }).join('');
    return '<div class="runCategory"><div class="runCategoryName">'+cat+'</div>'+rows+'</div>';
  }).join('');
  const doneCount=log?log.entries.length:0,total=s.exercises.length;
  return '<section class="card"><div class="cardHead"><span class="cardName">'+esc(s.name)+'</span>'
    +'<button type="button" class="btn-ghost" id="backToSessions">← Sessions</button></div>'
    +'<p class="runProgress">'+doneCount+' / '+total+' done'+(total>0&&doneCount===total?' — session complete':'')+'</p>'
    +blocks+'</section>';
}
function completeRunExercise(exercise){
  const s=store.sessions.find(x=>x.id===view.sessionId);
  if(!s)return;
  const el=document.querySelector('[data-weight-for="'+CSS.escape(exercise)+'"]');
  const weight=Number(el&&el.value);
  if(!isFinite(weight)||weight<=0)return;
  const isNewPR=completeExercise(s.id,s.name,exercise,weight);
  delete runDraftWeights[exercise];
  render();
  if(isNewPR)showPRToast(exercise,weight);
}

/* ---- history: past logged sessions, most recent day first ---- */

  const withData=store.logs.filter(l=>l.entries.length);

  const sorted=withData.slice().sort((a,b)=>b.ts-a.ts);

  return dayLogs.map(l=>{
    const rows=l.entries.slice().sort((a,b)=>a.ts-b.ts).map(e=>{

function historyHtml(){

function render(){
  let body;
  if(view.mode==='build')body=builderHtml();
  else if(view.mode==='run')body=runViewHtml();
  else body=sessionsHtml()+prChartHtml()+bodyweightHtml()+historyHtml();
  $('app').innerHTML=headerHtml()+prToastHtml()+statsHtml()+body;
  $('app').classList.toggle('homeView',view.mode!=='build'&&view.mode!=='run');
}

function downloadLog(){
  const rows=[];
  for(const l of store.logs.slice().sort((a,b)=>(a.ts||0)-(b.ts||0))){
    for(const e of l.entries.slice().sort((a,b)=>a.ts-b.ts)){
      const d=new Date(e.ts);
      const date=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      const time=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
      rows.push([date,time,'"'+l.sessionName.replace(/"/g,'""')+'"','"'+e.exercise.replace(/"/g,'""')+'"',e.weight].join(','));
    }
  }
  const csv='date,time,session,exercise,weight_lb\n'+rows.join('\n');
  const today=new Date();
  const fname='workout-log-'+today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0')+'.csv';
  window.Vitality.download(fname,csv,'text/csv');
}

document.addEventListener('click',e=>{
  // sessions home
  if(e.target.closest('#newSessionBtn')){view={mode:'build'};builderDraft={name:'',selected:new Set(),editId:null};render();return;}
  const editS=e.target.closest('[data-edit-session]');
  if(editS){
    const s=store.sessions.find(x=>x.id===editS.getAttribute('data-edit-session'));
    if(s){view={mode:'build'};builderDraft={name:s.name,selected:new Set(s.exercises),editId:s.id};render();}
    return;
  }
  const delS=e.target.closest('[data-del-session]');
  if(delS){deleteSession(delS.getAttribute('data-del-session'));render();return;}
  const openS=e.target.closest('[data-open-session]');
  if(openS){view={mode:'run',sessionId:openS.getAttribute('data-open-session')};runDraftWeights={};render();return;}
  // builder
  if(e.target.closest('#cancelBuild')){view={mode:'home'};render();return;}
  if(e.target.closest('#saveSessionBtn')){saveSessionFromBuilder();return;}
  // run view
  if(e.target.closest('#backToSessions')){view={mode:'home'};render();return;}
  const completeRun=e.target.closest('[data-complete-run]');
  if(completeRun){completeRunExercise(completeRun.getAttribute('data-complete-run'));return;}
  const editRun=e.target.closest('[data-edit-run]');
  if(editRun){
    const exercise=editRun.getAttribute('data-edit-run');
    const s=store.sessions.find(x=>x.id===view.sessionId);
    if(s){
      const log=logFor(s.id,dayKey(Date.now()));
      const prevEntry=log&&log.entries.find(x=>x.exercise===exercise);
      uncompleteExercise(s.id,exercise);
      runDraftWeights[exercise]=prevEntry?String(prevEntry.weight):'';
      render();
    }
    return;
  }
  // PR chart / history / bodyweight (shared across all home cards)
  if(e.target.closest('#toggleHistory')){historyOpen=!historyOpen;render();return;}
  if(e.target.closest('#toggleBwHistory')){bwHistoryOpen=!bwHistoryOpen;render();return;}
  if(e.target.closest('#downloadLog')){downloadLog();return;}
  if(e.target.closest('#bwAdd')){
    const el=$('bwInput'),lb=Number(el&&el.value);
    if(!isFinite(lb)||lb<=0)return;
    if(el)el.value='';
    addBodyweight(lb);return;
  }
  const delBw=e.target.closest('[data-del-bw]');
  if(delBw){deleteBodyweight(delBw.getAttribute('data-del-bw'));return;}
  const delLog=e.target.closest('[data-del-log]');
  if(delLog){deleteLog(delLog.getAttribute('data-del-log'));render();return;}
  const del=e.target.closest('[data-del]');
  if(del){deleteEntryById(del.getAttribute('data-del'));render();}
});
document.addEventListener('change',e=>{
  if(e.target.id==='exSelect'){selectedExercise=e.target.value;render();return;}
  const pick=e.target.hasAttribute&&e.target.hasAttribute('data-pick-exercise')?e.target:null;
  if(pick){
    const ex=pick.getAttribute('data-pick-exercise');
    if(pick.checked)builderDraft.selected.add(ex);else builderDraft.selected.delete(ex);
    pick.closest('.exercisePick').classList.toggle('checked',pick.checked);

});
document.addEventListener('input',e=>{
  if(e.target.id==='sessionName'){builderDraft.name=e.target.value;const h=$('buildHint');if(h&&h.textContent)h.textContent='';}
  if(e.target.hasAttribute&&e.target.hasAttribute('data-weight-for')){
    runDraftWeights[e.target.getAttribute('data-weight-for')]=e.target.value;
  }
});
document.addEventListener('keydown',e=>{
  if(e.target.id==='sessionName'&&e.key==='Enter'){e.preventDefault();saveSessionFromBuilder();}
  if(e.target.hasAttribute&&e.target.hasAttribute('data-weight-for')&&e.key==='Enter'){
    e.preventDefault();completeRunExercise(e.target.getAttribute('data-weight-for'));
  }
  if(e.target.id==='bwInput'&&e.key==='Enter'){
    e.preventDefault();
    const lb=Number(e.target.value);
    if(isFinite(lb)&&lb>0){e.target.value='';addBodyweight(lb);}
  }
});

spawnStars();
(async()=>{
  const d=await window.Vitality.load();
  if(d&&typeof d==='object'&&!Array.isArray(d)){
    if(Array.isArray(d.sessions))store.sessions=d.sessions;
    if(Array.isArray(d.logs))store.logs=d.logs;
    if(Array.isArray(d.bodyweight))store.bodyweight=d.bodyweight;
  }
  render();
  window.Vitality.ready();
})();
</script>
