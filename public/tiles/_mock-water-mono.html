<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Water — mono mock</title>
<style>
  :root{
    --glass:rgba(255,255,255,.045);--stroke:rgba(255,255,255,.11);
    --fg:#e9e9ec;--muted:#8a8a90;--accent:#c3c6d0;--accent-dim:#7d7f88;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;
    --ease:cubic-bezier(.4,0,.2,1);
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%}
  body{
    background:radial-gradient(120% 60% at 50% 0%,#17171b 0%,#101013 42%,#0a0a0c 70%,#08080a 100%);
    color:var(--fg);font:16px/1.6 var(--font);
    display:flex;justify-content:center;padding:64px 28px;position:relative;overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }
  body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
    background:repeating-linear-gradient(0deg,rgba(255,255,255,.03) 0 1px,transparent 1px 3px);
    mix-blend-mode:overlay}

  /* everything below is desaturated on purpose, and slowed way down, and run
     through a slow SVG turbulence/displacement filter for a soft analog warp */
  .bgWarp{position:fixed;inset:0;z-index:0;pointer-events:none;filter:url(#distort)}
  .stars{position:absolute;inset:0}
  .star{position:absolute;width:2px;height:2px;background:#cfd0d6;border-radius:50%;opacity:.4;animation:twinkle 8s ease-in-out infinite}

  .sun{position:absolute;bottom:30vh;left:50%;transform:translateX(-50%);width:230px;height:230px;
    border-radius:50%;opacity:.4;
    background:linear-gradient(180deg,#d9d9dd 0%,#b7b7bd 26%,#96969d 55%,#7a7a80 82%,#5c5c62 100%);
    box-shadow:0 0 100px rgba(200,200,210,.15);
    animation:sunPulse 14s ease-in-out infinite}
  .sun::after{content:'';position:absolute;inset:0;border-radius:50%;
    background:repeating-linear-gradient(0deg,transparent 0 7px,#0a0a0c 7px 12px);
    -webkit-mask-image:linear-gradient(to bottom,transparent 0%,black 46%);
    mask-image:linear-gradient(to bottom,transparent 0%,black 46%)}
  @keyframes sunPulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.06)}}

  .groundWrap{position:absolute;left:0;right:0;bottom:0;height:44vh;overflow:hidden;
    -webkit-mask-image:linear-gradient(to top,black 55%,transparent 100%);
    mask-image:linear-gradient(to top,black 55%,transparent 100%)}
  .ground{position:absolute;inset:-30% -60% 0 -60%;
    background-image:
      linear-gradient(rgba(180,180,190,.22) 1px,transparent 1px),
      linear-gradient(90deg,rgba(160,160,170,.16) 1px,transparent 1px);
    background-size:64px 64px;
    transform:perspective(260px) rotateX(63deg);transform-origin:bottom;
    animation:gridMove 20s linear infinite}
  @keyframes gridMove{from{background-position:0 0,0 0}to{background-position:0 64px,64px 0}}
  .horizonLine{position:absolute;left:0;right:0;bottom:calc(44vh - 1px);height:2px;
    background:linear-gradient(90deg,transparent,rgba(190,190,198,.35) 30%,rgba(190,190,198,.45) 50%,rgba(190,190,198,.35) 70%,transparent);
    box-shadow:0 0 16px rgba(190,190,198,.25)}

  @keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.5}}
  @media(prefers-reduced-motion:reduce){.ground,.sun,.star,.markOrb,.markGlow{animation:none!important}.glass,.stat{transition:none}}

  .shell{position:relative;z-index:1;width:100%;max-width:640px}

  .header{display:flex;align-items:center;gap:18px;margin-bottom:30px}
  .markWrap{position:relative;width:56px;height:56px;flex-shrink:0}
  .markGlow{position:absolute;inset:-12px;border-radius:16px;background:var(--accent);filter:blur(16px);opacity:.4;
    animation:glowBreathe 4.5s ease-in-out infinite}
  @keyframes glowBreathe{0%,100%{opacity:.28;transform:scale(.92)}50%{opacity:.5;transform:scale(1.06)}}
  .markOrb{position:relative;width:56px;height:56px;border-radius:16px;
    background:linear-gradient(135deg,#d6d8de,#9a9ca4 55%,#6d6f76);
    display:flex;align-items:center;justify-content:center;box-shadow:0 6px 26px rgba(0,0,0,.5);
    border:1px solid rgba(255,255,255,.22);
    animation:sway 7s ease-in-out infinite}
  @keyframes sway{0%,100%{transform:rotate(-3deg) translateY(0)}50%{transform:rotate(3deg) translateY(-2px)}}
  .markOrb svg{width:26px;height:26px}
  .title{font-size:27px;font-weight:800;margin:0;letter-spacing:-.01em;color:var(--fg)}
  .subtitle{color:var(--muted);font-size:13.5px;margin:6px 0 0;letter-spacing:.02em}

  .glass{position:relative;border-radius:20px;background:var(--glass);border:1px solid var(--stroke);
    -webkit-backdrop-filter:blur(22px) saturate(120%);backdrop-filter:blur(22px) saturate(120%);
    box-shadow:0 1px 0 rgba(255,255,255,.06) inset,0 18px 46px rgba(0,0,0,.55);
    padding:24px 22px;margin-bottom:16px;overflow:hidden;transform-style:preserve-3d;transition:transform .15s ease-out}
  .glass::after{content:'';position:absolute;inset:0;border-radius:inherit;pointer-events:none;
    background:radial-gradient(circle at var(--mx,50%) var(--my,20%),rgba(255,255,255,.14),transparent 46%);
    mix-blend-mode:overlay;opacity:.9}

  .ringCard{display:flex;align-items:center;gap:24px}
  .ringBox{position:relative;width:164px;height:164px;flex-shrink:0}
  .ringBox svg{width:100%;height:100%;transform:rotate(-90deg)}
  .ringBox .ringVal{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ringVal .num{font-size:27px;font-weight:700;color:var(--fg);letter-spacing:-.01em}
  .ringVal .unit{font-size:12px;color:var(--muted);margin-top:2px}
  .ringMeta{flex:1;min-width:0}
  .ringMeta .goal{font-size:13.5px;color:var(--muted);margin:0 0 8px}
  .pct{font-size:32px;font-weight:800;color:var(--fg)}
  .pctLbl{font-size:12.5px;color:var(--muted);margin-top:2px}

  .stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px}
  .stat{position:relative;border-radius:16px;background:var(--glass);border:1px solid var(--stroke);
    -webkit-backdrop-filter:blur(18px);backdrop-filter:blur(18px);padding:16px 14px;text-align:center;
    overflow:hidden;transform-style:preserve-3d;transition:transform .15s ease-out}
  .stat::after{content:'';position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(circle at var(--mx,50%) var(--my,20%),rgba(255,255,255,.14),transparent 46%);
    mix-blend-mode:overlay}
  .statNum{font-size:21px;font-weight:700;color:var(--fg)}
  .statLbl{color:var(--muted);font-size:12px;margin-top:6px}

  .cardName{font-size:12.5px;color:var(--muted);display:block;margin-bottom:14px;font-weight:600;letter-spacing:.02em}
  .quickRow{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .quickBtn{
    border-radius:12px;border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.05);
    color:var(--fg);padding:10px 18px;font:inherit;font-size:14px;font-weight:600;cursor:pointer;
    transition:border-color .18s var(--ease),box-shadow .18s var(--ease),transform .18s var(--ease);
  }
  .quickBtn:hover{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 8px 22px rgba(0,0,0,.35);transform:translateY(-2px)}

  .row{display:flex;gap:12px;align-items:center}
  .field{flex:1}
  input[type=number]{
    width:100%;background:rgba(0,0,0,.32);border:1px solid var(--stroke);color:var(--fg);
    border-radius:12px;padding:12px 15px;font:inherit;font-size:15px;
  }
  input::placeholder{color:#5f6068}
  input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,255,255,.1)}
  .btn-primary{
    background:linear-gradient(135deg,#e4e5ea,#aeb0b8);
    color:#0a0a0c;border:none;font-weight:700;border-radius:12px;
    padding:12px 20px;font:inherit;font-size:14.5px;cursor:pointer;white-space:nowrap;
    box-shadow:0 8px 24px rgba(0,0,0,.4);transition:transform .18s var(--ease),box-shadow .18s var(--ease);
  }
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,0,0,.5)}
  .btn-primary:disabled{opacity:.5;cursor:default;transform:none}

  .logHead{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin:0 0 14px}
  .sectionTitle{font-weight:700;font-size:16px;margin:0;color:var(--fg)}
  .count{font-size:12.5px;color:var(--muted)}
  .log{display:flex;flex-direction:column;gap:8px}
  .entry{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 15px;
    border-radius:12px;background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.08);
    border-left:3px solid var(--accent)}
  .entryAmt{font-size:14.5px;font-weight:600;color:var(--fg)}
  .entryMeta{font-size:12px;color:var(--muted);margin-left:10px}
  .xBtn{background:transparent;border:1px solid rgba(255,255,255,.14);color:var(--muted);width:24px;height:24px;
    border-radius:50%;cursor:pointer;flex-shrink:0;line-height:1;transition:color .15s,border-color .15s}
  .xBtn:hover{color:#ff8a8a;border-color:rgba(255,138,138,.4)}
  .empty{color:var(--muted);font-size:13.5px;padding:6px 2px}
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute">
  <filter id="distort" x="-20%" y="-20%" width="140%" height="140%">
    <feTurbulence type="fractalNoise" baseFrequency="0.006 0.012" numOctaves="2" seed="7" result="noise">
      <animate attributeName="seed" values="0;9;3;11;0" dur="46s" repeatCount="indefinite"/>
    </feTurbulence>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="16" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
</svg>
<div class="bgWarp">
  <div class="sun"></div>
  <div class="groundWrap"><div class="ground"></div></div>
  <div class="horizonLine"></div>
  <div class="stars" id="stars"></div>
</div>
<main><div class="shell" id="app"></div></main>
<script>
/* Muted/mono mock: near-grayscale, slowed way down, run through a slow SVG
   turbulence/displacement filter for an analog warp. Cubes removed. The icon
   keeps a soft breathing glow + a slight sway. Preview only, standalone. */
const GOAL_ML=2000;
const QUICK=[250,350,500];
const CIRC=2*Math.PI*72;
let entries=[
  {id:'a',ml:350,ts:Date.now()-3*3600e3},
  {id:'b',ml:500,ts:Date.now()-1.5*3600e3},
  {id:'c',ml:250,ts:Date.now()-0.4*3600e3},
];
const $=id=>document.getElementById(id);
const REDUCED=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
function persist(){if(window.Vitality)window.Vitality.save(entries);}
function newId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function when(ts){const d=new Date(ts);return d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});}
function dayKey(ts){const d=new Date(ts);return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function todayEntries(){const k=dayKey(Date.now());return entries.filter(e=>dayKey(e.ts)===k);}
function todayTotal(){return todayEntries().reduce((s,e)=>s+e.ml,0);}
function streak(){return 4;}
function sevenDayAvg(){return 1840;}

function spawnStars(){
  const wrap=$('stars');if(!wrap)return;
  let html='';
  for(let i=0;i<40;i++){
    const left=Math.random()*100, top=Math.random()*55, delay=-Math.random()*8;
    html+='<div class="star" style="left:'+left+'%;top:'+top+'%;animation-delay:'+delay+'s"></div>';
  }
  wrap.innerHTML=html;
}

function initTilt(){
  if(REDUCED)return;
  document.addEventListener('mousemove',e=>{
    document.querySelectorAll('.glass, .stat').forEach(el=>{
      const r=el.getBoundingClientRect();
      let mx=(e.clientX-r.left)/r.width, my=(e.clientY-r.top)/r.height;
      mx=Math.min(1.4,Math.max(-0.4,mx));my=Math.min(1.4,Math.max(-0.4,my));
      const rx=(Math.min(1,Math.max(0,my))-0.5)*-6;
      const ry=(Math.min(1,Math.max(0,mx))-0.5)*8;
      el.style.setProperty('--mx',(mx*100)+'%');
      el.style.setProperty('--my',(my*100)+'%');
      el.style.transform='perspective(900px) rotateX('+rx.toFixed(2)+'deg) rotateY('+ry.toFixed(2)+'deg)';
    });
  });
}

function headerHtml(){
  return '<header class="header"><div class="markWrap"><div class="markGlow"></div><div class="markOrb" aria-hidden="true">'
    +'<svg viewBox="0 0 24 24" fill="#0a0a0c"><path d="M12 2c0 0-7 8.5-7 13a7 7 0 0 0 14 0c0-4.5-7-13-7-13z"/></svg>'
    +'</div></div><div><h1 class="title">Water</h1><p class="subtitle">Daily hydration</p></div></header>';
}
function ringHtml(){
  const total=todayTotal();
  const pct=Math.min(1,total/GOAL_ML);
  const offset=CIRC*(1-pct);
  return '<section class="glass ringCard">'
    +'<div class="ringBox"><svg viewBox="0 0 164 164">'
    +'<circle cx="82" cy="82" r="72" fill="none" stroke="rgba(255,255,255,.1)" stroke-width="13"/>'
    +'<circle cx="82" cy="82" r="72" fill="none" stroke="url(#g)" stroke-width="13" stroke-linecap="round" '
    +'stroke-dasharray="'+CIRC.toFixed(1)+'" stroke-dashoffset="'+offset.toFixed(1)+'" '
    +'style="filter:drop-shadow(0 0 8px rgba(255,255,255,.3));transition:stroke-dashoffset .7s cubic-bezier(.4,0,.2,1)"/>'
    +'<defs><linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">'
    +'<stop offset="0%" stop-color="#e6e7ec"/><stop offset="100%" stop-color="#7d7f88"/>'
    +'</linearGradient></defs></svg>'
    +'<div class="ringVal"><div class="num">'+total.toLocaleString()+'</div><div class="unit">ml today</div></div></div>'
    +'<div class="ringMeta"><div class="pct">'+Math.round(pct*100)+'%</div><div class="pctLbl">of daily goal</div>'
    +'<p class="goal">Goal '+GOAL_ML.toLocaleString()+' ml</p></div>'
    +'</section>';
}
function statsHtml(){
  return '<section class="stats">'
    +'<div class="stat"><div class="statNum">'+streak()+'</div><div class="statLbl">Day streak</div></div>'
    +'<div class="stat"><div class="statNum">'+sevenDayAvg().toLocaleString()+'</div><div class="statLbl">7-day avg ml</div></div>'
    +'</section>';
}
function formHtml(){
  const chips=QUICK.map(ml=>'<button class="quickBtn" data-quick="'+ml+'">+'+ml+' ml</button>').join('');
  return '<section class="glass"><span class="cardName">Log water</span>'
    +'<div class="quickRow">'+chips+'</div>'
    +'<div class="row"><div class="field">'
    +'<input type="number" id="amount" min="0" placeholder="Custom amount (ml)" /></div>'
    +'<button class="btn-primary" id="add">Add</button></div>'
    +'</section>';
}
function logInner(){
  const today=todayEntries().slice().sort((a,b)=>b.ts-a.ts);
  if(!today.length)return '<p class="empty">No water logged today. Add your first cup above.</p>';
  return today.map(e=>
    '<div class="entry"><div><span class="entryAmt">'+e.ml+' ml</span><span class="entryMeta">'+when(e.ts)+'</span></div>'
    +'<button class="xBtn" data-del="'+e.id+'" title="Remove">×</button></div>'
  ).join('');
}
function logHtml(){
  const today=todayEntries();
  return '<section class="glass"><div class="logHead"><h2 class="sectionTitle">Today</h2>'
    +'<span class="count">'+(today.length?today.length+(today.length===1?' entry':' entries'):'empty')+'</span></div>'
    +'<div class="log" id="log">'+logInner()+'</div></section>';
}
function render(){$('app').innerHTML=headerHtml()+ringHtml()+statsHtml()+formHtml()+logHtml();}

function addAmount(ml){
  if(!ml||ml<=0)return;
  entries.push({id:newId(),ml,ts:Date.now()});
  persist();render();
}
function addCustom(){
  const ml=parseInt($('amount').value,10);
  if(ml>0)addAmount(ml);
}

document.addEventListener('click',e=>{
  const quick=e.target.closest('[data-quick]');
  if(quick){addAmount(parseInt(quick.getAttribute('data-quick'),10));return;}
  if(e.target.closest('#add')){addCustom();return;}
  const del=e.target.closest('[data-del]');
  if(del){const id=del.getAttribute('data-del');entries=entries.filter(en=>en.id!==id);persist();render();}
});
document.addEventListener('keydown',e=>{if(e.target.id==='amount'&&e.key==='Enter'){e.preventDefault();addCustom();}});

spawnStars();
initTilt();
(async()=>{
  if(window.Vitality){const d=await window.Vitality.load();if(Array.isArray(d)&&d.length)entries=d;}
  render();
})();
</script>
</body>
</html>
