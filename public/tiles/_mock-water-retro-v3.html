<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Water — retro mock v3</title>
<style>
  :root{
    --bg:#0a0a0c;--panel:#151517;--panel-alt:#1c1c1f;--line:#ffffff;--line-dim:#4a4a4f;
    --fg:#f4f4f2;--muted:#9a9aa0;--neg:#ff6b6b;
    --font:ui-monospace,"Courier New",Consolas,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%}
  body{
    background:var(--bg);color:var(--fg);font:16px/1.6 var(--font);
    -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
    display:flex;justify-content:center;padding:56px 32px;
  }
  .shell{width:100%;max-width:860px}
  .header{display:flex;align-items:center;gap:16px;margin-bottom:28px;padding-bottom:18px;border-bottom:2px solid var(--line)}
  .mark{width:42px;height:42px;flex-shrink:0;border:2px solid var(--line);
    display:flex;align-items:center;justify-content:center;background:var(--panel)}
  .mark svg{width:22px;height:22px}
  .title{font-size:24px;font-weight:700;margin:0;letter-spacing:.02em}
  .subtitle{color:var(--muted);font-size:13px;letter-spacing:.03em;margin:6px 0 0}
  .panel{position:relative;border:1px solid var(--line-dim);background:var(--panel);padding:22px 20px;margin-bottom:18px}
  .panel::before,.panel::after,.panel>.br,.panel>.bl{content:'';position:absolute;width:9px;height:9px;border:2px solid var(--line)}
  .panel::before{top:-1px;left:-1px;border-right:none;border-bottom:none}
  .panel::after{top:-1px;right:-1px;border-left:none;border-bottom:none}
  .panel>.bl{bottom:-1px;left:-1px;border-right:none;border-top:none}
  .panel>.br{bottom:-1px;right:-1px;border-left:none;border-top:none}
  .progressTop{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:14px}
  .progressNum{font-size:28px;font-weight:700}
  .progressNum .unit{font-size:13px;color:var(--muted);margin-left:6px}
  .progressGoal{font-size:12px;color:var(--muted)}
  .track{width:100%;height:14px;background:var(--bg);border:1px solid var(--line-dim);padding:2px}
  .fill{height:100%;background:var(--line)}
  .stats{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:18px}
  .stat{border:1px solid var(--line-dim);background:var(--panel);padding:16px 14px;text-align:center}
  .statNum{font-size:22px;font-weight:700}
  .statLbl{color:var(--muted);font-size:12px;margin-top:6px}
  .divider{height:1px;background:var(--line-dim);margin:16px 0}
  .cardName{font-size:12px;letter-spacing:.03em;color:var(--muted);display:block;margin-bottom:16px}
  .quickRow{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
  .quickBtn{
    border:1px solid var(--line);background:transparent;color:var(--fg);
    padding:10px 18px;font:inherit;font-size:14px;font-weight:600;cursor:pointer;
    transition:background .1s,color .1s;
  }
  .quickBtn:hover{background:var(--line);color:#000}
  .row{display:flex;gap:12px;align-items:flex-end}
  .field{flex:1}
  .fieldLbl{display:block;font-size:12px;color:var(--muted);margin-bottom:7px}
  input[type=number]{
    width:100%;background:var(--bg);border:1px solid var(--line-dim);color:var(--fg);
    padding:10px 12px;font:inherit;font-size:15px;
  }
  input:focus{outline:none;border-color:var(--line)}
  .btn-primary{
    background:var(--line);color:#000;border:1px solid var(--line);font-weight:700;
    padding:10px 20px;font:inherit;font-size:14px;cursor:pointer;white-space:nowrap;
  }
  .btn-primary:hover{background:transparent;color:var(--fg)}
  .logHead{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin:0 0 14px}
  .sectionTitle{font-weight:700;font-size:16px;margin:0}
  .count{font-size:12px;color:var(--muted)}
  .log{display:flex;flex-direction:column;gap:8px}
  .entry{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;
    border:1px solid var(--line-dim);border-left:3px solid var(--line);background:var(--panel-alt)}
  .entryAmt{font-size:14.5px;font-weight:600}
  .entryMeta{font-size:12px;color:var(--muted);margin-left:12px}
  .xBtn{background:transparent;border:1px solid var(--line-dim);color:var(--muted);width:24px;height:24px;cursor:pointer;flex-shrink:0;line-height:1;font-size:12px}
  .xBtn:hover{color:var(--neg);border-color:var(--neg)}
</style>
</head>
<body>
<main><div class="shell" id="app"></div></main>
<script>
/* Retro mock v3 — sentence case (not all-caps), larger/clearer type, wider
   full-screen-style layout. Same monochrome dark + white HUD frame as v2. */
const GOAL_ML=2000;
const QUICK=[250,350,500];
let entries=[
  {id:'a',ml:350,ts:Date.now()-3*3600e3},
  {id:'b',ml:500,ts:Date.now()-1.5*3600e3},
  {id:'c',ml:250,ts:Date.now()-0.4*3600e3},
];
const $=id=>document.getElementById(id);
function persist(){if(window.Vitality)window.Vitality.save(entries);}
function newId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function when(ts){const d=new Date(ts);return d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});}
function dayKey(ts){const d=new Date(ts);return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function todayEntries(){const k=dayKey(Date.now());return entries.filter(e=>dayKey(e.ts)===k);}
function todayTotal(){return todayEntries().reduce((s,e)=>s+e.ml,0);}
function streak(){return 4;}
function sevenDayAvg(){return 1840;}
function brackets(){return '<span class="bl"></span><span class="br"></span>';}

function headerHtml(){
  return '<header class="header"><div class="mark" aria-hidden="true">'
    +'<svg viewBox="0 0 16 16" shape-rendering="crispEdges" fill="#fff">'
    +'<rect x="7" y="1" width="2" height="2"/><rect x="6" y="3" width="4" height="2"/>'
    +'<rect x="5" y="5" width="6" height="2"/><rect x="4" y="7" width="8" height="5"/>'
    +'<rect x="5" y="12" width="6" height="2"/></svg></div>'
    +'<div><h1 class="title">Water</h1><p class="subtitle">Daily hydration</p></div></header>';
}
function progressHtml(){
  const total=todayTotal();
  const pct=Math.min(100,Math.round((total/GOAL_ML)*100));
  return '<section class="panel">'+brackets()
    +'<div class="progressTop"><div class="progressNum">'+total.toLocaleString()+'<span class="unit">ml</span></div>'
    +'<div class="progressGoal">Goal '+GOAL_ML.toLocaleString()+' ml</div></div>'
    +'<div class="track"><div class="fill" style="width:'+pct+'%"></div></div>'
    +'</section>';
}
function statsHtml(){
  return '<section class="stats">'
    +'<div class="stat">'+brackets()+'<div class="statNum">'+streak()+'</div><div class="statLbl">Day streak</div></div>'
    +'<div class="stat">'+brackets()+'<div class="statNum">'+sevenDayAvg().toLocaleString()+'</div><div class="statLbl">7-day avg ml</div></div>'
    +'</section>';
}
function formHtml(){
  const chips=QUICK.map(ml=>'<button class="quickBtn" data-quick="'+ml+'">+'+ml+' ml</button>').join('');
  return '<section class="panel">'+brackets()+'<span class="cardName">Log water</span>'
    +'<div class="quickRow">'+chips+'</div>'
    +'<div class="divider"></div>'
    +'<div class="row"><div class="field"><label class="fieldLbl">Custom (ml)</label>'
    +'<input type="number" id="amount" min="0" placeholder="300" /></div>'
    +'<button class="btn-primary" id="add">Add</button></div>'
    +'</section>';
}
function logInner(){
  const today=todayEntries().slice().sort((a,b)=>b.ts-a.ts);
  if(!today.length)return '<p class="statLbl">No water logged today.</p>';
  return today.map(e=>
    '<div class="entry"><div><span class="entryAmt">'+e.ml+' ml</span><span class="entryMeta">'+when(e.ts)+'</span></div>'
    +'<button class="xBtn" data-del="'+e.id+'">×</button></div>'
  ).join('');
}
function logHtml(){
  const today=todayEntries();
  return '<div class="logHead"><h2 class="sectionTitle">Today</h2>'
    +'<span class="count">'+(today.length?today.length+' entries':'empty')+'</span></div>'
    +'<div class="log" id="log">'+logInner()+'</div>';
}
function render(){$('app').innerHTML=headerHtml()+progressHtml()+statsHtml()+formHtml()+logHtml();}

function addAmount(ml){
  if(!ml||ml<=0)return;
  entries.push({id:newId(),ml,ts:Date.now()});
  persist();render();
}
function addCustom(){
  const ml=parseInt($('amount').value,10);
  if(ml>0)addAmount(ml);
}

document.addEventListener('click',e=>{
  const quick=e.target.closest('[data-quick]');
  if(quick){addAmount(parseInt(quick.getAttribute('data-quick'),10));return;}
  if(e.target.closest('#add')){addCustom();return;}
  const del=e.target.closest('[data-del]');
  if(del){const id=del.getAttribute('data-del');entries=entries.filter(en=>en.id!==id);persist();render();}
});
document.addEventListener('keydown',e=>{if(e.target.id==='amount'&&e.key==='Enter'){e.preventDefault();addCustom();}});

(async()=>{
  if(window.Vitality){const d=await window.Vitality.load();if(Array.isArray(d)&&d.length)entries=d;}
  render();
})();
</script>
</body>
</html>
