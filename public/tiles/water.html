<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Water</title>
<style>
  :root{
    --bg:#050506;--surface:#0e0e11;--border:#1d1d22;--brand:#6EE7B7;
    --brand-soft:rgba(110,231,183,.08);--brand-line:rgba(110,231,183,.35);
    --muted:#84848c;--muted-strong:#a8a8b0;--fg:#ededf0;--neg:#ff6b6b;--neg-line:rgba(255,107,107,.4);
    --track:#17171b;--radius-md:12px;--radius-pill:999px;
    --font-display:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;
    --font-mono:ui-monospace,SFMono-Regular,Menlo,"JetBrains Mono",monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--bg);color:var(--fg);font:15px/1.5 var(--font-display);display:flex;justify-content:center;padding:40px 20px}
  .shell{width:100%;max-width:620px}
  .header{display:flex;align-items:center;gap:14px;margin-bottom:22px}
  .mark{width:44px;height:44px;flex-shrink:0;border-radius:50%;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 35% 30%,#c8ffe8,var(--brand) 46%,#2b8f6b 100%);box-shadow:0 0 26px rgba(110,231,183,.35)}
  .mark svg{width:22px;height:22px}
  .title{font-size:24px;font-weight:600;letter-spacing:-.01em;margin:0}
  .subtitle{color:var(--muted);font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;margin:5px 0 0}
  .progressWrap{border:1px solid var(--border);border-radius:16px;background:var(--surface);padding:18px;margin-bottom:18px}
  .progressTop{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:12px}
  .progressNum{font-size:26px;font-weight:600;letter-spacing:-.01em}
  .progressNum .unit{font-size:14px;color:var(--muted-strong);font-weight:400;margin-left:4px}
  .progressGoal{font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .track{width:100%;height:10px;border-radius:var(--radius-pill);background:var(--track);overflow:hidden}
  .fill{height:100%;border-radius:var(--radius-pill);background:var(--brand);transition:width .25s ease}
  .stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px}
  .stat{border:1px solid var(--border);border-radius:var(--radius-md);background:var(--surface);padding:14px 12px;text-align:center}
  .statNum{font-size:22px;font-weight:600;letter-spacing:-.01em}
  .statNum.brand{color:var(--brand)}
  .statLbl{color:var(--muted);font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;margin-top:4px}
  .card{border:1px solid var(--border);border-radius:16px;background:var(--surface);padding:18px;margin-bottom:22px}
  .cardName{font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:14px}
  .quickRow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .quickBtn{border:1px solid var(--border);background:var(--bg);color:var(--fg);border-radius:var(--radius-pill);
    padding:9px 16px;font:inherit;font-size:13.5px;cursor:pointer;transition:border-color .2s,color .2s}
  .quickBtn:hover{border-color:var(--brand);color:var(--brand)}
  .row{display:flex;gap:10px;align-items:flex-end}
  .field{flex:1}
  .fieldLbl{display:block;font-size:11px;color:var(--muted);margin-bottom:6px}
  input[type=number]{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--fg);
    border-radius:10px;padding:10px 12px;font:inherit}
  input:focus{outline:none;border-color:var(--brand)}
  input::placeholder{color:#55555c}
  .btn-primary{background:var(--brand);color:#04140d;border:none;font-weight:600;border-radius:10px;padding:10px 16px;font:inherit;cursor:pointer;white-space:nowrap}
  .hint{color:var(--neg);font-size:12px;font-family:var(--font-mono);min-height:14px;margin:8px 2px 0}
  .logHead{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin:0 0 12px}
  .sectionTitle{font-weight:600;font-size:17px;margin:0}
  .count{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  .log{display:flex;flex-direction:column;gap:8px}
  .entry{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 15px;border:1px solid var(--border);
    border-left:3px solid var(--brand-line);border-radius:var(--radius-md);background:var(--surface)}
  .entryAmt{font-size:14.5px;font-weight:600}
  .entryMeta{font-family:var(--font-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-left:10px}
  .xBtn{background:transparent;border:1px solid var(--border);color:var(--muted);width:26px;height:26px;border-radius:50%;cursor:pointer;flex-shrink:0;line-height:1}
  .xBtn:hover{color:var(--neg);border-color:var(--neg-line)}
  .empty{color:var(--muted);font-size:13px;padding:14px 0}
</style>
</head>
<body>
<main><div class="shell" id="app"></div></main>
<script>
/* Water — a hydration log. No network and no browser storage: entries persist
   through the dashboard bridge (window.Vitality). */
const GOAL_ML=2000;
const QUICK=[250,350,500];
let entries=[];
const $=id=>document.getElementById(id);
function persist(){window.Vitality.save(entries);}
function newId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function when(ts){const d=new Date(ts);return d.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});}
function dayKey(ts){const d=new Date(ts);return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}

function todayEntries(){const k=dayKey(Date.now());return entries.filter(e=>dayKey(e.ts)===k);}
function todayTotal(){return todayEntries().reduce((sum,e)=>sum+e.ml,0);}
function sevenDayAvg(){
  const cutoff=Date.now()-7*24*60*60*1000;
  const recent=entries.filter(e=>e.ts>=cutoff);
  const days=new Set(recent.map(e=>dayKey(e.ts)));
  if(!days.size)return 0;
  const total=recent.reduce((sum,e)=>sum+e.ml,0);
  return Math.round(total/days.size);
}
function streak(){
  const totals={};
  for(const e of entries){const k=dayKey(e.ts);totals[k]=(totals[k]||0)+e.ml;}
  const d=new Date();d.setHours(0,0,0,0);
  const hitsGoal=k=>(totals[k]||0)>=GOAL_ML;
  if(!hitsGoal(dayKey(d.getTime()))){
    d.setDate(d.getDate()-1);
    if(!hitsGoal(dayKey(d.getTime())))return 0;
  }
  let count=0;
  while(hitsGoal(dayKey(d.getTime()))){count++;d.setDate(d.getDate()-1);}
  return count;
}

function headerHtml(){
  return '<header class="header"><div class="mark" aria-hidden="true">'
    +'<svg viewBox="-12 -12 24 24" fill="none" stroke="#04140d" stroke-width="1.6" stroke-linecap="round">'
    +'<circle cx="0" cy="0" r="3" stroke-width="1.8"/><circle cx="0" cy="0" r="7" stroke-width="1.4" opacity="0.7"/>'
    +'<circle cx="0" cy="0" r="10.2" stroke-width="1.1" opacity="0.45"/></svg></div>'
    +'<div><h1 class="title">Water</h1><p class="subtitle">daily hydration</p></div></header>';
}
function progressHtml(){
  const total=todayTotal();
  const pct=Math.min(100,Math.round((total/GOAL_ML)*100));
  return '<section class="progressWrap">'
    +'<div class="progressTop"><div class="progressNum">'+total.toLocaleString()+'<span class="unit">ml</span></div>'
    +'<div class="progressGoal">Goal '+GOAL_ML.toLocaleString()+' ml</div></div>'
    +'<div class="track"><div class="fill" style="width:'+pct+'%"></div></div>'
    +'</section>';
}
function statsHtml(){
  return '<section class="stats">'
    +'<div class="stat"><div class="statNum brand">'+streak()+'</div><div class="statLbl">Day streak</div></div>'
    +'<div class="stat"><div class="statNum">'+sevenDayAvg().toLocaleString()+'</div><div class="statLbl">7-day avg ml</div></div>'
    +'</section>';
}
function formHtml(){
  const chips=QUICK.map(ml=>'<button class="quickBtn" data-quick="'+ml+'">+'+ml+' ml</button>').join('');
  return '<section class="card"><span class="cardName">Log water</span>'
    +'<div class="quickRow">'+chips+'</div>'
    +'<div class="row"><div class="field"><label class="fieldLbl">Custom amount (ml)</label>'
    +'<input type="number" id="amount" min="0" placeholder="e.g. 300" /></div>'
    +'<button class="btn-primary" id="add">Add</button></div>'
    +'<div class="hint" id="hint"></div>'
    +'</section>';
}
function logInner(){
  const today=todayEntries().slice().sort((a,b)=>b.ts-a.ts);
  if(!today.length)return '<p class="empty">No water logged today. Add your first cup above.</p>';
  return today.map(e=>
    '<div class="entry"><div><span class="entryAmt">'+e.ml+' ml</span><span class="entryMeta">'+when(e.ts)+'</span></div>'
    +'<button class="xBtn" data-del="'+e.id+'" title="Remove">×</button></div>'
  ).join('');
}
function logHtml(){
  const today=todayEntries();
  return '<div class="logHead"><h2 class="sectionTitle">Today</h2>'
    +'<span class="count">'+(today.length?today.length+(today.length===1?' entry':' entries'):'empty')+'</span></div>'
    +'<div class="log" id="log">'+logInner()+'</div>';
}
function render(){$('app').innerHTML=headerHtml()+progressHtml()+statsHtml()+formHtml()+logHtml();}

function addAmount(ml){
  if(!ml||ml<=0)return;
  entries.push({id:newId(),ml,ts:Date.now()});
  persist();
  render();
}
function addCustom(){
  const ml=parseInt($('amount').value,10);
  if(!ml||ml<=0){$('hint').textContent='Enter an amount first.';$('amount').focus();return;}
  addAmount(ml);
}

document.addEventListener('click',e=>{
  const quick=e.target.closest('[data-quick]');
  if(quick){addAmount(parseInt(quick.getAttribute('data-quick'),10));return;}
  if(e.target.closest('#add')){addCustom();return;}
  const del=e.target.closest('[data-del]');
  if(del){const id=del.getAttribute('data-del');entries=entries.filter(en=>en.id!==id);persist();render();}
});
document.addEventListener('input',e=>{if(e.target.id==='amount'){const h=$('hint');if(h&&h.textContent)h.textContent='';}});
document.addEventListener('keydown',e=>{if(e.target.id==='amount'&&e.key==='Enter'){e.preventDefault();addCustom();}});

(async()=>{const d=await window.Vitality.load();entries=Array.isArray(d)?d:[];render();})();
</script>
</body>
</html>
