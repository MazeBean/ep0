<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Fuel</title>
<style>
  /* Vitality reskin of the Patron "Macros" tile — sealed & bridge-backed. */
  :root{
    --bg:#0a0a0c;--surface:rgba(255,255,255,.045);--border:rgba(255,255,255,.11);--brand:#c3c6d0;
    --brand-soft:rgba(255,255,255,.05);--brand-line:rgba(255,255,255,.18);
    --muted:#8a8a90;--muted-strong:#a8a8b0;--fg:#ededf0;--neg:#ff6b6b;--neg-line:rgba(255,107,107,.4);
    --track:#17171b;--radius-md:12px;--radius-pill:999px;
    --font-display:ui-rounded,-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;
    --font-mono:ui-monospace,SFMono-Regular,Menlo,"JetBrains Mono",monospace;
    --space-3:10px;--space-4:14px;--space-5:18px;--space-8:28px;--duration:.2s;--ease:cubic-bezier(.4,0,.2,1);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:radial-gradient(120% 60% at 50% 0%,#17171b 0%,#101013 42%,#0a0a0c 70%,#08080a 100%);
    color:var(--fg);font:15px/1.5 var(--font-display);display:flex;justify-content:center;padding:40px 20px;
    position:relative;overflow-x:hidden;-webkit-font-smoothing:antialiased}
  body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
    background:repeating-linear-gradient(0deg,rgba(255,255,255,.03) 0 1px,transparent 1px 3px);mix-blend-mode:overlay}
  .bgWarp{position:fixed;inset:0;z-index:0;pointer-events:none;filter:url(#distort)}
  .stars{position:absolute;inset:0}
  .star{position:absolute;width:2px;height:2px;background:#cfd0d6;border-radius:50%;opacity:.4;animation:twinkle 8s ease-in-out infinite}
  .sun{position:absolute;bottom:30vh;left:50%;transform:translateX(-50%);width:230px;height:230px;border-radius:50%;opacity:.4;
    background:linear-gradient(180deg,#d9d9dd 0%,#b7b7bd 26%,#96969d 55%,#7a7a80 82%,#5c5c62 100%);box-shadow:0 0 100px rgba(200,200,210,.15);
    animation:sunPulse 14s ease-in-out infinite}
  .sun::after{content:'';position:absolute;inset:0;border-radius:50%;background:repeating-linear-gradient(0deg,transparent 0 7px,#0a0a0c 7px 12px);
    -webkit-mask-image:linear-gradient(to bottom,transparent 0%,black 46%);mask-image:linear-gradient(to bottom,transparent 0%,black 46%)}
  @keyframes sunPulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.06)}}
  .groundWrap{position:absolute;left:0;right:0;bottom:0;height:44vh;overflow:hidden;
    -webkit-mask-image:linear-gradient(to top,black 55%,transparent 100%);mask-image:linear-gradient(to top,black 55%,transparent 100%)}
  .ground{position:absolute;inset:-30% -60% 0 -60%;
    background-image:linear-gradient(rgba(180,180,190,.22) 1px,transparent 1px),linear-gradient(90deg,rgba(160,160,170,.16) 1px,transparent 1px);
    background-size:64px 64px;transform:perspective(260px) rotateX(63deg);transform-origin:bottom;animation:gridMove 20s linear infinite}
  @keyframes gridMove{from{background-position:0 0,0 0}to{background-position:0 64px,64px 0}}
  .horizonLine{position:absolute;left:0;right:0;bottom:calc(44vh - 1px);height:2px;
    background:linear-gradient(90deg,transparent,rgba(190,190,198,.35) 30%,rgba(190,190,198,.45) 50%,rgba(190,190,198,.35) 70%,transparent);
    box-shadow:0 0 16px rgba(190,190,198,.25)}
  @keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.5}}
  @media(prefers-reduced-motion:reduce){.ground,.sun,.star,.markOrb,.markGlow{animation:none!important}.card{transition:none}}
  .shell{position:relative;z-index:1;width:100%;max-width:620px}
  .header{display:flex;align-items:center;gap:14px;margin-bottom:22px}
  .markWrap{position:relative;width:44px;height:44px;flex-shrink:0}
  .markGlow{position:absolute;inset:-10px;border-radius:50%;background:var(--brand);filter:blur(14px);opacity:.4;
    animation:glowBreathe 4.5s ease-in-out infinite}
  @keyframes glowBreathe{0%,100%{opacity:.28;transform:scale(.92)}50%{opacity:.5;transform:scale(1.06)}}
  .mark{position:relative;width:44px;height:44px;flex-shrink:0;border-radius:50%;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 35% 30%,#e4e5ea,var(--brand) 46%,#6d6f76 100%);box-shadow:0 0 26px rgba(0,0,0,.5);
    animation:sway 7s ease-in-out infinite}
  @keyframes sway{0%,100%{transform:rotate(-3deg) translateY(0)}50%{transform:rotate(3deg) translateY(-2px)}}
  .mark svg{width:22px;height:22px}
  .title{font-size:24px;font-weight:700;letter-spacing:-.01em;margin:0;text-transform:lowercase}
  .subtitle{color:var(--muted);font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;text-transform:lowercase;margin:6px 0 0}
  .card{position:relative;border:1px solid var(--border);border-radius:16px;background:var(--surface);padding:18px;
    -webkit-backdrop-filter:blur(20px) saturate(120%);backdrop-filter:blur(20px) saturate(120%);
    overflow:hidden;transform-style:preserve-3d;transition:transform .15s ease-out}
  .card::after{content:'';position:absolute;inset:0;border-radius:inherit;pointer-events:none;
    background:radial-gradient(circle at var(--mx,50%) var(--my,20%),rgba(255,255,255,.14),transparent 46%);
    mix-blend-mode:overlay;opacity:.9}
  .cardName{font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:lowercase;color:var(--muted);display:block;margin-bottom:14px}
  .calHead{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:14px}
  .calMath{display:flex;align-items:flex-end;gap:16px;flex-wrap:wrap}
  .calCell{display:flex;flex-direction:column;gap:2px}
  .calCell .n{font-weight:600;font-size:30px;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
  .calCell .l{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:lowercase;color:var(--muted)}
  .calOp{font-size:22px;color:var(--muted)}
  .calCell.remain .n{color:var(--brand)}
  .calCell.remain.over .n{color:var(--neg)}
  .goalEdits{display:flex;flex-direction:column;gap:8px}
  .goalEdit{display:flex;align-items:center;justify-content:flex-end;gap:8px}
  .fieldInput{background:var(--bg);border:1px solid var(--border);color:var(--fg);border-radius:10px;padding:9px 11px;font:inherit}
  .fieldInput:focus{outline:none;border-color:var(--brand)}
  .goalEdit .fieldInput{width:92px}
  .macroBar{height:4px;border-radius:var(--radius-pill);background:var(--track);overflow:hidden;margin-top:8px}
  .macroBarFill{height:100%;border-radius:var(--radius-pill);background:var(--brand);transition:width var(--duration) ease}
  .bar{height:10px;border-radius:var(--radius-pill);background:var(--track);overflow:hidden}
  .barFill{height:100%;border-radius:var(--radius-pill);background:var(--brand);transition:width var(--duration) ease}
  .barFill.over{background:var(--neg)}
  .macroGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px}
  @media(max-width:560px){.macroGrid{grid-template-columns:repeat(2,1fr)}}
  .macroBox{display:flex;flex-direction:column;gap:4px;padding:14px;border:1px solid var(--border);border-radius:var(--radius-md);background:var(--bg)}
  .macroBox[data-accent="cal"]{border-color:var(--brand-line);background:var(--brand-soft)}
  .macroVal{font-weight:600;font-size:22px;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
  .macroLabel{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;text-transform:lowercase;color:var(--muted)}
  .sectionTitle{font-weight:700;font-size:17px;margin:28px 0 0;text-transform:lowercase}
  .search{margin:18px 0 10px}
  .search .fieldInput{width:100%}
  .results,.logList{display:flex;flex-direction:column;gap:6px;margin-top:10px}
  .foodRow,.logRow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-md);background:var(--surface)}
  .foodName{font-weight:600;font-size:14px}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--muted)}
  .nums{font-family:var(--font-mono);font-size:11px;color:var(--muted-strong)}
  .gramInput{width:74px}
  .btn{border:1px solid var(--border);background:var(--bg);color:var(--fg);border-radius:10px;padding:9px 13px;font:inherit;cursor:pointer}
  .btn-primary{background:var(--brand);color:#04140d;border:none;font-weight:600}
  .xBtn{background:transparent;border:1px solid var(--border);color:var(--muted);width:26px;height:26px;border-radius:50%;cursor:pointer;flex-shrink:0}
  .xBtn:hover{color:var(--neg);border-color:var(--neg-line)}
  .empty{color:var(--muted);font-size:13px;padding:12px 0}
  .hint{color:var(--neg);font-size:12px;font-family:var(--font-mono);min-height:14px;margin-top:4px}
  .suppAdd{display:flex;gap:8px;margin:10px 0 14px}
  .suppAdd .fieldInput{flex:1}
  .suppList{display:flex;flex-direction:column;gap:6px}
  .suppRow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-md);background:var(--surface)}
  .suppLeft{display:flex;align-items:center;gap:12px;min-width:0}
  .checkBtn{background:transparent;border:1.5px solid var(--border);color:transparent;width:22px;height:22px;border-radius:50%;
    cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:border-color .15s,background .15s,color .15s}
  .checkBtn:hover{border-color:var(--brand)}
  .checkBtn.checked{background:var(--brand);border-color:var(--brand);color:#0a0a0c}
  .checkBtn svg{width:12px;height:12px}
  .suppName{font-size:14px}
  .suppRow.checked .suppName{color:var(--muted);text-decoration:line-through}
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute">
  <filter id="distort" x="-20%" y="-20%" width="140%" height="140%">
    <feTurbulence type="fractalNoise" baseFrequency="0.006 0.012" numOctaves="2" seed="7" result="noise">
      <animate attributeName="seed" values="0;9;3;11;0" dur="46s" repeatCount="indefinite"/>
    </feTurbulence>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="16" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
</svg>
<div class="bgWarp">
  <div class="sun"></div>
  <div class="groundWrap"><div class="ground"></div></div>
  <div class="horizonLine"></div>
  <div class="stars" id="stars"></div>
</div>
<main><div class="shell" id="app"></div></main>
<script>
/* Fuel — daily food + macro tracker. Ported from the Patron "Macros" standalone:
   reskinned to Vitality mint, sealed (no external assets), and persisting through
   the dashboard bridge (window.Vitality) instead of localStorage. */
const FOODS=[
  {name:'Chicken breast',cal:165,p:31,c:0,f:3.6},{name:'Beef mince (5%)',cal:137,p:21,c:0,f:5},
  {name:'Salmon',cal:208,p:20,c:0,f:13},{name:'Egg',cal:143,p:13,c:1.1,f:9.5},
  {name:'Greek yogurt',cal:59,p:10,c:3.6,f:0.4},{name:'Whey protein',cal:400,p:80,c:8,f:6},
  {name:'White rice',cal:130,p:2.7,c:28,f:0.3},{name:'Oats',cal:389,p:17,c:66,f:7},
  {name:'Pasta (cooked)',cal:157,p:6,c:31,f:0.9},{name:'Potato',cal:77,p:2,c:17,f:0.1},
  {name:'Sweet potato',cal:86,p:1.6,c:20,f:0.1},{name:'Banana',cal:89,p:1.1,c:23,f:0.3},
  {name:'Apple',cal:52,p:0.3,c:14,f:0.2},{name:'Broccoli',cal:34,p:2.8,c:7,f:0.4},
  {name:'Almonds',cal:579,p:21,c:22,f:50},{name:'Peanut butter',cal:588,p:25,c:20,f:50},
  {name:'Olive oil',cal:884,p:0,c:0,f:100},{name:'Avocado',cal:160,p:2,c:9,f:15},
  {name:'Cheddar cheese',cal:402,p:25,c:1.3,f:33},{name:'Milk (whole)',cal:61,p:3.2,c:4.8,f:3.3},
  {name:'Bread (slice)',cal:265,p:9,c:49,f:3.2},{name:'Tuna (canned)',cal:116,p:26,c:0,f:1}
];
let store={};
const $=id=>document.getElementById(id);
const REDUCED=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
function spawnStars(){
  const wrap=$('stars');if(!wrap)return;
  let html='';
  for(let i=0;i<40;i++){
    const left=Math.random()*100, top=Math.random()*55, delay=-Math.random()*8;
    html+='<div class="star" style="left:'+left+'%;top:'+top+'%;animation-delay:'+delay+'s"></div>';
  }
  wrap.innerHTML=html;
}
function initTilt(){
  if(REDUCED)return;
  document.addEventListener('mousemove',e=>{
    document.querySelectorAll('.card').forEach(el=>{
      const r=el.getBoundingClientRect();
      let mx=(e.clientX-r.left)/r.width, my=(e.clientY-r.top)/r.height;
      mx=Math.min(1.4,Math.max(-0.4,mx));my=Math.min(1.4,Math.max(-0.4,my));
      const rx=(Math.min(1,Math.max(0,my))-0.5)*-6;
      const ry=(Math.min(1,Math.max(0,mx))-0.5)*8;
      el.style.setProperty('--mx',(mx*100)+'%');
      el.style.setProperty('--my',(my*100)+'%');
      el.style.transform='perspective(900px) rotateX('+rx.toFixed(2)+'deg) rotateY('+ry.toFixed(2)+'deg)';
    });
  });
}
function todayKey(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function persist(){window.Vitality.save(store);}
function todaysLog(){return store[todayKey()]||[];}
function setTodaysLog(l){store[todayKey()]=l;persist();}
function goalCal(){return store.goalCal!=null?store.goalCal:2000;}
function setGoalCal(n){store.goalCal=n;persist();}
function goalProtein(){return store.goalProtein!=null?store.goalProtein:150;}
function setGoalProtein(n){store.goalProtein=n;persist();}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
const round=n=>Math.round(n);
let query='',matches=[];
function totals(){return todaysLog().reduce((t,e)=>{t.cal+=e.cal;t.p+=e.p;t.c+=e.c;t.f+=e.f;return t;},{cal:0,p:0,c:0,f:0});}

/* ---- daily supplements checklist: the supplement list persists; which ones
   are checked resets each day (keyed by date, same pattern as the food log) ---- */
function allSupplements(){return Array.isArray(store.supplements)?store.supplements:[];}
function todaysChecked(){
  if(!store.supplementChecks||typeof store.supplementChecks!=='object')store.supplementChecks={};
  return Array.isArray(store.supplementChecks[todayKey()])?store.supplementChecks[todayKey()]:[];
}
function setTodaysChecked(ids){
  if(!store.supplementChecks||typeof store.supplementChecks!=='object')store.supplementChecks={};
  store.supplementChecks[todayKey()]=ids;persist();
}
function addSupplement(name){
  const trimmed=name.trim();if(!trimmed)return;
  if(!Array.isArray(store.supplements))store.supplements=[];
  store.supplements.push({id:newId(),name:trimmed});persist();
}
function deleteSupplement(id){
  store.supplements=allSupplements().filter(s=>s.id!==id);
  setTodaysChecked(todaysChecked().filter(x=>x!==id));
  persist();
}
function toggleSupplement(id){
  const checked=todaysChecked();
  const next=checked.includes(id)?checked.filter(x=>x!==id):[...checked,id];
  setTodaysChecked(next);
}
function newId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function summaryHtml(){
  const t=totals(),goal=goalCal(),pGoal=goalProtein();
  const remaining=goal-t.cal,over=remaining<0,pct=Math.min(100,goal>0?(t.cal/goal)*100:0);
  const pPct=Math.min(100,pGoal>0?(t.p/pGoal)*100:0);
  const cell=(cls,n,l)=>'<div class="calCell '+cls+'"><span class="n">'+round(n)+'</span><span class="l">'+l+'</span></div>';
  const head='<div class="calHead"><div class="calMath">'+cell('',goal,'goal')+'<span class="calOp">−</span>'+cell('',t.cal,'food')+'<span class="calOp">=</span>'+cell('remain'+(over?' over':''),Math.abs(remaining),over?'over':'remaining')+'</div>'
    +'<div class="goalEdits">'
    +'<div class="goalEdit"><span class="calCell"><span class="l">calorie goal</span></span><input class="fieldInput" id="goal" type="number" min="0" step="50" value="'+goal+'" /></div>'
    +'<div class="goalEdit"><span class="calCell"><span class="l">protein goal (g)</span></span><input class="fieldInput" id="proteinGoal" type="number" min="0" step="5" value="'+pGoal+'" /></div>'
    +'</div></div>';
  const bar='<div class="bar"><div class="barFill'+(over?' over':'')+'" style="width:'+pct+'%"></div></div>';
  const box=(a,v,u,l,goalPct)=>'<div class="macroBox" data-accent="'+a+'"><span class="macroVal">'+round(v)+(u||'')+'</span><span class="macroLabel">'+l+'</span>'
    +(goalPct!=null?'<div class="macroBar"><div class="macroBarFill" style="width:'+goalPct+'%"></div></div>':'')+'</div>';
  return '<section class="card"><span class="cardName">Today</span>'+head+bar+'<div class="macroGrid">'
    +box('p',t.p,'g','protein / '+pGoal+'g',pPct)+box('c',t.c,'g','carbs')+box('f',t.f,'g','fat')+box('cal',t.cal,'','calories')+'</div></section>';
}
function resultsInner(){
  const q=query.trim().toLowerCase();
  matches=q?FOODS.filter(f=>f.name.toLowerCase().includes(q)).slice(0,8):[];
  if(!q)return '<p class="empty">Start typing to find a food…</p>';
  if(!matches.length)return '<p class="empty">No match. (Add it to the FOODS list.)</p>';
  return matches.map((f,i)=>'<div class="foodRow"><div><div class="foodName">'+esc(f.name)+'</div><div class="meta">'+f.cal+' kcal · '+f.p+'P / '+f.c+'C / '+f.f+'F per 100g</div></div><div style="display:flex;align-items:center;gap:8px"><input class="fieldInput gramInput" type="number" min="0" placeholder="g" data-grams="'+i+'" /><button class="btn btn-primary" data-add="'+i+'">Add</button></div></div>').join('');
}
function searchHtml(){return '<h2 class="sectionTitle">Add food</h2><div class="search"><input class="fieldInput" id="q" type="text" placeholder="Search foods (e.g. chicken, rice, banana)" value="'+esc(query)+'" autocomplete="off" /></div><div class="hint" id="hint"></div><div class="results" id="results">'+resultsInner()+'</div>';}
function logHtml(){
  const log=todaysLog();
  if(!log.length)return '<h2 class="sectionTitle">Logged today</h2><p class="empty">Nothing logged yet.</p>';
  const rows=log.map((e,i)=>'<div class="logRow"><div><div class="foodName">'+esc(e.name)+' <span class="meta">'+e.grams+'g</span></div><div class="nums">'+round(e.cal)+' kcal · '+round(e.p)+'P / '+round(e.c)+'C / '+round(e.f)+'F</div></div><button class="xBtn" data-del="'+i+'" title="Remove">×</button></div>').join('');
  return '<h2 class="sectionTitle">Logged today</h2><div class="logList">'+rows+'</div>';
}
function supplementsHtml(){
  const items=allSupplements(),checked=todaysChecked();
  const rows=items.length?items.map(s=>{
    const isChecked=checked.includes(s.id);
    return '<div class="suppRow'+(isChecked?' checked':'')+'"><div class="suppLeft">'
      +'<button class="checkBtn'+(isChecked?' checked':'')+'" data-toggle-supp="'+s.id+'" title="Toggle taken today">'
      +'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12l5 5L20 6"/></svg></button>'
      +'<span class="suppName">'+esc(s.name)+'</span></div>'
      +'<button class="xBtn" data-del-supp="'+s.id+'" title="Remove">×</button></div>';
  }).join('') : '<p class="empty">No supplements yet. Add one below.</p>';
  return '<h2 class="sectionTitle">Supplements</h2>'
    +'<div class="suppAdd"><input class="fieldInput" id="suppName" type="text" placeholder="e.g. Vitamin D, creatine" autocomplete="off" />'
    +'<button class="btn btn-primary" id="suppAdd">Add</button></div>'
    +'<div class="suppList">'+rows+'</div>';
}
function headerHtml(){
  return '<header class="header"><div class="markWrap"><div class="markGlow"></div><div class="mark" aria-hidden="true">'
    +'<svg viewBox="-12 -12 24 24" fill="#0a0a0c" stroke="none"><path d="M0 -10 C0 -10 -7 -2 -7 3 a7 7 0 0 0 14 0 C7 -2 0 -10 0 -10 Z"/></svg></div></div>'
    +'<div><h1 class="title">Fuel</h1><p class="subtitle">protein · carbs · fat</p></div></header>';
}
function render(){$('app').innerHTML=headerHtml()+summaryHtml()+searchHtml()+logHtml()+supplementsHtml();}
document.addEventListener('input',e=>{
  if(e.target.id==='q'){query=e.target.value;$('results').innerHTML=resultsInner();$('hint').textContent='';}
  if(e.target.id==='goal'){const n=Number(e.target.value);setGoalCal(isFinite(n)&&n>=0?n:0);render();$('goal').focus();}
  if(e.target.id==='proteinGoal'){const n=Number(e.target.value);setGoalProtein(isFinite(n)&&n>=0?n:0);render();$('proteinGoal').focus();}
});
document.addEventListener('click',e=>{
  const add=e.target.closest('[data-add]');
  if(add){
    const f=matches[Number(add.getAttribute('data-add'))];
    const gEl=document.querySelector('[data-grams="'+add.getAttribute('data-add')+'"]');
    const grams=Number(gEl&&gEl.value);
    if(!f||!isFinite(grams)||grams<=0){const h=$('hint');if(h)h.textContent='Enter how many grams.';return;}
    const k=grams/100,log=todaysLog();
    log.push({name:f.name,grams,cal:f.cal*k,p:f.p*k,c:f.c*k,f:f.f*k});
    setTodaysLog(log);query='';render();return;
  }
  const del=e.target.closest('[data-del]');
  if(del){const log=todaysLog();log.splice(Number(del.getAttribute('data-del')),1);setTodaysLog(log);render();return;}
  if(e.target.closest('#suppAdd')){
    const el=$('suppName');
    addSupplement((el&&el.value)||'');
    if(el)el.value='';
    render();return;
  }
  const toggleSupp=e.target.closest('[data-toggle-supp]');
  if(toggleSupp){toggleSupplement(toggleSupp.getAttribute('data-toggle-supp'));render();return;}
  const delSupp=e.target.closest('[data-del-supp]');
  if(delSupp){deleteSupplement(delSupp.getAttribute('data-del-supp'));render();}
});
document.addEventListener('keydown',e=>{
  if(e.target.id==='suppName'&&e.key==='Enter'){
    e.preventDefault();
    addSupplement(e.target.value||'');
    e.target.value='';render();
  }
});
spawnStars();
initTilt();
(async()=>{const d=await window.Vitality.load();store=(d&&typeof d==='object'&&!Array.isArray(d))?d:{};render();})();
</script>
</body>
</html>
