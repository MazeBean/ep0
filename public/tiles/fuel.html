<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Fuel</title>
<style>
  /* Vitality reskin of the Patron "Macros" tile — sealed & bridge-backed. */
  :root{
    --bg:#0a0a0c;--surface:rgba(255,255,255,.02);--border:rgba(255,255,255,.08);--brand:#6EE7B7;
    --brand-soft:rgba(110,231,183,.08);--brand-line:rgba(110,231,183,.3);
    --muted:#8a8a90;--muted-strong:#a8a8b0;--fg:#ededf0;--neg:#ff6b6b;--neg-line:rgba(255,107,107,.4);
    --track:#17171b;--radius-md:12px;--radius-pill:999px;
    --font-display:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,sans-serif;
    --font-mono:ui-monospace,SFMono-Regular,Menlo,"JetBrains Mono",monospace;
    --font-serif:Georgia,"Iowan Old Style","Times New Roman",serif;
    --space-3:10px;--space-4:14px;--space-5:18px;--space-8:28px;--duration:.2s;--ease:cubic-bezier(.4,0,.2,1);
  }
  *{box-sizing:border-box}
  h1,h2,h3,p{margin:0}
  html,body{margin:0;height:100%;scrollbar-gutter:stable}
  body{background:radial-gradient(120% 60% at 50% 0%,#17171b 0%,#101013 42%,#0a0a0c 70%,#08080a 100%);
    color:var(--fg);font:15px/1.5 var(--font-display);display:flex;justify-content:center;padding:40px 20px;
    position:relative;overflow-x:hidden;overflow-y:hidden;-webkit-font-smoothing:antialiased}
  body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
    background:repeating-linear-gradient(0deg,rgba(255,255,255,.03) 0 1px,transparent 1px 3px);mix-blend-mode:overlay}
  /* Same slow drifting mint wash as the home dashboard's own background
     (dashboard.module.css's .page::before/canvasDrift), so this tile doesn't
     feel like a flatter, separate world from the tab it opened out of. */
  body::after{content:'';position:fixed;inset:-10% -5%;z-index:0;pointer-events:none;
    background:radial-gradient(ellipse 50% 35% at 70% 20%,rgba(110,231,183,.06),transparent 65%),
      radial-gradient(ellipse 40% 30% at 20% 80%,rgba(110,231,183,.04),transparent 70%);
    animation:canvasDrift 60s ease-in-out infinite alternate}
  @keyframes canvasDrift{from{transform:translate3d(0,0,0)}to{transform:translate3d(-2%,1%,0)}}
  @media(prefers-reduced-motion:reduce){body::after{animation:none}}
  /* body's flex+justify-content:center makes main a flex item; without
     min-width:0 its default auto-minimum is its content's min-content size
     (the meal grid's per-column floor), which can exceed the viewport and
     push the whole page off-center instead of letting the meal table's own
     overflow-x:auto contain the scroll. */
  main{width:100%;min-width:0}
  .stars{position:fixed;inset:0;z-index:0;pointer-events:none}
  .star{position:absolute;width:2px;height:2px;background:#cfd0d6;border-radius:50%;opacity:.4;animation:twinkle 8s ease-in-out infinite}
  @keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.5}}
  @media(prefers-reduced-motion:reduce){.star,.markOrb,.markGlow{animation:none!important}.card{transition:none}}
  .shell{position:relative;z-index:1;width:100%;max-width:none}
  /* Today (calc + gauge) and the weekly meal plan sit side by side on a wide
     PC viewport instead of stacking full-width, one above the other. Today
     keeps its own compact width; the meal plan (now a day-per-column grid)
     takes whatever's left instead of leaving it empty. */
  .fuelTopRow{display:block}
  @media(min-width:900px){
    .fuelTopRow{display:grid;grid-template-columns:minmax(280px,420px) 1fr;gap:16px;align-items:start}
  }
  .header{display:flex;align-items:center;gap:14px;margin-bottom:12px}
  .markWrap{position:relative;width:44px;height:44px;flex-shrink:0}
  .markGlow{position:absolute;inset:-10px;border-radius:50%;background:var(--brand);filter:blur(14px);opacity:.4;
    animation:glowBreathe 4.5s ease-in-out infinite}
  @keyframes glowBreathe{0%,100%{opacity:.28;transform:scale(.92)}50%{opacity:.5;transform:scale(1.06)}}
  .mark{position:relative;width:44px;height:44px;flex-shrink:0;border-radius:50%;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 35% 30%,#e4e5ea,var(--brand) 46%,#6d6f76 100%);box-shadow:0 0 26px rgba(0,0,0,.5);
    animation:sway 7s ease-in-out infinite}
  @keyframes sway{0%,100%{transform:rotate(-3deg) translateY(0)}50%{transform:rotate(3deg) translateY(-2px)}}
  .mark svg{width:22px;height:22px}
  .title{font-family:var(--font-serif);font-style:italic;font-size:40px;font-weight:600;line-height:1;letter-spacing:-.01em;margin:0}
  .subtitle{color:var(--muted);font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;margin:6px 0 0}
  /* Transparent, not frosted — same treatment as the home dashboard's own
     overview cards: a near-invisible tint (--surface) with no backdrop blur,
     so the starfield reads through crisp instead of behind a glass pane. */
  .card{position:relative;border:1px solid var(--border);border-radius:16px;background:var(--surface);padding:12px;margin-bottom:10px;
    overflow:hidden;transition:border-color .2s var(--ease),box-shadow .2s var(--ease)}
  .card:hover{border-color:var(--brand-line);box-shadow:0 0 0 1px var(--brand-line) inset}
  /* Panel load-in — same recipe as the home dashboard's overview cards (a
     slight overshoot + a brief mint border/glow flash before settling), just
     without the ripple/ping rings that only make sense on that 6-card grid.
     Each card's own inline animation-delay staggers them in render order. */
  /* Two separate animations, not one: cardIn (forwards) owns opacity/transform
     so the reveal sticks; cardFlash has no fill-mode, so once its one pass
     ends the browser drops it and border-color/box-shadow revert to the
     normal cascade — including :hover. A forwards-filled animation freezes
     its last keyframe at "animation" priority (above normal author rules
     regardless of specificity), so if cardFlash also used forwards its
     frozen border-color would permanently block :hover from ever applying
     again. The single animation-delay set inline per card still staggers
     both animations — with two names it cycles to cover both (spec). */
  .card{opacity:0;animation:cardIn .65s cubic-bezier(.16,1,.3,1) forwards,cardFlash .65s cubic-bezier(.16,1,.3,1)}
  @keyframes cardIn{
    0%{opacity:0;transform:translateY(14px) scale(.94)}
    55%{opacity:1;transform:translateY(-2px) scale(1.015)}
    100%{opacity:1;transform:translateY(0) scale(1)}
  }
  @keyframes cardFlash{
    0%{border-color:var(--border);box-shadow:none}
    55%{border-color:rgba(110,231,183,.55);box-shadow:0 0 0 1px rgba(110,231,183,.25),0 10px 26px -14px rgba(110,231,183,.4)}
    100%{border-color:var(--border);box-shadow:none}
  }
  @media(prefers-reduced-motion:reduce){.card{animation:none!important;opacity:1!important}}
  .cardName{font-family:var(--font-mono);font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#fff;display:block;margin-bottom:10px}
  /* Today's own column is capped narrow (see .fuelTopRow) so the calc row
     and the gauge stack instead of sitting side by side — a row layout here
     just squeezes the gauge to one edge instead of centering it. */
  .calTopRow{display:flex;flex-direction:column;align-items:stretch;gap:14px;margin-bottom:10px}
  .calLeftCol{display:flex;flex-direction:column;gap:12px}
  .calMath{display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap}
  .calCell{display:flex;flex-direction:column;gap:2px}
  .calCell .n{font-weight:600;font-size:30px;line-height:1;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
  .calCell .l{font-family:var(--font-mono);font-size:10px;letter-spacing:.12em;color:var(--muted)}
  .calOp{font-size:30px;line-height:1;color:var(--muted);align-self:flex-start}
  .calCell.remain .n{color:var(--brand)}
  .calCell.remain.over .n{color:var(--neg)}
  .goalEdits{display:flex;flex-direction:column;gap:10px}
  .goalEdit{display:flex;align-items:center;gap:10px}
  .fieldInput{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--fg);border-radius:10px;padding:9px 11px;font:inherit;min-width:0}
  /* hide native number-input spin arrows for visual consistency with the rest of the dashboard */
  .fieldInput[type=number]{-moz-appearance:textfield;appearance:textfield}
  .fieldInput[type=number]::-webkit-inner-spin-button,.fieldInput[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}
  .fieldInput:focus{outline:none;border-color:var(--brand)}
  .goalEdit .fieldInput{width:92px}
  /* Goal steppers: same +/- pattern as Workout's weight stepper, just sized
     down to fit inline in this label+value row instead of its own big
     centered block. */
  .goalStepper{display:flex;align-items:center;gap:8px}
  .miniStepBtn{width:28px;height:28px;flex-shrink:0;border-radius:50%;border:1px solid var(--border);background:var(--bg);
    color:var(--fg);font-size:15px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:border-color .15s var(--ease),background .15s var(--ease),transform .1s var(--ease)}
  .miniStepBtn:hover{border-color:var(--brand-line);background:var(--brand-soft)}
  .miniStepBtn:active{transform:scale(.9)}
  .goalStepVal{min-width:56px;text-align:center;font-size:16px;font-weight:600;font-variant-numeric:tabular-nums}
  /* Calorie gauge: a counterclockwise-filling ring (see arcPathCCW in the
     script — a hand-built SVG arc, not a mirrored stroke-dasharray trick,
     so the sweep direction is exact rather than guessed). */
  .calGaugeWrap{display:flex;justify-content:center;flex-shrink:0}
  .calGaugeSvg{width:190px;height:190px}
  .calGaugeTrack{fill:none;stroke:var(--track);stroke-width:12}
  .calGaugeFill{fill:none;stroke:var(--brand);stroke-width:12;stroke-linecap:round;
    filter:drop-shadow(0 0 6px rgba(110,231,183,.55))}
  .calGaugeFill.over{stroke:var(--neg);filter:none}
  .calGaugeNum{font-family:var(--font-serif);font-style:italic;font-weight:600;font-size:32px;letter-spacing:-.01em;fill:var(--fg)}
  .calGaugeLbl{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.1em;fill:var(--muted)}
  /* Macro bars: protein (gold) on top, carbs + fat (white) below. Carbs/fat
     have no user-set per-gram goal, so their bars scale against a generic
     40/30% calorie-split reference derived from the calorie goal — a rough
     guide, not a personalized target. */
  .macroBars{display:flex;flex-direction:column;gap:10px;margin-top:10px}
  .macroBarRow{display:flex;flex-direction:column;gap:6px}
  .macroBarHead{display:flex;align-items:baseline;justify-content:space-between;font-size:13px;color:var(--muted-strong)}
  .macroBarHead .v{font-family:var(--font-mono);font-size:11.5px;font-variant-numeric:tabular-nums;color:var(--fg)}
  /* A plain var(--track) here read as almost the same color as the card
     surface behind it — too dark to register as an empty progress track. */
  .macroBarTrack{height:8px;border-radius:var(--radius-pill);background:rgba(255,255,255,.12);overflow:hidden}
  .macroBarFill{height:100%;border-radius:var(--radius-pill);transition:width var(--duration) ease}
  .macroBarFill.gold{background:var(--brand)}
  .macroBarFill.white{background:rgba(255,255,255,.78)}
  .sectionTitle{font-weight:700;font-size:17px;margin:16px 0 0}
  .search{margin:10px 0 8px}
  .search .fieldInput{width:100%}
  .results,.logList{display:flex;flex-direction:column;gap:6px;margin-top:10px}
  .foodRow,.logRow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:var(--radius-md);background:var(--surface)}
  .foodName{font-weight:600;font-size:14px}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--muted)}
  .nums{font-family:var(--font-mono);font-size:11px;color:var(--muted-strong)}
  .gramInput{width:74px}
  .btn{border:1px solid var(--border);background:var(--bg);color:var(--fg);border-radius:10px;padding:9px 13px;font:inherit;cursor:pointer}
  .btn-primary{background:var(--brand);color:#04140d;border:none;font-weight:600}
  .xBtn{background:transparent;border:1px solid var(--border);color:var(--muted);width:26px;height:26px;border-radius:50%;cursor:pointer;flex-shrink:0}
  .xBtn:hover{color:var(--neg);border-color:var(--neg-line)}
  .empty{color:var(--muted);font-size:13px;padding:12px 0}
  .hint{color:var(--neg);font-size:12px;font-family:var(--font-mono);min-height:14px;margin-top:4px}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .field{flex:1;min-width:110px}
  .fieldLbl{display:block;font-size:11px;color:var(--muted);margin-bottom:6px}
  .fieldNote{font-family:var(--font-mono);font-size:10px;letter-spacing:.06em;color:var(--muted);margin:8px 0 0}
  /* A day per column, a meal slot per row — a compact spreadsheet-style grid
     that widens with the available screen instead of stacking tall. */
  .mealTable{display:flex;flex-direction:column;gap:6px}
  .mealHeadRow,.mealRow{display:flex;align-items:center;gap:8px}
  .mealRowCells{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;flex:1;min-width:0}
  .mealDayHead{text-align:center;font-family:var(--font-mono);font-size:10px;letter-spacing:.04em;color:var(--muted)}
  .mealDayHead.today{color:var(--brand);font-weight:700}
  .mealSlotLbl{flex-shrink:0;width:14px;text-align:center;font-family:var(--font-mono);font-size:9px;letter-spacing:.06em;color:var(--muted)}
  .mealInput{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--fg);border-radius:8px;padding:6px 4px;font:inherit;font-size:10.5px;min-width:0;text-align:center}
  .mealInput:focus{outline:none;border-color:var(--brand)}
  .mealInput::placeholder{color:#4a4a50}
  @media(max-width:700px){
    .mealTable{overflow-x:auto}
    .mealRowCells{grid-template-columns:repeat(7,minmax(64px,1fr))}
  }
  @media(max-width:640px){
    .calGaugeSvg{width:172px;height:172px}
    .goalEdits{width:100%}
  }
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<main><div class="shell" id="app"></div></main>
<script>
/* Fuel — daily food + macro tracker. Ported from the Patron "Macros" standalone:
   reskinned to Vitality mint, sealed (no external assets), and persisting through
   the dashboard bridge (window.Vitality) instead of localStorage. */
const FOODS=[
  {name:'Chicken breast',cal:165,p:31,c:0,f:3.6},{name:'Beef mince (5%)',cal:137,p:21,c:0,f:5},
  {name:'Salmon',cal:208,p:20,c:0,f:13},{name:'Egg',cal:143,p:13,c:1.1,f:9.5},
  {name:'Greek yogurt',cal:59,p:10,c:3.6,f:0.4},{name:'Whey protein',cal:400,p:80,c:8,f:6},
  {name:'White rice',cal:130,p:2.7,c:28,f:0.3},{name:'Oats',cal:389,p:17,c:66,f:7},
  {name:'Pasta (cooked)',cal:157,p:6,c:31,f:0.9},{name:'Potato',cal:77,p:2,c:17,f:0.1},
  {name:'Sweet potato',cal:86,p:1.6,c:20,f:0.1},{name:'Banana',cal:89,p:1.1,c:23,f:0.3},
  {name:'Apple',cal:52,p:0.3,c:14,f:0.2},{name:'Broccoli',cal:34,p:2.8,c:7,f:0.4},
  {name:'Almonds',cal:579,p:21,c:22,f:50},{name:'Peanut butter',cal:588,p:25,c:20,f:50},
  {name:'Olive oil',cal:884,p:0,c:0,f:100},{name:'Avocado',cal:160,p:2,c:9,f:15},
  {name:'Cheddar cheese',cal:402,p:25,c:1.3,f:33},{name:'Milk (whole)',cal:61,p:3.2,c:4.8,f:3.3},
  {name:'Bread (slice)',cal:265,p:9,c:49,f:3.2},{name:'Tuna (canned)',cal:116,p:26,c:0,f:1}
];
let store={};
const $=id=>document.getElementById(id);
const REDUCED=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
function spawnStars(){
  const wrap=$('stars');if(!wrap)return;
  let html='';
  for(let i=0;i<40;i++){
    const left=Math.random()*100, top=Math.random()*55, delay=-Math.random()*8;
    html+='<div class="star" style="left:'+left+'%;top:'+top+'%;animation-delay:'+delay+'s"></div>';
  }
  wrap.innerHTML=html;
}
function todayKey(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function persist(){window.Vitality.save(store);}
function todaysLog(){return store[todayKey()]||[];}
function setTodaysLog(l){store[todayKey()]=l;persist();}
function goalCal(){return store.goalCal!=null?store.goalCal:3000;}
function setGoalCal(n){store.goalCal=n;persist();}
function goalProtein(){return store.goalProtein!=null?store.goalProtein:150;}
function setGoalProtein(n){store.goalProtein=n;persist();}
function stepGoalCal(delta){setGoalCal(Math.max(0,goalCal()+delta));render();}
function stepGoalProtein(delta){setGoalProtein(Math.max(0,goalProtein()+delta));render();}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
const round=n=>Math.round(n);
let query='',matches=[];
function totals(){return todaysLog().reduce((t,e)=>{t.cal+=e.cal;t.p+=e.p;t.c+=e.c;t.f+=e.f;return t;},{cal:0,p:0,c:0,f:0});}

function newId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

/* ---- custom foods: reusable, persisted entries the user creates once and
   can then search + add just like the built-in FOODS list (same per-100g
   convention, so gram-based scaling in resultsInner()/click-to-add works
   identically for both). ---- */
function customFoods(){return Array.isArray(store.customFoods)?store.customFoods:[];}
function allFoods(){return FOODS.concat(customFoods());}
function addCustomFood(name,cal,p,c,f){
  if(!Array.isArray(store.customFoods))store.customFoods=[];
  store.customFoods.push({id:newId(),name,cal,p,c,f});
  persist();
}
function deleteCustomFood(id){
  store.customFoods=customFoods().filter(x=>x.id!==id);
  persist();
}

/* ---- weekly meal plan: a reusable Sun–Sat template (not tied to specific
   dates), separate from the daily food log above ---- */
const WEEKDAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MEAL_SLOTS=['breakfast','lunch','dinner'];
function mealPlan(){if(!store.mealPlan||typeof store.mealPlan!=='object')store.mealPlan={};return store.mealPlan;}
function mealFor(dayIdx,slot){const day=mealPlan()[dayIdx];return day&&day[slot]?day[slot]:'';}
function setMeal(dayIdx,slot,value){
  const plan=mealPlan();
  if(!plan[dayIdx])plan[dayIdx]={};
  plan[dayIdx][slot]=value;
  persist();
}
/* ---- calorie gauge geometry: a hand-built SVG arc (not a mirrored
   stroke-dasharray) so the counterclockwise sweep direction is exact. ---- */
function polarPt(cx,cy,r,deg){
  const rad=(deg-90)*Math.PI/180; // 0deg = 12 o'clock
  return {x:cx+r*Math.cos(rad),y:cy+r*Math.sin(rad)};
}
function arcPathCCW(cx,cy,r,pct){
  const clamped=Math.max(0,Math.min(0.9999,pct));
  const sweepDeg=-360*clamped; // negative degrees = counterclockwise from 12 o'clock
  const start=polarPt(cx,cy,r,0);
  const end=polarPt(cx,cy,r,sweepDeg);
  const largeArc=Math.abs(sweepDeg)>180?1:0;
  return 'M '+start.x.toFixed(2)+' '+start.y.toFixed(2)+' A '+r+' '+r+' 0 '+largeArc+' 0 '+end.x.toFixed(2)+' '+end.y.toFixed(2);
}
function calGaugeHtml(pct,eaten,goal,over){
  const cx=86,cy=86,r=74,d=pct>0?arcPathCCW(cx,cy,r,pct):'';
  return '<div class="calGaugeWrap"><svg viewBox="0 0 172 172" class="calGaugeSvg">'
    +'<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" class="calGaugeTrack"/>'
    +(d?'<path d="'+d+'" class="calGaugeFill'+(over?' over':'')+'"/>':'')
    +'<text x="'+cx+'" y="'+(cy-4)+'" text-anchor="middle" class="calGaugeNum">'+round(eaten)+'</text>'
    +'<text x="'+cx+'" y="'+(cy+18)+'" text-anchor="middle" class="calGaugeLbl">of '+goal+' kcal</text>'
    +'</svg></div>';
}
function macroBarRowHtml(label,valueG,goalG,pct,colorClass){
  const valTxt=round(valueG)+'g'+(goalG!=null?' / '+goalG+'g':'');
  return '<div class="macroBarRow"><div class="macroBarHead"><span>'+label+'</span><span class="v">'+valTxt+'</span></div>'
    +'<div class="macroBarTrack"><div class="macroBarFill '+colorClass+'" style="width:'+Math.max(0,Math.min(100,pct))+'%"></div></div></div>';
}
function summaryHtml(){
  const t=totals(),goal=goalCal(),pGoal=goalProtein();
  const remaining=goal-t.cal,over=remaining<0;
  const calPct=goal>0?t.cal/goal:0;
  const pPct=pGoal>0?(t.p/pGoal)*100:0;
  // Carbs/fat have no per-gram goal in this tile's data model, so their bars
  // scale against a generic 40%-carb / 30%-fat calorie-split reference
  // derived from the calorie goal — a rough guide, not a personalized target.
  const carbsRef=Math.max(1,Math.round(goal*0.4/4));
  const fatRef=Math.max(1,Math.round(goal*0.3/9));
  const cPct=(t.c/carbsRef)*100;
  const fPct=(t.f/fatRef)*100;
  const cell=(cls,n,l)=>'<div class="calCell '+cls+'"><span class="n">'+round(n)+'</span><span class="l">'+l+'</span></div>';
  const gauge=calGaugeHtml(calPct,t.cal,goal,over);
  const stepper=(key,val,dir,label)=>'<button type="button" class="miniStepBtn" data-goal-step="'+key+'" data-dir="'+dir+'" aria-label="'+label+'">'+(dir<0?'−':'+')+'</button>';
  const head='<div class="calTopRow"><div class="calLeftCol"><div class="calMath">'+cell('',goal,'Goal')+'<span class="calOp">−</span>'+cell('',t.cal,'Food')+'<span class="calOp">=</span>'+cell('remain'+(over?' over':''),Math.abs(remaining),over?'Over':'Remaining')+'</div>'
    +'<div class="goalEdits">'
    +'<div class="goalEdit"><span class="calCell"><span class="l">Calorie goal</span></span><div class="goalStepper">'
    +stepper('cal',goal,-1,'Subtract 50 kcal')+'<span class="goalStepVal">'+goal+'</span>'+stepper('cal',goal,1,'Add 50 kcal')+'</div></div>'
    +'<div class="goalEdit"><span class="calCell"><span class="l">Protein goal (g)</span></span><div class="goalStepper">'
    +stepper('protein',pGoal,-1,'Subtract 5g protein')+'<span class="goalStepVal">'+pGoal+'</span>'+stepper('protein',pGoal,1,'Add 5g protein')+'</div></div>'
    +'</div></div>'
    +gauge+'</div>';
  const bars='<div class="macroBars">'
    +macroBarRowHtml('Protein',t.p,pGoal,pPct,'gold')
    +macroBarRowHtml('Carbs',t.c,null,cPct,'white')
    +macroBarRowHtml('Fat',t.f,null,fPct,'white')
    +'</div>';
  return '<section class="card" style="animation-delay:0ms"><span class="cardName">Today</span>'+head+bars+'</section>';
}
function mealPlanHtml(){
  const todayIdx=new Date().getDay();
  const headCells=WEEKDAYS.map((label,i)=>'<span class="mealDayHead'+(i===todayIdx?' today':'')+'">'+label+'</span>').join('');
  const rows=MEAL_SLOTS.map(slot=>{
    const cells=WEEKDAYS.map((_,i)=>{
      const val=esc(mealFor(i,slot));
      return '<input class="mealInput" type="text" data-meal-day="'+i+'" data-meal-slot="'+slot+'" value="'+val+'" placeholder="'+slot+'" autocomplete="off" />';
    }).join('');
    return '<div class="mealRow"><span class="mealSlotLbl">'+slot.slice(0,1).toUpperCase()+'</span><div class="mealRowCells">'+cells+'</div></div>';
  }).join('');
  return '<section class="card" style="animation-delay:90ms"><span class="cardName">Weekly meal plan</span><div class="mealTable">'
    +'<div class="mealHeadRow"><span class="mealSlotLbl"></span><div class="mealRowCells">'+headCells+'</div></div>'
    +rows+'</div></section>';
}
function resultsInner(){
  const q=query.trim().toLowerCase();
  matches=q?allFoods().filter(f=>f.name.toLowerCase().includes(q)).slice(0,8):[];
  if(!q)return '<p class="empty">Start typing to find a food…</p>';
  if(!matches.length)return '<p class="empty">No match — create it below.</p>';
  return matches.map((f,i)=>'<div class="foodRow"><div><div class="foodName">'+esc(f.name)+'</div><div class="meta">'+f.cal+' kcal · '+f.p+'P / '+f.c+'C / '+f.f+'F per 100g</div></div><div style="display:flex;align-items:center;gap:8px"><input class="fieldInput gramInput" type="number" min="0" placeholder="g" data-grams="'+i+'" /><button class="btn btn-primary" data-add="'+i+'">Add</button></div></div>').join('');
}
function createFoodHtml(){
  const list=customFoods();
  const rows=list.length?'<div class="results">'+list.map(f=>'<div class="foodRow"><div><div class="foodName">'+esc(f.name)+'</div><div class="meta">'+f.cal+' kcal · '+f.p+'P / '+f.c+'C / '+f.f+'F per 100g</div></div><button class="xBtn" data-del-food="'+f.id+'" title="Remove">×</button></div>').join('')+'</div>':'';
  return '<h2 class="sectionTitle">Create a food</h2>'
    +'<div class="row">'
    +'<div class="field" style="flex:2;min-width:160px"><label class="fieldLbl">Name</label><input class="fieldInput" id="cfName" type="text" placeholder="e.g. protein shake" autocomplete="off" /></div>'
    +'<div class="field"><label class="fieldLbl">Calories</label><input class="fieldInput" id="cfCal" type="number" min="0" step="1" placeholder="165" /></div>'
    +'</div>'
    +'<div class="row" style="margin-top:10px">'
    +'<div class="field"><label class="fieldLbl">Protein (g)</label><input class="fieldInput" id="cfP" type="number" min="0" step="0.1" placeholder="31" /></div>'
    +'<div class="field"><label class="fieldLbl">Carbs (g)</label><input class="fieldInput" id="cfC" type="number" min="0" step="0.1" placeholder="0" /></div>'
    +'<div class="field"><label class="fieldLbl">Fat (g)</label><input class="fieldInput" id="cfF" type="number" min="0" step="0.1" placeholder="3.6" /></div>'
    +'</div>'
    +'<p class="fieldNote">Values per 100g — same convention as the built-in list, so grams entered when logging scale correctly</p>'
    +'<div class="hint" id="cfHint"></div>'
    +'<div style="display:flex;justify-content:flex-end;margin-top:10px"><button class="btn btn-primary" id="cfAdd">Add to list</button></div>'
    +rows;
}
function searchHtml(){return '<h2 class="sectionTitle">Add food</h2><div class="search"><input class="fieldInput" id="q" type="text" placeholder="Search foods (e.g. chicken, rice, banana)" value="'+esc(query)+'" autocomplete="off" /></div><div class="hint" id="hint"></div><div class="results" id="results">'+resultsInner()+'</div>';}
function logHtml(){
  const log=todaysLog();
  if(!log.length)return '<h2 class="sectionTitle">Logged today</h2><p class="empty">Nothing logged yet.</p>';
  const rows=log.map((e,i)=>'<div class="logRow"><div><div class="foodName">'+esc(e.name)+' <span class="meta">'+e.grams+'g</span></div><div class="nums">'+round(e.cal)+' kcal · '+round(e.p)+'P / '+round(e.c)+'C / '+round(e.f)+'F</div></div><button class="xBtn" data-del="'+i+'" title="Remove">×</button></div>').join('');
  return '<h2 class="sectionTitle">Logged today</h2><div class="logList">'+rows+'</div>';
}
function headerHtml(){
  return '<header class="header"><div class="markWrap"><div class="markGlow"></div><div class="mark" aria-hidden="true">'
    +'<svg viewBox="-12 -12 24 24" fill="none" stroke="#0a0a0c"><path d="M0 -2 C-1.5 -4 -4 -5 -6.5 -3.5 C-9 -2 -9.5 2 -7 5 C-5 7.5 -2 8 0 6.5 C2 8 5 7.5 7 5 C9.5 2 9 -2 6.5 -3.5 C4 -5 1.5 -4 0 -2 Z" stroke-width="1.6" stroke-linejoin="round"/><path d="M0 -2 C0 -4 0.5 -6 1.5 -7.5" stroke-width="1.6" stroke-linecap="round"/><path d="M1.5 -7 C3.5 -8.5 6 -7.5 5.5 -5.5 C4 -6 2 -6.5 1.5 -7 Z" stroke-width="1.6" stroke-linejoin="round"/></svg></div></div>'
    +'<div><h1 class="title">Fuel</h1><p class="subtitle">Protein · Carbs · Fat</p></div></header>';
}
function render(){
  $('app').innerHTML=headerHtml()
    +'<div class="fuelTopRow">'+summaryHtml()
    +'<div class="mealCol">'+mealPlanHtml()+searchHtml()+createFoodHtml()+'</div>'
    +'</div>'+logHtml();
}
document.addEventListener('input',e=>{
  if(e.target.id==='q'){query=e.target.value;$('results').innerHTML=resultsInner();$('hint').textContent='';}
  if(['cfName','cfCal','cfP','cfC','cfF'].includes(e.target.id)){const h=$('cfHint');if(h&&h.textContent)h.textContent='';}
  if(e.target.hasAttribute&&e.target.hasAttribute('data-meal-day')){
    setMeal(e.target.getAttribute('data-meal-day'),e.target.getAttribute('data-meal-slot'),e.target.value);
  }
});
document.addEventListener('click',e=>{
  const gStep=e.target.closest('[data-goal-step]');
  if(gStep){
    const dir=Number(gStep.getAttribute('data-dir'));
    if(gStep.getAttribute('data-goal-step')==='cal')stepGoalCal(50*dir);
    else stepGoalProtein(5*dir);
    return;
  }
  const add=e.target.closest('[data-add]');
  if(add){
    const f=matches[Number(add.getAttribute('data-add'))];
    const gEl=document.querySelector('[data-grams="'+add.getAttribute('data-add')+'"]');
    const grams=Number(gEl&&gEl.value);
    if(!f||!isFinite(grams)||grams<=0){const h=$('hint');if(h)h.textContent='Enter how many grams.';return;}
    const k=grams/100,log=todaysLog();
    log.push({name:f.name,grams,cal:f.cal*k,p:f.p*k,c:f.c*k,f:f.f*k});
    setTodaysLog(log);query='';render();return;
  }
  const del=e.target.closest('[data-del]');
  if(del){const log=todaysLog();log.splice(Number(del.getAttribute('data-del')),1);setTodaysLog(log);render();return;}
  if(e.target.closest('#cfAdd')){submitCustomFood();return;}
  const delFood=e.target.closest('[data-del-food]');
  if(delFood){deleteCustomFood(delFood.getAttribute('data-del-food'));render();}
});
function submitCustomFood(){
  const nameEl=$('cfName'),calEl=$('cfCal'),pEl=$('cfP'),cEl=$('cfC'),fEl=$('cfF');
  const name=(nameEl.value||'').trim();
  const cal=Number(calEl.value);
  const p=Number(pEl.value)||0,c=Number(cEl.value)||0,f=Number(fEl.value)||0;
  if(!name){$('cfHint').textContent='Name the food first.';nameEl.focus();return;}
  if(!isFinite(cal)||cal<0){$('cfHint').textContent='Enter calories (per 100g).';calEl.focus();return;}
  addCustomFood(name,cal,p,c,f);
  $('cfHint').textContent='';
  render();
}
document.addEventListener('keydown',e=>{
  if(['cfName','cfCal','cfP','cfC','cfF'].includes(e.target.id)&&e.key==='Enter'){
    e.preventDefault();
    submitCustomFood();
  }
});
spawnStars();
(async()=>{const d=await window.Vitality.load();store=(d&&typeof d==='object'&&!Array.isArray(d))?d:{};render();window.Vitality.ready();})();
</script>
</body>
</html>
